<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL_V11.5 // BLINK MOEDAS</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-yellow: #ffcc00;
            --bg-dark: #0a0a0a;
            --card-bg: #111;
            --text-gray: #666;
        }
        body { background-color: var(--bg-dark); color: white; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 0; }
        .top-bar { background: #000; padding: 10px; font-size: 10px; display: flex; justify-content: space-between; color: var(--text-gray); border-bottom: 1px solid #222; }
        .nav-tabs { display: flex; background: #000; border-bottom: 2px solid #1a1a1a; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 12px; font-weight: bold; color: var(--text-gray); cursor: pointer; }
        .tab.active { color: var(--neon-green); border-bottom: 3px solid var(--neon-green); background: #050505; }

        .content { padding: 15px; display: none; }
        .content.active { display: block; }

        /* Estilo Identidade Blink Moedas */
        .market-card { background: var(--card-bg); border-radius: 4px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--neon-green); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .moeda-label { font-size: 16px; font-weight: bold; color: #eee; letter-spacing: 2px; }
        .proj-label { font-size: 8px; color: var(--text-gray); margin-left: 10px; }
        
        .main-price { font-size: 28px; color: var(--neon-green); font-weight: bold; margin: 10px 0; display: block; }
        .variation-row { font-size: 10px; color: var(--text-gray); margin-bottom: 10px; }
        .context-box { background: #000; border: 1px solid #222; padding: 10px; font-size: 9px; color: var(--neon-green); overflow: hidden; white-space: nowrap; }

        .badge-signal { font-size: 9px; padding: 2px 8px; border-radius: 10px; font-weight: bold; border: 1px solid currentColor; }
        .badge-entra { color: var(--neon-green); }
        .badge-pula { color: var(--neon-yellow); }

        #tv-container { height: 80vh; width: 100%; border: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <span>SENTINEL_V11.5 // SUPREMACIA MOEDAS</span>
        <span id="clock">00:00:00</span>
    </div>

    <div class="nav-tabs">
        <div class="tab active" onclick="openTab('painel-data', this)">PAINEL_DATA</div>
        <div class="tab" onclick="openTab('trader-view', this)">TRADER_VIEW</div>
    </div>

    <div id="painel-data" class="content active">
        <div id="market-list"></div>
    </div>

    <div id="trader-view" class="content">
        <div id="tv-container"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Sincronização de Relógio [cite: 2026-01-20]
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);

        // Radar de 20 Moedas [cite: 2026-01-11]
        const moedasAlvo = [
            { id: "BTC", pair: "BINANCE:BTCBRL", t: "-50%", hist: "HISTÓRICO: Fluxo institucional em BTC." },
            { id: "ETH", pair: "BINANCE:ETHBRL", t: "-50%", hist: "HISTÓRICO: Atualização de rede pendente." },
            { id: "SOL", pair: "BINANCE:SOLBRL", t: "-50%", hist: "HISTÓRICO: Rompimento de resistência." },
            { id: "FET", pair: "BINANCE:FETUSDT", t: "-50%", hist: "HISTÓRICO: IA em forte tendência." },
            { id: "TIA", pair: "BINANCE:TIAUSDT", t: "-50%", hist: "HISTÓRICO: Acúmulo detectado." },
            { id: "RNDR", pair: "BINANCE:RNDRUSDT", t: "-50%", hist: "HISTÓRICO: Renderização em alta." },
            { id: "BNB", pair: "BINANCE:BNBBRL", t: "-50%", hist: "HISTÓRICO: Queima de tokens prevista." },
            { id: "NEAR", pair: "BINANCE:NEARUSDT", t: "-50%", hist: "HISTÓRICO: Expansão de ecossistema." },
            { id: "AVAX", pair: "BINANCE:AVAXUSDT", t: "-50%", hist: "HISTÓRICO: Subnet ativa." },
            { id: "ADA", pair: "BINANCE:ADABRL", t: "-50%", hist: "HISTÓRICO: Consolidação de base." },
            { id: "XRP", pair: "BINANCE:XRPBRL", t: "-50%", hist: "HISTÓRICO: Decisão judicial favorável." },
            { id: "DOT", pair: "BINANCE:DOTBRL", t: "-50%", hist: "HISTÓRICO: Interoperabilidade estável." },
            { id: "MATIC", pair: "BINANCE:MATICBRL", t: "-50%", hist: "HISTÓRICO: ZK-EVM em testes." },
            { id: "LINK", pair: "BINANCE:LINKBRL", t: "-50%", hist: "HISTÓRICO: Oráculos em demanda." },
            { id: "DOGE", pair: "BINANCE:DOGEBRL", t: "-50%", hist: "HISTÓRICO: Volume de rede subindo." },
            { id: "SHIB", pair: "BINANCE:SHIBBRL", t: "-50%", hist: "HISTÓRICO: Ecossistema em queima." },
            { id: "LTC", pair: "BINANCE:LTCBRL", t: "-50%", hist: "HISTÓRICO: Prata digital mantida." },
            { id: "ARB", pair: "BINANCE:ARBUSDT", t: "-50%", hist: "HISTÓRICO: L2 com maior TVL." },
            { id: "OP", pair: "BINANCE:OPUSDT", t: "-50%", hist: "HISTÓRICO: RetroPG ativo." },
            { id: "INJ", pair: "BINANCE:INJUSDT", t: "-50%", hist: "HISTÓRICO: Injective em topo histórico." }
        ];

        function renderBlink(data = {}) {
            const list = document.getElementById('market-list');
            list.innerHTML = moedasAlvo.map(m => {
                const precoRaw = data.radar ? data.radar[m.id + "BRL"] || data.radar[m.id + "USDT"] || "---" : "SINCRONIZANDO...";
                const sinal = precoRaw.includes("---") ? "PULA" : "ENTRA";

                return `
                <div class="market-card" onclick="loadChart('${m.pair}')" style="border-left-color: ${sinal === 'ENTRA' ? 'var(--neon-green)' : 'var(--neon-yellow)'}">
                    <div class="card-header">
                        <div>
                            <span class="moeda-label">${m.id} MOEDAS 🔱</span>
                            <span class="proj-label">T: ${m.t}</span>
                        </div>
                        <span class="badge-signal ${sinal === 'ENTRA' ? 'badge-entra' : 'badge-pula'}">${sinal}</span>
                    </div>
                    <span class="main-price">${precoRaw}</span>
                    <div class="variation-row">
                        VARIAÇÃO DIA: <span style="color:var(--neon-green)">+0.85%</span>
                        <div style="margin-top:4px">CONTEXTO E GATILHOS</div>
                    </div>
                    <div class="context-box">
                        ${m.hist}
                    </div>
                </div>`;
            }).join('');
        }

        async function sync() {
            try {
                const res = await fetch("https://late-sea-261d.siddney-almeidaa.workers.dev");
                const data = await res.json();
                renderBlink(data);
            } catch (e) { renderBlink(); }
        }

        function loadChart(pair) {
            openTab('trader-view', document.querySelectorAll('.tab')[1]);
            new TradingView.widget({
                "autosize": true, "symbol": pair, "interval": "240",
                "theme": "dark", "container_id": "tv-container", "hide_top_toolbar": true
            });
        }

        function openTab(tabId, el) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        setInterval(sync, 10000);
        sync();
    </script>
</body>
</html>
