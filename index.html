<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL_V12 // SOBERANIA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #000; 
            --card: #0a0a0a; 
            --green: #00ff41; 
            --red: #ff3131; 
            --border: #1a1a1a; 
            --text-gray: #777; 
        }
        
        body { 
            background: var(--bg); color: white; 
            font-family: Arial, sans-serif; 
            margin: 0; padding: 0; 
        }

        /* BARRA SUPERIOR TÁTICA */
        .top-status { 
            display: flex; justify-content: space-around; 
            padding: 8px 0; border-bottom: 1px solid var(--border);
            font-size: 8px; font-weight: bold; text-transform: uppercase;
        }

        .header-main { 
            padding: 10px 15px; display: flex; justify-content: space-between; 
            font-size: 10px; font-weight: bold; color: #bbb;
        }

        /* NAVEGAÇÃO IGUAL AO PRINT */
        .nav-tabs { display: flex; border-bottom: 2px solid var(--border); }
        .tab { 
            flex: 1; padding: 12px; text-align: center; font-size: 10px; 
            font-weight: 900; color: #555; background: none; border: none; 
        }
        .tab.active { 
            color: var(--green); border-bottom: 3px solid var(--green); 
            background: linear-gradient(to bottom, transparent, #00ff4110);
        }

        /* LISTA DE CARDS */
        .content { padding: 10px; }
        .card { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 6px; margin-bottom: 8px; padding: 12px 15px; 
            position: relative; display: flex; justify-content: space-between;
        }

        .left-col { display: flex; flex-direction: column; }
        .coin-name { font-size: 14px; font-weight: 900; margin-bottom: 2px; }
        .coin-sub { font-size: 7px; color: #444; font-weight: bold; }

        .right-col { text-align: right; display: flex; flex-direction: column; justify-content: center; }
        .price-val { font-size: 18px; font-weight: 900; margin-bottom: 2px; letter-spacing: -0.5px; }
        .price-pct { font-size: 9px; font-weight: bold; }

        .status-led { 
            width: 10px; height: 10px; border-radius: 50%; 
            margin-left: 15px; align-self: center;
        }

        .decision-tag { 
            position: absolute; top: 8px; right: 40px; 
            font-size: 7px; font-weight: 900; letter-spacing: 0.5px;
        }

        /* GRÁFICO EXPANSÍVEL */
        .chart-wrap { 
            display: none; height: 380px; width: 100%; 
            margin-top: 10px; border-top: 1px solid var(--border); 
        }
        .card.open { flex-direction: column; }
        .card.open .chart-wrap { display: block; }

        /* ABA PATRIMÔNIO */
        .patrimonio-view { display: none; padding: 15px; }
        .patrimonio-view.active { display: block; }
        .pnl-title { font-size: 14px; font-weight: 900; color: #eee; margin-bottom: 15px; }
        .pnl-hero { font-size: 28px; font-weight: 900; margin-bottom: 20px; }

        .pos { color: var(--green); }
        .neg { color: var(--red); }
    </style>
</head>
<body>

<div class="top-status">
    <div>ESTADO: <span class="pos">ALTISTA</span></div>
    <div>DOMÍNIO BTC: <span style="color:var(--green)">52.4%</span></div>
    <div>FLUXO ATIVO: <span class="pos">ENTRANDO</span></div>
</div>

<div class="header-main">
    <div>SENTINEL_V12 // SOBERANIA <span class="pos" style="font-size:14px">●</span></div>
    <div id="relogio">03:45:10</div>
</div>

<div class="nav-tabs">
    <button class="tab active" id="btn-mon" onclick="mudarAba('mon')">🔱 MONITORAMENTO</button>
    <button class="tab" id="btn-pat" onclick="mudarAba('pat')">📊 PATRIMÔNIO</button>
</div>

<div class="content">
    <div id="view-mon">
        <div id="lista-ativos"></div>
    </div>

    <div id="view-pat" class="patrimonio-view">
        <div class="pnl-title">PNL de RENDER <span style="font-size:10px; color:#444">▼</span></div>
        <div class="pnl-hero">0.00600000 <span style="font-size:12px; color:#444">≈ R$ 0,055</span></div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px; font-size: 10px;">
            <div><div style="color:#555">PNL Hoje</div><div class="neg">-1.71%</div></div>
            <div><div style="color:#555">Preço médio</div><div>R$ 9,48</div></div>
        </div>

        <div style="margin-top:30px; border-top:1px solid #111; padding-top:20px;">
            <div style="font-size:10px; color:#555; margin-bottom:10px">Patrimônio Líquido do Ativo</div>
            <div style="font-size:20px; font-weight:900">R$ 0,05529</div>
            <canvas id="graficoPnl" height="150"></canvas>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    const ativos = ["BTC", "ETH", "RENDER", "SOL", "NEAR", "SEI", "POL", "ADA", "DOT", "FET"];
    const cambio = 5.48;

    function mudarAba(aba) {
        document.getElementById('view-mon').style.display = aba === 'mon' ? 'block' : 'none';
        document.getElementById('view-pat').classList.toggle('active', aba === 'pat');
        document.getElementById('btn-mon').classList.toggle('active', aba === 'mon');
        document.getElementById('btn-pat').classList.toggle('active', aba === 'pat');
        if(aba === 'pat') initPnlChart();
    }

    function renderLista() {
        document.getElementById('lista-ativos').innerHTML = ativos.map(a => `
            <div class="card" id="card-${a}" onclick="toggleAtivo('${a}')">
                <div class="decision-tag" id="dec-${a}">---</div>
                <div class="left-col">
                    <span class="coin-name">${a}</span>
                    <span class="coin-sub">USDT / BRL</span>
                </div>
                <div style="display:flex">
                    <div class="right-col">
                        <span class="price-val" id="pr-${a}">R$ 0,00</span>
                        <span class="price-pct" id="pct-${a}">0.00%</span>
                    </div>
                    <div class="status-led" id="led-${a}"></div>
                </div>
                <div class="chart-wrap" id="chart-${a}"></div>
            </div>
        `).join('');
    }

    async function atualizar() {
        for (let s of ativos) {
            try {
                const par = (s === 'POL') ? 'MATICUSDT' : s + 'USDT';
                const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${par}`);
                const d = await r.json();
                const preco = parseFloat(d.lastPrice) * cambio;
                const pct = parseFloat(d.priceChangePercent);

                document.getElementById(`pr-${s}`).innerText = "R$ " + preco.toLocaleString('pt-BR', {minimumFractionDigits: (preco < 1 ? 4 : 2)});
                const pEl = document.getElementById(`pct-${s}`);
                pEl.innerText = (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%";
                pEl.className = `price-pct ${pct >= 0 ? 'pos' : 'neg'}`;

                const decEl = document.getElementById(`dec-${s}`);
                decEl.innerText = pct > 0.5 ? "ENTRA" : (pct < -0.3 ? "PULA" : "AGUARDA");
                decEl.className = `decision-tag ${pct > 0.5 ? 'pos' : 'neg'}`;

                document.getElementById(`led-${s}`).style.background = pct >= 0 ? "var(--green)" : "var(--red)";
                document.getElementById(`led-${s}`).style.boxShadow = `0 0 8px ${pct >= 0 ? 'var(--green)' : 'var(--red)'}`;
            } catch (e) {}
        }
    }

    function toggleAtivo(id) {
        const el = document.getElementById(`card-${id}`);
        el.classList.toggle('open');
        if (el.classList.contains('open') && document.getElementById(`chart-${id}`).innerHTML === "") {
            new TradingView.widget({
                "autosize": true, "symbol": "BINANCE:" + (id === 'POL' ? 'MATIC' : id) + "USDT",
                "interval": "1", "theme": "dark", "container_id": `chart-${id}`,
                "hide_side_toolbar": true, "studies": ["RSI@tv-basicstudies", "MASimple@tv-basicstudies"]
            });
        }
    }

    function initPnlChart() {
        const ctx = document.getElementById('graficoPnl').getContext('2d');
        if(window.pChart) window.pChart.destroy();
        window.pChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['04-09', '04-11', '04-13', '04-16'],
                datasets: [{
                    data: [10, 8, 35, 12], borderColor: '#ffb800', borderWidth: 2, tension: 0.4, fill: true,
                    backgroundColor: 'rgba(255, 184, 0, 0.1)', pointRadius: 0
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    }

    renderLista();
    atualizar();
    setInterval(atualizar, 5000);
    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
