<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL_V11.5 // RADAR MOEDAS</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-yellow: #ffcc00;
            --bg-dark: #0a0a0a;
            --card-bg: #111;
            --text-gray: #666;
        }
        body { background-color: var(--bg-dark); color: white; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 0; overflow: hidden; }
        .top-bar { background: #000; padding: 10px; font-size: 10px; display: flex; justify-content: space-between; color: var(--text-gray); border-bottom: 1px solid #222; }
        .nav-tabs { display: flex; background: #000; border-bottom: 2px solid #1a1a1a; position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 12px; font-weight: bold; color: var(--text-gray); cursor: pointer; }
        .tab.active { color: var(--neon-green); border-bottom: 3px solid var(--neon-green); background: #050505; }
        
        .content { display: none; height: calc(100vh - 110px); overflow-y: auto; }
        .content.active { display: block; }

        /* Barra de Tópicos (Moedas) no Gráfico */
        .asset-selector { 
            display: flex; 
            gap: 8px; 
            padding: 10px; 
            background: #111; 
            overflow-x: auto; 
            border-bottom: 1px solid #222;
            scrollbar-width: none; 
        }
        .asset-btn { 
            background: #000; 
            color: var(--text-gray); 
            border: 1px solid #333; 
            padding: 8px 15px; 
            font-size: 10px; 
            font-weight: bold; 
            cursor: pointer;
            white-space: nowrap;
        }
        .asset-btn.active { border-color: var(--neon-green); color: var(--neon-green); }

        /* Estilo dos Cards */
        .market-card { background: var(--card-bg); border-radius: 4px; padding: 15px; margin: 15px; border-left: 4px solid var(--neon-green); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .moeda-label { font-size: 14px; font-weight: bold; letter-spacing: 2px; }
        .main-price { font-size: 24px; color: var(--neon-green); font-weight: bold; margin: 10px 0; display: block; }
        .context-box { background: #000; border: 1px solid #222; padding: 8px; font-size: 9px; color: var(--neon-green); }

        #tv-container { height: 100%; width: 100%; background: #000; }
    </style>
</head>
<body>

    <div class="top-bar">
        <span>SENTINEL_V11.5 // RADAR MOEDAS</span>
        <span id="clock">00:00:00</span>
    </div>

    <div class="nav-tabs">
        <div class="tab active" onclick="openTab('painel-data', this)">PAINEL_DATA</div>
        <div class="tab" onclick="openTab('trader-view', this)">TRADER_VIEW</div>
    </div>

    <div id="painel-data" class="content active">
        <div id="market-list"></div>
    </div>

    <div id="trader-view" class="content">
        <div class="asset-selector" id="asset-selector"></div>
        <div id="tv-container"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);

        const moedas = [
            { id: "BTC", pair: "BINANCE:BTCBRL" }, { id: "ETH", pair: "BINANCE:ETHBRL" },
            { id: "SOL", pair: "BINANCE:SOLBRL" }, { id: "FET", pair: "BINANCE:FETUSDT" },
            { id: "TIA", pair: "BINANCE:TIAUSDT" }, { id: "RNDR", pair: "BINANCE:RNDRUSDT" },
            { id: "BNB", pair: "BINANCE:BNBBRL" }, { id: "NEAR", pair: "BINANCE:NEARUSDT" },
            { id: "AVAX", pair: "BINANCE:AVAXUSDT" }, { id: "ADA", pair: "BINANCE:ADABRL" },
            { id: "XRP", pair: "BINANCE:XRPBRL" }, { id: "DOT", pair: "BINANCE:DOTBRL" },
            { id: "MATIC", pair: "BINANCE:MATICBRL" }, { id: "LINK", pair: "BINANCE:LINKBRL" },
            { id: "DOGE", pair: "BINANCE:DOGEBRL" }, { id: "SHIB", pair: "BINANCE:SHIBBRL" },
            { id: "LTC", pair: "BINANCE:LTCBRL" }, { id: "ARB", pair: "BINANCE:ARBUSDT" },
            { id: "OP", pair: "BINANCE:OPUSDT" }, { id: "INJ", pair: "BINANCE:INJUSDT" }
        ];

        let currentActivePair = "BINANCE:BTCBRL";

        function renderInterface() {
            // Renderiza Cards no Painel
            document.getElementById('market-list').innerHTML = moedas.map(m => `
                <div class="market-card" onclick="loadChart('${m.pair}')">
                    <div class="card-header">
                        <span class="moeda-label">${m.id} MOEDAS 🔱</span>
                        <span style="font-size:9px; color:var(--neon-green)">ENTRA</span>
                    </div>
                    <span class="main-price">---</span>
                    <div class="context-box">HISTÓRICO: Rede SENTINEL monitorando fluxo de ${m.id}...</div>
                </div>
            `).join('');

            // Renderiza Botões de Tópicos
            document.getElementById('asset-selector').innerHTML = moedas.map(m => `
                <button class="asset-btn ${m.pair === currentActivePair ? 'active' : ''}" 
                        onclick="loadChart('${m.pair}')">${m.id}</button>
            `).join('');
        }

        function loadChart(pair) {
            currentActivePair = pair;
            renderInterface(); // Atualiza botões ativos
            openTab('trader-view', document.querySelectorAll('.tab')[1]);
        }

        function openTab(tabId, el) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');

            if(tabId === 'trader-view') {
                document.getElementById('tv-container').innerHTML = "";
                new TradingView.widget({
                    "autosize": true, "symbol": currentActivePair, "interval": "240",
                    "theme": "dark", "container_id": "tv-container", "hide_top_toolbar": false
                });
            }
        }

        renderInterface();
    </script>
</body>
</html>
