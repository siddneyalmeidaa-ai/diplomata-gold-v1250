<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL_V12 // SOBERANIA_S.P.A.</title>
    <style>
        :root { --bg-dark: #0a0a0a; --card-bg: #111; --text-gray: #666; --green: #00ff41; --yellow: #ffdf00; --red: #ff3131; --blue: #00e5ff; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 0; }
        
        .nav-sistema { display: flex; background: #000; border-bottom: 2px solid #222; }
        .tab-link { flex: 1; padding: 15px; border: none; background: none; color: var(--text-gray); cursor: pointer; font-weight: bold; font-size: 12px; text-transform: uppercase; }
        .tab-link.active { color: var(--green); border-bottom: 3px solid var(--green); background: #111; }

        .top-bar { background: #000; padding: 15px; font-size: 11px; display: flex; justify-content: space-between; align-items: center; color: var(--text-gray); border-bottom: 2px solid #222; position: sticky; top: 0; z-index: 100; }
        .btn-ativa { background: var(--green); color: black; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 14px; text-transform: uppercase; }
        
        .btn-refresh { background: #222; color: var(--green); border: 1px solid var(--green); padding: 5px 15px; cursor: pointer; font-size: 10px; font-weight: bold; border-radius: 4px; }
        
        .container { padding: 10px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .crypto-section { background: var(--card-bg); border-radius: 8px; margin-bottom: 30px; border: 1px solid #222; overflow: hidden; }
        .market-info { padding: 20px; border-left: 8px solid #333; display: flex; justify-content: space-between; align-items: center; background: #151515; }
        .price-big { font-size: 28px; font-weight: bold; color: white; display: block; }
        .details { font-size: 10px; color: var(--green); line-height: 1.6; text-transform: uppercase; }
        .chart-container { height: 450px; width: 100%; background: #000; border-top: 1px solid #222; }
        
        .vol-container { width: 100%; background: #222; height: 6px; border-radius: 3px; margin-top: 8px; position: relative; overflow: hidden; border: 1px solid #333; }
        .vol-bar { height: 100%; background: var(--blue); width: 0%; transition: width 0.8s ease; }
        .ghost-peak { position: absolute; top: 0; width: 2px; height: 100%; background: white; box-shadow: 0 0 5px white; transition: left 0.5s ease; }
        .vol-label { font-size: 8px; color: var(--text-gray); text-transform: uppercase; margin-top: 4px; display: block; letter-spacing: 1px; }

        .log-sistema { background: #000; border: 1px solid #222; border-radius: 8px; margin: 10px; padding: 10px; height: 110px; overflow-y: auto; font-size: 10px; border-left: 4px solid var(--blue); }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #111; padding-bottom: 2px; display: flex; align-items: flex-start; }
        .log-time { color: var(--blue); font-weight: bold; margin-right: 8px; min-width: 65px; }

        .status-badge { font-weight: bold; padding: 5px 10px; border-radius: 3px; font-size: 12px; }
        .led { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-left: 10px; }
        .pulse { animation: pulse-animation 1s infinite; }
        @keyframes pulse-animation { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .pnl-card { background: var(--card-bg); border: 1px solid #333; border-radius: 8px; padding: 25px; border-left: 8px solid var(--blue); }
        .pnl-row { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .pnl-label { color: var(--text-gray); font-size: 11px; text-transform: uppercase; }
        .pnl-value { font-size: 20px; font-weight: bold; }

        .led-green { background: var(--green); box-shadow: 0 0 15px var(--green); }
        .led-yellow { background: var(--yellow); box-shadow: 0 0 15px var(--yellow); }
        .led-red { background: var(--red); box-shadow: 0 0 15px var(--red); }
        .led-blue { background: var(--blue); box-shadow: 0 0 15px var(--blue); }
        
        .delta-tag { font-size: 9px; background: #222; padding: 2px 6px; border-radius: 4px; margin-left: 8px; color: var(--blue); border: 1px solid #444; }
        .alerta-divergencia { border: 2px solid var(--yellow) !important; animation: blink-yellow 0.5s infinite; }
        @keyframes blink-yellow { 0% { border-color: var(--yellow); } 50% { border-color: transparent; } 100% { border-color: var(--yellow); } }
    </style>
</head>
<body>

    <button id="btn-audio" class="btn-ativa" onclick="ativarAudio()">🔱 ATIVAR SENTINEL V12 [TRAVAS S.P.A. ATIVAS]</button>

    <div class="nav-sistema">
        <button class="tab-link active" onclick="mudarTab(event, 'monitoramento')">🔱 Monitoramento</button>
        <button class="tab-link" onclick="mudarTab(event, 'patrimonio')">📊 Patrimônio</button>
    </div>

    <div class="top-bar">
        <div>
            <span>SENTINEL_V12 // SOBERANIA_S.P.A.</span>
            <span id="heartbeat" style="margin-left: 10px; color: var(--green);">●</span>
        </div>
        <div>
            <button class="btn-refresh" onclick="fetchPrices()">REFRESH ⟳</button>
            <span id="clock" style="margin-left: 15px;">00:00:00</span>
        </div>
    </div>

    <div class="container">
        <div id="monitoramento" class="tab-content active">
            <div id="main-content">
                <div style="padding: 40px; text-align: center; color: #444;">AGUARDANDO ATIVAÇÃO...</div>
            </div>
            <div class="log-sistema" id="log-oraculo">
                <div class="log-entry"><span class="log-time">[SISTEMA]</span> AGUARDANDO COMANDO PARA SINCRONIZAR LOGS...</div>
            </div>
        </div>

        <div id="patrimonio" class="tab-content">
            <div class="pnl-card">
                <div style="margin-bottom: 25px;"><span style="color: var(--blue); font-weight: bold; font-size: 14px;">ANÁLISE DE CARTEIRA: RENDER</span></div>
                <div class="pnl-row">
                    <div><span class="pnl-label">Preço de Custo</span><div class="pnl-value">R$ 9,59</div></div>
                    <div><span class="pnl-label">Saldo Atual</span><div class="pnl-value" id="pnl-total">R$ 0,00</div></div>
                </div>
                <div class="pnl-row">
                    <div><span class="pnl-label">Lucro / Perda</span><div class="pnl-value" id="pnl-lucro">R$ 0,00</div></div>
                    <div><span class="pnl-label">Performance</span><div class="pnl-value" id="pnl-perc">0.00%</div></div>
                </div>
                <div id="pnl-inteligencia" style="font-size: 11px; color: var(--green); line-height: 1.5; padding-top: 10px;">SINCRONIZANDO DADOS...</div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const MEU_PRECO_MEDIO = 9.59;
        const MINHA_QUANTIDADE = 3.996;
        const VOL_REF_GLOBAL = 500000000; 

        let audioAtivo = false;
        let lastStates = {}; 
        let lastPrices = {};
        let priceHistory = {}; // Para cálculo de aceleração
        let dolarReal = 5.15;
        let volatilityData = {};
        let volumeData = {};
        let ghostPeaks = {}; 

        const moedas = [
            { id: "BTC", pair: "BTCUSDT", symbol: "BTCUSDT", alvo: 450000 },
            { id: "ETH", pair: "ETHUSDT", symbol: "ETHUSDT", alvo: 22000 },
            { id: "RENDER", pair: "RENDERUSDT", symbol: "RENDERUSDT", alvo: 26.26 },
            { id: "NEAR", pair: "NEARUSDT", symbol: "NEARUSDT", alvo: 48.00 },
            { id: "SOL", pair: "SOLUSDT", symbol: "SOLUSDT", alvo: 1200 },
            { id: "FET", pair: "FETUSDT", symbol: "FETUSDT", alvo: 15.00 },
            { id: "DOGE", pair: "DOGEUSDT", symbol: "DOGEUSDT", alvo: 2.50 }, 
            { id: "MATIC", pair: "POLUSDT", symbol: "POLUSDT", alvo: 6.50 },
            { id: "ADA", pair: "ADAUSDT", symbol: "ADAUSDT", alvo: 5.50 },
            { id: "DOT", pair: "DOTUSDT", symbol: "DOTUSDT", alvo: 60.00 }
        ];

        function falar(texto) {
            const agora = new Date().toLocaleTimeString('pt-BR');
            const logDiv = document.getElementById('log-oraculo');
            let cor = texto.includes('EXPLOSÃO') || texto.includes('VERDE') ? 'var(--green)' : 'var(--text-gray)';
            if (texto.includes('DIVERGÊNCIA')) cor = 'var(--yellow)';
            
            logDiv.innerHTML += `<div class="log-entry"><span class="log-time">[${agora}]</span> <span style="color:${cor}">${texto.toUpperCase()}</span></div>`;
            logDiv.scrollTop = logDiv.scrollHeight;

            if (audioAtivo) {
                window.speechSynthesis.cancel();
                const mensagem = new SpeechSynthesisUtterance(texto);
                mensagem.lang = 'pt-BR';
                mensagem.rate = 1.2; 
                window.speechSynthesis.speak(mensagem);
            }
        }

        function mudarTab(evt, nomeTab) {
            let i, content, links;
            content = document.getElementsByClassName("tab-content");
            for (i = 0; i < content.length; i++) content[i].classList.remove("active");
            links = document.getElementsByClassName("tab-link");
            for (i = 0; i < links.length; i++) links[i].classList.remove("active");
            document.getElementById(nomeTab).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);

        function getSemaforoStatus(m_id, vol, preco, candleColor, acceleration) {
            // REGRA 1: TRAVA DE POLARIDADE (CANDLE VERMELHO = PULA)
            if (candleColor === 'VERMELHO') {
                if (vol > 2.0) return { text: 'PULA', color: 'var(--yellow)', class: 'led-yellow', msg: 'DIVERGÊNCIA: QUEDA COM VOLUME' };
                return { text: 'PULA', color: 'var(--red)', class: 'led-red', msg: 'GRÁFICO ENFERMEIRO' };
            }

            // REGRA 2: TRAVA DE ACELERAÇÃO (CANDLE VERDE MAS PREÇO PARADO)
            if (candleColor === 'VERDE' && acceleration <= 0.01) {
                return { text: 'AGUARDE', color: 'var(--blue)', class: 'led-blue', msg: 'LATERALIZADO / SEM EXPLOSÃO' };
            }

            // REGRA 3: CONFIRMAÇÃO DE ENTRADA (VERDE + ACELERAÇÃO)
            if (candleColor === 'VERDE' && acceleration > 0.01) {
                if (vol > 2.0) return { text: 'ENTRA', color: 'var(--green)', class: 'led-green pulse', msg: 'EXPLOSÃO DETECTADA!' };
                return { text: 'OBSERVAR', color: 'var(--green)', class: 'led-green', msg: 'VERDE EM ASCENSÃO' };
            }

            return { text: 'PULA', color: 'var(--text-gray)', class: 'led', msg: 'FLUXO INSUFICIENTE' };
        }

        async function fetchPrices() {
            const hb = document.getElementById('heartbeat');
            hb.classList.add('pulse');
            try {
                const dRes = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=USDTBRL`);
                const dData = await dRes.json();
                dolarReal = parseFloat(dData.price);

                const btcRes = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT`);
                const btcData = await btcRes.json();
                const btcVol = parseFloat(btcData.priceChangePercent);

                for(let m of moedas) {
                    const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${m.symbol}`);
                    const data = await res.json();
                    if(data.lastPrice) {
                        const precoAtual = parseFloat(data.lastPrice);
                        const openPrice = parseFloat(data.openPrice);
                        const candleColor = precoAtual >= openPrice ? 'VERDE' : 'VERMELHO';
                        
                        // Cálculo de Aceleração (Comparando com última checagem)
                        const lastPriceRecord = priceHistory[m.id] || precoAtual;
                        const acceleration = ((precoAtual - lastPriceRecord) / lastPriceRecord) * 100;
                        priceHistory[m.id] = precoAtual;

                        lastPrices[m.id] = precoAtual * dolarReal;
                        volatilityData[m.id] = parseFloat(data.priceChangePercent);
                        volumeData[m.id] = parseFloat(data.quoteVolume);
                        
                        let currentVolPerc = (volumeData[m.id] / VOL_REF_GLOBAL) * 100;
                        if (!ghostPeaks[m.id] || currentVolPerc > ghostPeaks[m.id]) ghostPeaks[m.id] = currentVolPerc;

                        const delta = m.id === 'BTC' ? 0 : (volatilityData[m.id] - btcVol);
                        const status = getSemaforoStatus(m.id, volatilityData[m.id], lastPrices[m.id], candleColor, acceleration);
                        
                        // Lógica de Voz Inteligente S.P.A.
                        if (lastStates[m.id] !== status.text) {
                            if (status.text === 'ENTRA') falar(`${m.id} EXPLODINDO! ACELERAÇÃO DE ${acceleration.toFixed(2)}%. ENTRA!`);
                            if (status.msg.includes('DIVERGÊNCIA')) falar(`Alerta em ${m.id}. Gráfico caindo com volume alto. Pula!`);
                        }
                        lastStates[m.id] = status.text;
                        m.currentDelta = delta;
                        m.currentStatus = status;
                        m.currentAccel = acceleration;
                    }
                }
                updateUIValues();
                atualizarPatrimonio();
            } catch (e) { console.error("SYNC ERROR - RETRYING"); }
            setTimeout(() => hb.classList.remove('pulse'), 1000);
        }

        function atualizarPatrimonio() {
            const atual = lastPrices['RENDER']; if(!atual) return;
            const saldo = atual * MINHA_QUANTIDADE;
            const custoTotal = MEU_PRECO_MEDIO * MINHA_QUANTIDADE;
            document.getElementById('pnl-total').innerText = `R$ ${saldo.toFixed(2)}`;
            document.getElementById('pnl-lucro').innerText = `R$ ${(saldo - custoTotal).toFixed(2)}`;
            document.getElementById('pnl-perc').innerText = `${((saldo - custoTotal) / custoTotal * 100).toFixed(2)}%`;
            const intel = document.getElementById('pnl-inteligencia');
            if(saldo < custoTotal) {
                intel.innerHTML = `⚠️ ALERTA: Abaixo do custo. Aguardando sinal de EXPLOSÃO para recuperação.`;
                intel.style.color = 'var(--yellow)';
            } else {
                intel.innerHTML = `✅ SOBERANIA: Operação no lucro. Mantenha posição enquanto o sinal for VERDE.`;
                intel.style.color = 'var(--green)';
            }
        }

        function initUI() {
            document.getElementById('main-content').innerHTML = moedas.map(m => `
                <div class="crypto-section" id="card-${m.id}">
                    <div class="market-info" id="info-${m.id}">
                        <div>
                            <span style="color:#666; font-weight:bold; font-size:10px;">${m.id} // SOBERANIA <span id="delta-tag-${m.id}" class="delta-tag">Δ 0%</span></span>
                            <span class="price-big" id="price-${m.id}">R$ ...</span>
                            <div class="details" id="details-${m.id}">CALCULANDO ACELERAÇÃO...</div>
                            <div class="vol-container">
                                <div class="vol-bar" id="vol-bar-${m.id}"></div>
                                <div class="ghost-peak" id="ghost-${m.id}"></div>
                            </div>
                            <span class="vol-label" id="vol-label-${m.id}">VOLUME: US$ 0M</span>
                        </div>
                        <div style="text-align:right">
                            <span class="status-badge" id="status-${m.id}">---</span>
                            <div class="led" id="led-${m.id}"></div>
                        </div>
                    </div>
                    <div class="chart-container" id="chart-${m.id}"></div>
                </div>
            `).join('');
        }

        function updateUIValues() {
            moedas.forEach(m => {
                const price = lastPrices[m.id];
                const delta = m.currentDelta || 0;
                const accel = m.currentAccel || 0;
                const volumeUsd = volumeData[m.id] || 0;
                const status = m.currentStatus;
                
                if(document.getElementById(`price-${m.id}`)) {
                    const card = document.getElementById(`card-${m.id}`);
                    document.getElementById(`price-${m.id}`).innerText = price ? price.toLocaleString('pt-BR', {style:'currency', currency:'BRL'}) : '...';
                    document.getElementById(`details-${m.id}`).innerHTML = `${status.msg} | ACCEL: ${accel.toFixed(3)}%`;
                    document.getElementById(`status-${m.id}`).innerText = status.text;
                    document.getElementById(`status-${m.id}`).style.color = status.color;
                    document.getElementById(`led-${m.id}`).className = `led ${status.class}`;
                    document.getElementById(`delta-tag-${m.id}`).innerText = `Δ ${delta.toFixed(2)}%`;
                    
                    // Alerta Visual de Divergência
                    if(status.msg.includes('DIVERGÊNCIA')) card.classList.add('alerta-divergencia');
                    else card.classList.remove('alerta-divergencia');

                    const vBar = document.getElementById(`vol-bar-${m.id}`);
                    let volPerc = (volumeUsd / VOL_REF_GLOBAL) * 100;
                    vBar.style.width = `${Math.min(volPerc, 100)}%`;
                    vBar.style.background = accel > 0.01 ? 'var(--green)' : 'var(--blue)';
                    
                    document.getElementById(`ghost-${m.id}`).style.left = `${Math.min(ghostPeaks[m.id], 99)}%`;
                    document.getElementById(`vol-label-${m.id}`).innerText = `VOLUME: US$ ${(volumeUsd/1000000).toFixed(0)}M`;
                }
            });
        }

        function ativarAudio() {
            audioAtivo = true;
            document.getElementById('btn-audio').style.display = 'none';
            initUI();
            falar("Sentinel V12 S.P.A. Ativado. Travas de polaridade e acelerômetro de preço em vigor.");
            moedas.forEach(m => {
                new TradingView.widget({
                    "autosize": true, "symbol": m.pair, "interval": "1", "theme": "dark", 
                    "container_id": `chart-${m.id}`, "hide_side_toolbar": true, "library_path": "https://s3.tradingview.com/tv.js"
                });
            });
            fetchPrices();
            setInterval(fetchPrices, 10000);
        }
    </script>
</body>
</html>
