<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL_V17.5 // FULL_POWER_S.P.A.</title>
    <style>
        :root { 
            --bg: #050505; --card: #111; --header: #000;
            --green: #00ff41; --red: #ff3131; --blue: #00e5ff; 
            --gold: #ffdf00; --purple: #bc13fe; --gray: #444;
        }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 0; overflow-x: hidden; }
        
        .top-nav { background: var(--header); padding: 15px 25px; border-bottom: 2px solid #222; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .system-title { font-size: 14px; font-weight: bold; letter-spacing: 2px; color: var(--gold); }
        .clock-box { font-size: 12px; color: var(--blue); border: 1px solid var(--blue); padding: 5px 10px; border-radius: 4px; }

        .tabs { display: flex; background: #000; border-bottom: 1px solid #333; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: var(--gray); cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .tab-btn.active { color: var(--green); border-bottom: 3px solid var(--green); background: #0a0a0a; }

        .master-trigger { background: var(--green); color: #000; border: none; padding: 25px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; text-transform: uppercase; letter-spacing: 3px; }

        .container { padding: 15px; }
        .content-section { display: none; }
        .content-section.active { display: block; }

        .market-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; }
        
        .card { background: var(--card); border: 1px solid #222; border-radius: 12px; overflow: hidden; position: relative; transition: 0.4s; }
        .card.breakout { border: 2px solid var(--green); box-shadow: 0 0 40px rgba(0, 255, 65, 0.15); }
        .card.danger { border: 2px solid var(--red); }

        .card-header { padding: 20px; background: #151515; display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
        .symbol-info { display: flex; flex-direction: column; }
        .symbol-name { font-size: 24px; font-weight: bold; }
        .symbol-delta { font-size: 10px; color: var(--blue); margin-top: 5px; }

        .price-display { padding: 20px; }
        .price-brl { font-size: 36px; font-weight: bold; display: block; }
        .price-target { font-size: 11px; color: var(--gold); margin-top: 8px; font-weight: bold; }

        .sensor-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px 20px; }
        .sensor { background: #080808; padding: 12px; border-radius: 8px; border: 1px solid #222; text-align: center; }
        .sensor label { font-size: 7px; color: #666; display: block; text-transform: uppercase; margin-bottom: 4px; }
        .sensor span { font-size: 12px; font-weight: bold; }

        .chart-container { height: 450px; background: #000; border-top: 1px solid #222; }

        .favelinha-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #000; font-size: 11px; border: 1px solid #333; }
        .favelinha-table th { background: #111; padding: 12px; text-align: left; border-bottom: 2px solid var(--blue); color: var(--blue); }
        .favelinha-table td { padding: 10px; border-bottom: 1px solid #1a1a1a; }

        .terminal { background: #000; border-left: 4px solid var(--blue); margin: 15px; padding: 15px; height: 150px; overflow-y: auto; font-size: 11px; color: #888; }
        .log-line { margin-bottom: 5px; display: flex; }
        .log-time { color: var(--blue); margin-right: 10px; min-width: 70px; }
    </style>
</head>
<body>

<button id="btn-init" class="master-trigger" onclick="ativarSoberania()">🔱 INJETAR ARQUITETURA COMPLETA V17.5 // S.P.A.</button>

<div class="top-nav">
    <div class="system-title">SENTINEL_V17.5 // SOBERANIA_TOTAL</div>
    <div class="clock-box" id="sys-clock">00:00:00</div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab(event, 'monitor')">Monitoramento</button>
    <button class="tab-btn" onclick="switchTab(event, 'favelinha')">Tabela Favelinha</button>
    <button class="tab-btn" onclick="switchTab(event, 'pnl')">Gestão P&L</button>
</div>

<div class="container">
    <div id="monitor" class="content-section active">
        <div class="market-grid" id="market-display"></div>
    </div>

    <div id="favelinha" class="content-section">
        <table class="favelinha-table">
            <thead>
                <tr>
                    <th>ATIVO</th>
                    <th>PREÇO (BRL)</th>
                    <th>DIVERGÊNCIA Δ</th>
                    <th>PROJEÇÃO -50%</th>
                    <th>SENTIMENTO IA</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="favelinha-body"></tbody>
        </table>
    </div>

    <div id="pnl" class="content-section">
        <div style="padding: 30px; background: #111; border-radius: 12px; border-left: 8px solid var(--purple);">
            <h2 style="color: var(--purple)">ANÁLISE DE PATRIMÔNIO: RENDER</h2>
            <p>Preço de Custo: R$ 9,59 | Quantidade: 3.996</p>
            <div id="pnl-data" style="font-size: 24px; font-weight: bold;">SINCRONIZANDO...</div>
        </div>
    </div>
</div>

<div class="terminal" id="oraculo-console">
    <div class="log-line"><span class="log-time">[SISTEMA]</span> AGUARDANDO COMANDO PARA SINCRONIZAR ARQUITETURA...</div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let soberano = false;
    let memoriaPrecos = {};
    let tetosVidro = {};
    let dolarBRL = 5.15;

    const ativos = [
        { id: "BTC", pair: "BTCUSDT" },
        { id: "ETH", pair: "ETHUSDT" },
        { id: "RENDER", pair: "RENDERUSDT" },
        { id: "NEAR", pair: "NEARUSDT" },
        { id: "SOL", pair: "SOLUSDT" },
        { id: "FET", pair: "FETUSDT" },
        { id: "DOGE", pair: "DOGEUSDT" },
        { id: "POL", pair: "POLUSDT" },
        { id: "ADA", pair: "ADAUSDT" },
        { id: "DOT", pair: "DOTUSDT" }
    ];

    function oraculo(txt, cor = "var(--blue)") {
        const console = document.getElementById('oraculo-console');
        const agora = new Date().toLocaleTimeString();
        console.innerHTML += `<div class="log-line"><span class="log-time">[${agora}]</span> <span style="color:${cor}">${txt.toUpperCase()}</span></div>`;
        console.scrollTop = console.scrollHeight;
        if(soberano) {
            window.speechSynthesis.cancel();
            const fala = new SpeechSynthesisUtterance(txt);
            fala.lang = 'pt-BR';
            window.speechSynthesis.speak(fala);
        }
    }

    async function update() {
        try {
            const dRes = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=USDTBRL');
            const dData = await dRes.json();
            dolarBRL = parseFloat(dData.price);

            const btcRes = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
            const btcData = await btcRes.json();
            const btcVar = parseFloat(btcData.priceChangePercent);

            let favHTML = "";

            for(let a of ativos) {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${a.pair}`);
                const data = await res.json();
                
                const pUSD = parseFloat(data.lastPrice);
                const pBRL = pUSD * dolarBRL;
                const openBRL = parseFloat(data.openPrice) * dolarBRL;
                const last = memoriaPrecos[a.id] || pBRL;
                const acel = ((pBRL - last) / last) * 100;
                memoriaPrecos[a.id] = pBRL;

                if(!tetosVidro[a.id] || pBRL > tetosVidro[a.id]) tetosVidro[a.id] = pBRL;

                const v24 = parseFloat(data.priceChangePercent);
                const delta = a.id === 'BTC' ? 0 : (v24 - btcVar);
                
                const range = pBRL * (Math.abs(v24)/100);
                const alvo = pBRL + (range * 0.5);

                const card = document.getElementById(`card-${a.id}`);
                const stat = document.getElementById(`stat-${a.id}`);
                let statusMsg = "AGUARDE";

                if (pBRL < openBRL) {
                    statusMsg = "PULA";
                    if(card) card.className = "card danger";
                } else if (pBRL >= (tetosVidro[a.id] * 0.999) && acel > 0.02) {
                    statusMsg = "ENTRA";
                    if(card) card.className = "card breakout";
                    if(acel > 0.04) oraculo(`EXPLOSÃO EM ${a.id}! ALVO EM R$ ${alvo.toFixed(2)}`, "var(--green)");
                }

                if(card) {
                    document.getElementById(`brl-${a.id}`).innerText = `R$ ${pBRL.toFixed(3)}`;
                    document.getElementById(`proj-${a.id}`).innerText = `ALVO S.P.A.: R$ ${alvo.toFixed(3)}`;
                    document.getElementById(`acc-${a.id}`).innerText = `${acel.toFixed(3)}%`;
                    document.getElementById(`delta-${a.id}`).innerText = `Δ ${delta.toFixed(2)}%`;
                    stat.innerText = statusMsg;
                }

                favHTML += `<tr>
                    <td><b>${a.id}</b></td>
                    <td>R$ ${pBRL.toFixed(2)}</td>
                    <td style="color:var(--blue)">${delta.toFixed(2)}%</td>
                    <td style="color:var(--gold)">R$ ${alvo.toFixed(2)}</td>
                    <td>${acel > 0.02 ? 'EUFORIA' : 'ESTÁVEL'}</td>
                    <td style="font-weight:bold; color:${statusMsg === 'ENTRA' ? 'var(--green)' : 'var(--red)'}">${statusMsg}</td>
                </tr>`;
            }
            document.getElementById('favelinha-body').innerHTML = favHTML;
            atualizarPatrimonio();
        } catch(e) { console.log("SYNC..."); }
    }

    function atualizarPatrimonio() {
        const render = memoriaPrecos['RENDER'];
        if(!render) return;
        const total = render * 3.996;
        const custo = 9.59 * 3.996;
        const pnl = total - custo;
        const perc = (pnl / custo) * 100;
        document.getElementById('pnl-data').innerHTML = `
            SALDO: R$ ${total.toFixed(2)} | 
            <span style="color:${pnl >= 0 ? 'var(--green)' : 'var(--red)'}">
                ${pnl >= 0 ? '+' : ''}R$ ${pnl.toFixed(2)} (${perc.toFixed(2)}%)
            </span>
        `;
    }

    function switchTab(evt, tabId) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    function initUI() {
        document.getElementById('market-display').innerHTML = ativos.map(a => `
            <div class="card" id="card-${a.id}">
                <div class="card-header">
                    <div class="symbol-info">
                        <span class="symbol-name">${a.id}</span>
                        <span class="symbol-delta" id="delta-${a.id}">Δ 0.00%</span>
                    </div>
                    <div id="stat-${a.id}" class="status-pill">SCANNING</div>
                </div>
                <div class="price-display">
                    <span class="price-brl" id="brl-${a.id}">R$ ...</span>
                    <div class="price-target" id="proj-${a.id}">CALCULANDO ALVO...</div>
                </div>
                <div class="sensor-grid">
                    <div class="sensor"><label>ACELERAÇÃO</label><span id="acc-${a.id}">0.00%</span></div>
                    <div class="sensor"><label>TETO HIST.</label><span>R$ ...</span></div>
                    <div class="sensor"><label>VIGOR</label><span>---</span></div>
                </div>
                <div class="chart-container" id="chart-${a.id}"></div>
            </div>
        `).join('');
    }

    function ativarSoberania() {
        soberano = true;
        document.getElementById('btn-init').style.display = 'none';
        initUI();
        oraculo("Arquitetura V17.5 Completa. 10 Ativos Originais Restaurados. Padrão Ouro Ativo.", "var(--gold)");
        ativos.forEach(a => {
            new TradingView.widget({
                "autosize": true, "symbol": a.pair, "interval": "1", "theme": "dark", "container_id": `chart-${a.id}`, "hide_side_toolbar": true, "library_path": "https://s3.tradingview.com/tv.js"
            });
        });
        setInterval(update, 6000);
        setInterval(() => { document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
    }
</script>
</body>
</html>
