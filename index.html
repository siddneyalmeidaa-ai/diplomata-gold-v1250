<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL_V12 // SOBERANIA</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #020202; 
            --card: #0a0a0a; 
            --green-nitido: #00ff88; 
            --red-nitido: #ff3e3e;   
            --border-dark: #1a1a1a; 
            --glass: rgba(5, 5, 5, 0.95);
        }
        body { background: var(--bg); color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* CABEÇALHO MODERNO */
        .st-bar { 
            display: flex; flex-direction: column;
            padding: 20px; border-bottom: 2px solid var(--border-dark); 
            background: var(--glass); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 1000;
        }
        
        .st-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .st-metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; border-top: 1px solid #111; padding-top: 15px; }
        
        .stat-box { display: flex; flex-direction: column; }
        .stat-label { font-size: 8px; font-weight: 900; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
        .stat-val { font-size: 11px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: #eee; }

        .clock-modern { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 18px; font-weight: 800; 
            color: #fff; text-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            background: #111; padding: 5px 12px; border-radius: 6px; border: 1px solid #222;
        }

        .notif-bell { display: flex; align-items: center; gap: 8px; font-size: 9px; font-weight: 900; color: #444; cursor: pointer; position: relative; }
        .alert-active { color: #ffcc00 !important; animation: blink 1s infinite; }
        .bell-dot { width: 8px; height: 8px; background: #ffcc00; border-radius: 50%; position: absolute; top: -4px; right: -4px; display: none; box-shadow: 0 0 10px #ffcc00; }
        
        #notif-panel {
            position: fixed; top: 100px; right: 15px; left: 15px; 
            background: #0d0d0d; border: 1px solid #222; border-radius: 12px;
            padding: 20px; display: none; z-index: 2000; box-shadow: 0 30px 60px rgba(0,0,0,1);
        }
        .notif-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 10px; }
        .notif-item { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 10px 0; border-bottom: 1px solid #1a1a1a; color: #aaa; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .pulse { animation: pulse-glow 2s infinite ease-in-out; }
        @keyframes pulse-glow { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }

        .nav { display: flex; border-bottom: 1px solid var(--border-dark); background: #050505; }
        .n-btn { flex: 1; padding: 16px; text-align: center; font-size: 10px; font-weight: 900; color: #222; background: none; border: none; letter-spacing: 1px; }
        .n-btn.active { color: var(--green-nitido); border-bottom: 3px solid var(--green-nitido); }

        /* CARDS ORGANIZADOS */
        .container { padding: 12px; display: flex; flex-direction: column; }
        .c-asset { 
            background: var(--card); border: 1px solid var(--border-dark);
            border-radius: 12px; margin-bottom: 10px; padding: 20px 15px; 
            display: flex; flex-direction: column; position: relative; overflow: hidden;
            order: 0; /* JS vai cuidar da ordem */
        }

        .side-pill {
            position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
            background: #1a1a1a; transition: all 0.4s ease;
        }

        .asset-row { display: flex; align-items: center; gap: 15px; width: 100%; }
        
        /* LOGOS DAS MOEDAS */
        .coin-icon {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: #111;
            border: 1px solid #222;
        }

        .a-left { flex-grow: 1; display: flex; flex-direction: column; }
        .a-sym { font-size: 22px; font-weight: 900; color: #ffffff; letter-spacing: -1px; line-height: 1; }
        .a-pair { font-size: 8px; color: #444; margin-top: 4px; font-weight: 900; }

        .a-right { text-align: right; }
        .a-price { font-size: 20px; font-weight: 800; color: #ffffff; font-family: 'JetBrains Mono', monospace; }
        
        .status-box { display: flex; align-items: center; gap: 6px; justify-content: flex-end; margin-top: 6px; }
        .a-pct { font-size: 13px; font-weight: 900; font-family: 'JetBrains Mono', monospace; }
        .flow-tag { font-size: 7px; font-weight: 900; padding: 2px 6px; border-radius: 4px; background: #000; border: 1px solid #1a1a1a; color: #333; }

        .pos-bg { background: var(--green-nitido) !important; box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }
        .neg-bg { background: var(--red-nitido) !important; }
        .pos-txt { color: var(--green-nitido) !important; }
        .neg-txt { color: var(--red-nitido) !important; }

        .chart-box { display: none; width: 100%; height: 450px; margin-top: 15px; border-top: 1px solid var(--border-dark); }
        .c-asset.open .chart-box { display: block; }
    </style>
</head>
<body>

<div class="st-bar" id="main-header">
    <div class="st-top-row">
        <div class="notif-bell" id="bell" onclick="toggleNotifs()">
            <span id="last-alert">SISTEMA ONLINE</span>
            <div class="bell-dot" id="dot"></div>
            <span style="font-size: 12px;">🔔</span>
        </div>
        <div class="clock-modern" id="clock">00:00:00</div>
    </div>
    <div class="st-metrics">
        <div class="stat-box"><span class="stat-label">Organismo</span><span class="stat-val pulse" id="mkt-status">SINCRONIZANDO</span></div>
        <div class="stat-box"><span class="stat-label">Domínio BTC</span><span class="stat-val" id="btc-dom">--%</span></div>
        <div class="stat-box"><span class="stat-label">Fluxo Ativo</span><span class="stat-val pulse" id="mkt-flow">AGUARDANDO</span></div>
    </div>
</div>

<div id="notif-panel">
    <div class="notif-header">
        <span style="font-size: 11px; font-weight: 900;">LOG DE ROTAÇÃO</span>
        <span onclick="toggleNotifs()" style="cursor:pointer; font-size: 14px; color: #555;">✕</span>
    </div>
    <div id="notif-list"></div>
</div>

<div class="nav">
    <button class="n-btn active">🔱 MONITORAMENTO</button>
    <button class="n-btn">📊 PATRIMÔNIO</button>
</div>

<div class="container" id="list"></div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    const coins = ["BTC", "ETH", "SOL", "RENDER", "NEAR", "DOT", "ADA", "POL", "SEI", "FET"];
    const logoMap = {
        "BTC": "btc", "ETH": "eth", "SOL": "sol", "RENDER": "rndr",
        "NEAR": "near", "DOT": "dot", "ADA": "ada", "POL": "matic", "SEI": "sei", "FET": "fet"
    };

    let usdRate = 5.50;
    let btcChange = 0;
    let alerts = [];

    function toggleNotifs() {
        const panel = document.getElementById('notif-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        document.getElementById('dot').style.display = 'none';
    }

    function addAlert(msg) {
        const time = new Date().toLocaleTimeString();
        alerts.unshift(`[${time}] ${msg}`);
        if(alerts.length > 8) alerts.pop();
        document.getElementById('notif-list').innerHTML = alerts.map(a => `<div class="notif-item">${a}</div>`).join('');
        document.getElementById('dot').style.display = 'block';
        document.getElementById('last-alert').innerText = "ALERTA DE FLUXO";
        document.getElementById('last-alert').classList.add('alert-active');
    }

    async function sync() {
        try {
            const rRate = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=USDTBRL');
            const dRate = await rRate.json();
            usdRate = parseFloat(dRate.price);

            const resBtc = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
            const dataBtc = await resBtc.json();
            btcChange = parseFloat(dataBtc.priceChangePercent);

            let assetList = [];

            for (let s of coins) {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${s}USDT`);
                const data = await res.json();
                assetList.push({
                    symbol: s,
                    priceBrl: parseFloat(data.lastPrice) * usdRate,
                    pct: parseFloat(data.priceChangePercent)
                });
            }

            // ORDENAÇÃO: MAIOR VALOR PARA O MENOR
            assetList.sort((a, b) => b.priceBrl - a.priceBrl);

            assetList.forEach((asset, index) => {
                let card = document.getElementById(`card-${asset.symbol}`);
                if (!card) {
                    card = document.createElement('div');
                    card.id = `card-${asset.symbol}`;
                    card.className = `c-asset`;
                    card.onclick = () => toggle(asset.symbol);
                    document.getElementById('list').appendChild(card);
                }

                card.style.order = index; // Aplica a ordem visual

                const isPos = asset.pct >= 0;
                const logo = logoMap[asset.symbol] || asset.symbol.toLowerCase();

                card.innerHTML = `
                    <div class="side-pill ${isPos ? 'pos-bg' : 'neg-bg'}"></div>
                    <div class="asset-row">
                        <img class="coin-icon" src="https://cryptologos.cc/logos/${logo}-${asset.symbol.toLowerCase()}-logo.png?v=025" 
                             onerror="this.src='https://ui-avatars.com/api/?name=${asset.symbol}&background=111&color=fff'">
                        <div class="a-left">
                            <span class="a-sym">${asset.symbol}</span>
                            <span class="a-pair">MERCADO / BRL</span>
                        </div>
                        <div class="a-right">
                            <div class="a-price">R$ ${asset.priceBrl.toLocaleString('pt-BR', {minimumFractionDigits: asset.priceBrl < 1 ? 4 : 2})}</div>
                            <div class="status-box">
                                <span class="flow-tag" id="tag-${asset.symbol}">${asset.pct > (btcChange + 2) ? 'ENTRA | ALVO' : 'LATERAL'}</span>
                                <span class="a-pct ${isPos ? 'pos-txt' : 'neg-txt'}">${isPos ? '+' : ''}${asset.pct.toFixed(2)}%</span>
                            </div>
                        </div>
                    </div>
                    <div class="chart-box" id="tv-${asset.symbol}"></div>
                `;
                
                if (asset.symbol !== "BTC" && asset.pct > (btcChange + 2.5)) {
                    const tag = document.getElementById(`tag-${asset.symbol}`);
                    if (tag && tag.innerText !== "ENTRA | ALVO") addAlert(`Rotação para ${asset.symbol}`);
                }
            });

            document.getElementById('mkt-status').innerText = btcChange > 0 ? "VIVO | BULL" : "VIVO | BEAR";
            document.getElementById('mkt-flow').innerText = "MONITORANDO";

        } catch (e) { }
    }

    function toggle(id) {
        const c = document.getElementById(`card-${id}`);
        c.classList.toggle('open');
        const containerId = `tv-${id}`;
        if (c.classList.contains('open') && document.getElementById(containerId).innerHTML === "") {
            new TradingView.widget({
                "autosize": true, "symbol": "BINANCE:" + id + "USDT",
                "interval": "1", "theme": "dark", "container_id": containerId,
                "hide_side_toolbar": true, "studies": ["RSI@tv-basicstudies"]
            });
        }
    }

    sync();
    setInterval(sync, 10000);
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
