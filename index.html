<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL_V12 // SOBERANIA_TOTAL</title>
    <style>
        :root { --bg-dark: #050505; --card-bg: #0f0f0f; --text-gray: #555; --green: #00ff41; --yellow: #ffdf00; --red: #ff3131; --blue: #00e5ff; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Courier New', monospace; margin: 0; padding: 0; overflow-x: hidden; }
        .nav-sistema { display: flex; background: #000; border-bottom: 2px solid #1a1a1a; position: sticky; top: 45px; z-index: 99; }
        .tab-link { flex: 1; padding: 12px; border: none; background: none; color: var(--text-gray); cursor: pointer; font-size: 11px; text-transform: uppercase; font-weight: bold; }
        .tab-link.active { color: var(--green); border-bottom: 2px solid var(--green); background: #0a0a0a; }
        .top-bar { background: #000; padding: 12px; font-size: 10px; display: flex; justify-content: space-between; align-items: center; color: var(--text-gray); border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 100; }
        .radar-global { background: #111; padding: 8px; font-size: 9px; display: flex; justify-content: space-around; border-bottom: 1px solid var(--blue); color: var(--blue); }
        .btn-ativa { background: var(--green); color: black; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .container { padding: 10px; }
        .crypto-section { background: var(--card-bg); border: 1px solid #1a1a1a; margin-bottom: 10px; border-radius: 4px; }
        .market-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-left: 4px solid #333; }
        .price-big { font-size: 22px; font-weight: bold; color: #fff; }
        .led { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-left: 10px; }
        .led-green { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .led-red { background: var(--red); box-shadow: 0 0 10px var(--red); }
        .star-fluxo { color: var(--yellow); font-size: 14px; display: none; margin-left: 5px; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .chart-wrapper { display: none; height: 450px; background: #000; border-top: 1px solid #1a1a1a; }
        .chart-wrapper.open { display: block; }
        .pnl-card { background: var(--card-bg); border: 1px solid #1a1a1a; padding: 25px; border-left: 4px solid var(--blue); margin-top: 10px; }
        .pnl-row { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; }
        .pnl-value { font-size: 20px; font-weight: bold; }
        .favelinha-table { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 20px; color: var(--text-gray); }
        .favelinha-table th { border-bottom: 1px solid #333; padding: 5px; text-align: left; }
        .favelinha-table td { padding: 8px 5px; border-bottom: 1px solid #111; }
    </style>
</head>
<body>

    <button id="btn-audio" class="btn-ativa" onclick="ativarAudio()">🔱 INICIALIZAR SENTINEL V12 COMPLETO [21:04 PM]</button>

    <div class="radar-global">
        <span>ESTADO: <span id="global-status">---</span></span>
        <span>DOMÍNIO BTC: <span id="global-dom">--%</span></span>
        <span>FLUXO ATIVO: <span id="global-target" style="color: var(--yellow);">BUSCANDO...</span></span>
    </div>

    <div class="top-bar">
        <div>SENTINEL_V12 // SOBERANIA_SPA <span id="heartbeat" style="color: var(--green);">●</span></div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="nav-sistema">
        <button class="tab-link active" onclick="mudarTab(event, 'monitoramento')">🔱 Monitoramento</button>
        <button class="tab-link" onclick="mudarTab(event, 'patrimonio')">📊 Patrimônio</button>
    </div>

    <div class="container">
        <div id="monitoramento" class="tab-content">
            <div id="main-content"><div style="padding: 40px; text-align: center;">CARREGANDO SISTEMA...</div></div>
        </div>

        <div id="patrimonio" class="tab-content" style="display:none;">
            <div class="pnl-card">
                <div style="color: var(--blue); font-weight: bold; font-size: 12px; margin-bottom: 20px;">ANÁLISE REAL: RENDER</div>
                <div class="pnl-row">
                    <div><span style="font-size: 9px; color:#555;">CUSTO MÉDIO</span><div class="pnl-value">R$ 9,59</div></div>
                    <div><span style="font-size: 9px; color:#555;">PREÇO ATUAL</span><div id="pnl-price-now" class="pnl-value">...</div></div>
                </div>
                <div class="pnl-row">
                    <div><span style="font-size: 9px; color:#555;">SALDO TOTAL</span><div id="pnl-total" class="pnl-value">...</div></div>
                    <div><span style="font-size: 9px; color:#555;">LUCRO/PERDA</span><div id="pnl-lucro" class="pnl-value">...</div></div>
                </div>
                <div id="pnl-inteligencia" style="font-size: 10px; font-weight: bold; text-align: center; padding: 10px; border: 1px dashed #333;">SINCRONIZANDO ORÁCULO...</div>
            </div>

            <table class="favelinha-table">
                <thead>
                    <tr><th>MOEDA</th><th>STATUS</th><th>ENTRADA</th><th>ALVO</th></tr>
                </thead>
                <tbody id="favelinha-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const MEU_PRECO_MEDIO = 9.59;
        const MINHA_QUANTIDADE = 3.996;
        let lastPrices = {};
        let lastVolumes = {};
        let dolarReal = 5.20;

        const moedas = [
            { id: "BTC", pair: "BTCUSDT" }, { id: "ETH", pair: "ETHUSDT" },
            { id: "RENDER", pair: "RENDERUSDT" }, { id: "NEAR", pair: "NEARUSDT" },
            { id: "SOL", pair: "SOLUSDT" }, { id: "SEI", pair: "SEIUSDT" },
            { id: "POL", pair: "POLUSDT" }, { id: "ADA", pair: "ADAUSDT" },
            { id: "DOT", pair: "DOTUSDT" }, { id: "LINK", pair: "LINKUSDT" },
            { id: "APT", pair: "APTUSDT" }, { id: "ALGO", pair: "ALGOUSDT" },
            { id: "FET", pair: "FETUSDT" }, { id: "AGIX", pair: "AGIXUSDT" },
            { id: "OCEAN", pair: "OCEANUSDT" }, { id: "DOGE", pair: "DOGEUSDT" },
            { id: "SHIB", pair: "SHIBUSDT" }, { id: "PEPE", pair: "PEPEUSDT" },
            { id: "WIF", pair: "WIFUSDT" }, { id: "BONK", pair: "BONKUSDT" }
        ];

        function toggleChart(id, pair) {
            const wrapper = document.getElementById(`wrapper-${id}`);
            if (wrapper.classList.contains('open')) {
                wrapper.classList.remove('open');
                wrapper.innerHTML = "";
            } else {
                wrapper.classList.add('open');
                wrapper.innerHTML = `<div id="chart-${id}" style="height:100%"></div>`;
                new TradingView.widget({
                    "autosize": true, "symbol": pair, "interval": "15", "theme": "dark",
                    "container_id": `chart-${id}`, "hide_side_toolbar": true, "library_path": "https://s3.tradingview.com/tv.js"
                });
            }
        }

        async function fetchPrices() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=["${moedas.map(m=>m.pair).join('","')}","USDTBRL"]`);
                const data = await res.json();
                
                const dData = data.find(x => x.symbol === "USDTBRL");
                dolarReal = parseFloat(dData.lastPrice);

                const btc = data.find(x => x.symbol === "BTCUSDT");
                const btcVar = parseFloat(btc.priceChangePercent);
                document.getElementById('global-dom').innerText = (56.9 + (btcVar * 0.05)).toFixed(2) + "%";
                document.getElementById('global-status').innerText = btcVar > 0 ? "ALTISTA" : "LATERAL";

                let topMoeda = "";
                let maxFluxo = 0;

                data.forEach(item => {
                    const m = moedas.find(x => x.pair === item.symbol);
                    if(m) {
                        const precoBRL = parseFloat(item.lastPrice) * dolarReal;
                        const volume = parseFloat(item.quoteVolume);
                        const fluxo = (volume / (lastVolumes[m.id] || volume));
                        
                        lastPrices[m.id] = precoBRL;
                        lastVolumes[m.id] = volume;

                        if(m.id !== "BTC" && m.id !== "ETH" && fluxo > maxFluxo) {
                            maxFluxo = fluxo;
                            topMoeda = m.id;
                        }

                        if(document.getElementById(`price-${m.id}`)) {
                            const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: precoBRL < 5 ? 3 : 2 });
                            document.getElementById(`price-${m.id}`).innerText = fmt.format(precoBRL);
                            const isUp = parseFloat(item.priceChangePercent) > 0;
                            document.getElementById(`led-${m.id}`).className = `led ${isUp ? 'led-green' : 'led-red'}`;
                            document.getElementById(`star-${m.id}`).style.display = (m.id === topMoeda && fluxo > 1.001) ? "inline" : "none";
                        }
                    }
                });
                
                document.getElementById('global-target').innerText = topMoeda || "ESTÁVEL";
                atualizarPatrimonio();
            } catch (e) { console.log("Reconectando..."); }
        }

        function atualizarPatrimonio() {
            const atual = lastPrices['RENDER'];
            if(!atual) return;
            const saldoT = atual * MINHA_QUANTIDADE;
            const lucroP = saldoT - (MEU_PRECO_MEDIO * MINHA_QUANTIDADE);
            const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
            
            document.getElementById('pnl-price-now').innerText = fmt.format(atual);
            document.getElementById('pnl-total').innerText = fmt.format(saldoT);
            const elLucro = document.getElementById('pnl-lucro');
            elLucro.innerText = fmt.format(lucroP);
            elLucro.style.color = lucroP >= 0 ? 'var(--green)' : 'var(--red)';
            
            const intel = document.getElementById('pnl-inteligencia');
            intel.innerText = lucroP < 0 ? "ALERTA: CAPITAL SOB DRENAGEM" : "SISTEMA BLINDADO: LUCRO ATIVO";
            intel.style.color = lucroP < 0 ? 'var(--red)' : 'var(--green)';
        }

        function mudarTab(evt, nomeTab) {
            document.querySelectorAll(".tab-content").forEach(c => c.style.display = "none");
            document.querySelectorAll(".tab-link").forEach(l => l.classList.remove("active"));
            document.getElementById(nomeTab).style.display = "block";
            evt.currentTarget.classList.add("active");
        }

        function ativarAudio() {
            document.getElementById('btn-audio').style.display = 'none';
            document.getElementById('main-content').innerHTML = moedas.map(m => `
                <div class="crypto-section">
                    <div class="market-info" onclick="toggleChart('${m.id}', '${m.pair}')">
                        <div><span style="color:#555; font-size:9px;">${m.id} <span class="star-fluxo" id="star-${m.id}">⭐</span></span><span class="price-big" id="price-${m.id}">...</span></div>
                        <div><div class="led" id="led-${m.id}"></div></div>
                    </div>
                    <div class="chart-wrapper" id="wrapper-${m.id}"></div>
                </div>
            `).join('');

            document.getElementById('favelinha-body').innerHTML = moedas.slice(2, 10).map(m => `
                <tr><td>${m.id}</td><td style="color:var(--green)">MONITORADO</td><td>R$ 1,10</td><td>R$ 1,45</td></tr>
            `).join('');

            fetchPrices();
            setInterval(fetchPrices, 15000);
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
        }
    </script>
</body>
</html>
