<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL_V12 // DESIGN_UNIFICADO</title>
    <style>
        :root { --bg-dark: #020202; --card-bg: #0d0d0d; --text-main: #ffffff; --text-dim: #888; --green: #00ff41; --yellow: #ffdf00; --red: #ff3131; --blue: #00e5ff; --border-line: #1a1a1a; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Top Bar & Radar */
        .top-bar { background: #000; padding: 12px; font-size: 11px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-line); position: sticky; top: 0; z-index: 100; }
        .radar-global { background: #080808; padding: 10px; font-size: 10px; display: flex; justify-content: space-around; border-bottom: 1px solid var(--blue); color: var(--blue); font-weight: bold; }
        
        /* Nav */
        .nav-sistema { display: flex; background: #000; border-bottom: 2px solid #222; position: sticky; top: 43px; z-index: 99; }
        .tab-link { flex: 1; padding: 15px; border: none; background: none; color: var(--text-dim); cursor: pointer; font-size: 12px; font-weight: 800; text-transform: uppercase; }
        .tab-link.active { color: var(--green); border-bottom: 3px solid var(--green); background: #050505; }
        
        .btn-ativa { background: var(--green); color: black; border: none; padding: 25px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 14px; letter-spacing: 2px; }

        /* Estilo Unificado de Card (Monitoramento + Patrimônio) */
        .container { padding: 10px; }
        .crypto-card { background: var(--card-bg); margin-bottom: 10px; border-radius: 6px; border: 1px solid var(--border-line); overflow: hidden; border-left: 6px solid #333; }
        .card-content { padding: 18px; display: flex; justify-content: space-between; align-items: center; }
        
        .coin-name { font-size: 18px; font-weight: 900; color: #fff; letter-spacing: 1px; }
        .price-big { font-size: 22px; font-weight: 900; color: #fff; text-align: right; display: block; }
        .var-percent { font-size: 12px; font-weight: bold; text-align: right; display: block; }

        .led { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-left: 10px; }
        .led-green { background: var(--green); box-shadow: 0 0 12px var(--green); }
        .led-red { background: var(--red); box-shadow: 0 0 12px var(--red); }

        /* Grade de Dados do Patrimônio dentro do Card */
        .pat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; background: #050505; border-top: 1px solid #1a1a1a; }
        .pat-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; font-weight: bold; }
        .pat-val { font-size: 15px; font-weight: 800; color: #fff; }

        /* Tabela Favelinha */
        .favelinha-section { margin-top: 25px; padding: 10px; border: 1px solid #1a1a1a; }
        .favelinha-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        .favelinha-table th { text-align: left; padding: 10px; color: var(--blue); border-bottom: 1px solid #222; }
        .favelinha-table td { padding: 12px 10px; border-bottom: 1px solid #111; font-weight: bold; }
        .status-badge { font-weight: 900; padding: 4px 8px; border-radius: 2px; font-size: 9px; text-transform: uppercase; }
    </style>
</head>
<body>

    <button id="btn-start" class="btn-ativa" onclick="iniciarSentinela()">🔱 INICIALIZAR DESIGN UNIFICADO V12</button>

    <div class="radar-global">
        <span>ESTADO: <span id="global-status">ALTISTA</span></span>
        <span>FLUXO ATIVO: <span id="global-target" style="color: var(--yellow);">LINK</span></span>
    </div>

    <div class="top-bar">
        <div>SENTINEL_V12 // SOBERANIA <span id="heartbeat" style="color: var(--green);">●</span></div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="nav-sistema">
        <button class="tab-link active" onclick="mudarTab(event, 'monitoramento')">🔱 Monitoramento</button>
        <button class="tab-link" onclick="mudarTab(event, 'patrimonio')">📊 Patrimônio</button>
    </div>

    <div class="container">
        <div id="monitoramento" class="tab-content">
            <div id="lista-mercado"></div>
        </div>

        <div id="patrimonio" class="tab-content" style="display:none;">
            <div id="lista-patrimonio"></div>

            <div class="favelinha-section">
                <div style="font-size: 10px; font-weight: 900; color: var(--yellow); letter-spacing: 1px;">RADAR FAVELINHA // INJEÇÃO DE CAPITAL</div>
                <table class="favelinha-table">
                    <thead><tr><th>MOEDA</th><th>FLUXO</th><th>INTENSIDADE</th><th>ALVO X</th></tr></thead>
                    <tbody id="favelinha-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let config = {
            patrimonio: [
                { id: "RENDER", aporte: 1500.00, qtd: 156.40 },
                { id: "SOL", aporte: 2000.00, qtd: 2.15 }
            ],
            moedas: [
                { id: "BTC", pair: "BTCUSDT" }, { id: "ETH", pair: "ETHUSDT" },
                { id: "RENDER", pair: "RENDERUSDT" }, { id: "SOL", pair: "SOLUSDT" },
                { id: "NEAR", pair: "NEARUSDT" }, { id: "FET", pair: "FETUSDT" }
            ]
        };

        let prices = {};
        let dolarReal = 5.30;

        async function iniciarSentinela() {
            document.getElementById('btn-start').style.display = 'none';
            renderStaticBase();
            syncData();
            setInterval(syncData, 10000);
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
        }

        async function syncData() {
            try {
                const symbols = config.moedas.map(m => m.pair);
                const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=["${symbols.join('","')}","USDTBRL"]`);
                const data = await res.json();
                
                dolarReal = parseFloat(data.find(x => x.symbol === "USDTBRL").lastPrice);

                data.forEach(item => {
                    const coin = config.moedas.find(c => c.pair === item.symbol);
                    if(coin) {
                        prices[coin.id] = parseFloat(item.lastPrice) * dolarReal;
                        prices[coin.id + "_var"] = parseFloat(item.priceChangePercent);
                    }
                });

                updateVisuals();
            } catch (e) { console.log("Erro de sincronização."); }
        }

        function renderStaticBase() {
            // Renderiza estrutura de Monitoramento
            document.getElementById('lista-mercado').innerHTML = config.moedas.map(m => `
                <div class="crypto-card" id="card-m-${m.id}">
                    <div class="card-content">
                        <div class="coin-name">${m.id}</div>
                        <div style="flex-grow:1">
                            <span class="price-big" id="price-m-${m.id}">...</span>
                            <span class="var-percent" id="var-m-${m.id}">0.00%</span>
                        </div>
                        <div class="led" id="led-m-${m.id}"></div>
                    </div>
                </div>
            `).join('');
        }

        function updateVisuals() {
            // Atualiza Monitoramento
            config.moedas.forEach(m => {
                const p = prices[m.id] || 0;
                const v = prices[m.id + "_var"] || 0;
                document.getElementById(`price-m-${m.id}`).innerText = `R$ ${p.toFixed(2)}`;
                document.getElementById(`var-m-${m.id}`).innerText = (v >= 0 ? "+" : "") + v.toFixed(2) + "%";
                document.getElementById(`var-m-${m.id}`).style.color = v >= 0 ? 'var(--green)' : 'var(--red)';
                document.getElementById(`card-m-${m.id}`).style.borderLeftColor = v >= 0 ? 'var(--green)' : 'var(--red)';
                document.getElementById(`led-m-${m.id}`).className = `led ${v >= 0 ? 'led-green' : 'led-red'}`;
            });

            // Atualiza Patrimônio (Cards Unificados)
            let patHtml = "";
            config.patrimonio.forEach(item => {
                const pAtual = prices[item.id] || 0;
                const vAtual = prices[item.id + "_var"] || 0;
                const saldo = pAtual * item.qtd;
                const lucro = saldo - item.aporte;
                const pMedio = item.aporte / item.qtd;

                patHtml += `
                    <div class="crypto-card" style="border-left-color: ${lucro >= 0 ? 'var(--green)' : 'var(--red)'}">
                        <div class="card-content">
                            <div class="coin-name">${item.id}</div>
                            <div style="flex-grow:1">
                                <span class="price-big" style="color:${lucro >= 0 ? 'var(--green)' : 'var(--red)'}">
                                    ${lucro >= 0 ? '+' : ''}R$ ${lucro.toFixed(2)}
                                </span>
                                <span class="var-percent">${((lucro/item.aporte)*100).toFixed(2)}% Performance</span>
                            </div>
                            <div class="led ${lucro >= 0 ? 'led-green' : 'led-red'}"></div>
                        </div>
                        <div class="pat-grid">
                            <div><div class="pat-label">Aporte Real</div><div class="pat-val">R$ ${item.aporte.toFixed(2)}</div></div>
                            <div><div class="pat-label">P. Médio (Auto)</div><div class="pat-val">R$ ${pMedio.toFixed(2)}</div></div>
                            <div><div class="pat-label">Saldo Atual</div><div class="pat-val">R$ ${saldo.toFixed(2)}</div></div>
                            <div><div class="pat-label">Cotação</div><div class="pat-val">R$ ${pAtual.toFixed(2)}</div></div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('lista-patrimonio').innerHTML = patHtml;

            // Renderiza Favelinha (Simplificado para validação)
            let favHtml = "";
            config.moedas.forEach(m => {
                const v = prices[m.id + "_var"] || 0;
                favHtml += `
                    <tr>
                        <td>${m.id}</td>
                        <td><span class="status-badge" style="background:${v >= 0 ? 'var(--green)' : 'var(--red)'}; color:#000">${v >= 0 ? 'INJETANDO' : 'DRENANDO'}</span></td>
                        <td>${Math.abs(v * 2).toFixed(0)}%</td>
                        <td style="color:var(--yellow)">R$ ${(prices[m.id] * 1.05).toFixed(2)}</td>
                    </tr>
                `;
            });
            document.getElementById('favelinha-body').innerHTML = favHtml;
        }

        function mudarTab(evt, n) {
            document.querySelectorAll(".tab-content").forEach(c => c.style.display = "none");
            document.querySelectorAll(".tab-link").forEach(l => l.classList.remove("active"));
            document.getElementById(n).style.display = "block";
            evt.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
