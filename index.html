<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL_V11.5 // SUPREMACIA TOTAL</title>
    <style>
        :root { --neon-green: #00ff41; --bg-dark: #0a0a0a; --card-bg: #111; --text-gray: #666; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 0; overflow: hidden; }
        .top-bar { background: #000; padding: 10px; font-size: 10px; display: flex; justify-content: space-between; color: var(--text-gray); border-bottom: 1px solid #222; }
        .nav-tabs { display: flex; background: #000; border-bottom: 2px solid #1a1a1a; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 12px; font-weight: bold; color: var(--text-gray); cursor: pointer; }
        .tab.active { color: var(--neon-green); border-bottom: 3px solid var(--neon-green); background: #050505; }
        .content { display: none; height: calc(100vh - 110px); overflow-y: auto; }
        .content.active { display: block; }
        .asset-selector { display: flex; gap: 8px; padding: 10px; background: #111; overflow-x: auto; border-bottom: 1px solid #222; scrollbar-width: none; }
        .asset-btn { background: #000; color: var(--text-gray); border: 1px solid #333; padding: 8px 15px; font-size: 10px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .asset-btn.active { border-color: var(--neon-green); color: var(--neon-green); }
        .market-card { background: var(--card-bg); border-radius: 4px; padding: 15px; margin: 12px; border-left: 4px solid var(--neon-green); transition: 0.3s; cursor: pointer; }
        .market-card:hover { background: #1a1a1a; }
        .card-header { display: flex; justify-content: space-between; }
        .moeda-label { font-size: 14px; font-weight: bold; letter-spacing: 2px; }
        .main-price { font-size: 26px; color: var(--neon-green); font-weight: bold; margin: 10px 0; display: block; }
        .context-box { background: #000; border: 1px solid #222; padding: 8px; font-size: 9px; color: var(--neon-green); }
        .badge-signal { font-size: 9px; font-weight: bold; border: 1px solid currentColor; padding: 1px 6px; border-radius: 2px; }
        #tv-container { height: 100%; width: 100%; background: #000; }
    </style>
</head>
<body>

    <div class="top-bar">
        <span>SENTINEL_V11.5 // MATRIZ CORRIGIDA</span>
        <span id="clock">03:47:40</span>
    </div>

    <div class="nav-tabs">
        <div class="tab active" onclick="openTab('painel-data', this)">PAINEL_DATA</div>
        <div class="tab" onclick="openTab('trader-view', this)">TRADER_VIEW</div>
    </div>

    <div id="painel-data" class="content active">
        <div id="market-list"></div>
    </div>

    <div id="trader-view" class="content">
        <div class="asset-selector" id="asset-selector"></div>
        <div id="tv-container"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);

        const moedas = [
            { id: "BTC", pair: "BINANCE:BTCBRL", binanceSymbol: "BTCBRL", shield: "1408S" },
            { id: "ETH", pair: "BINANCE:ETHBRL", binanceSymbol: "ETHBRL", shield: "908S" },
            { id: "SOL", pair: "BINANCE:SOLBRL", binanceSymbol: "SOLBRL", shield: "2108S" },
            { id: "FET", pair: "BINANCE:FETUSDT", binanceSymbol: "FETUSDT", shield: "608S" },
            { id: "TIA", pair: "BINANCE:TIAUSDT", binanceSymbol: "TIAUSDT", shield: "408S" },
            { id: "RENDER", pair: "BINANCE:RENDERUSDT", binanceSymbol: "RENDERUSDT", shield: "328S" }, // Correção RNDR -> RENDER
            { id: "BNB", pair: "BINANCE:BNBBRL", binanceSymbol: "BNBBRL", shield: "1508S" },
            { id: "NEAR", pair: "BINANCE:NEARUSDT", binanceSymbol: "NEARUSDT", shield: "110S" },
            { id: "AVAX", pair: "BINANCE:AVAXUSDT", binanceSymbol: "AVAXUSDT", shield: "550S" },
            { id: "ADA", pair: "BINANCE:ADABRL", binanceSymbol: "ADABRL", shield: "200S" }
        ];

        let currentPair = "BINANCE:BTCBRL";
        let lastPrices = {};

        async function fetchPrices() {
            try {
                for(let m of moedas) {
                    const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${m.binanceSymbol}`);
                    const data = await res.json();
                    
                    if(data.price) {
                        let priceVal = parseFloat(data.price);
                        // Conversão dinâmica para pares USDT se necessário
                        if(m.binanceSymbol.includes('USDT')) priceVal *= 5.05; 
                        
                        lastPrices[m.id] = priceVal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                    }
                }
                renderUI();
            } catch (e) { console.error("FALHA NA REDE SENTINEL"); }
        }

        function renderUI() {
            document.getElementById('market-list').innerHTML = moedas.map(m => `
                <div class="market-card" onclick="loadChart('${m.pair}')">
                    <div class="card-header">
                        <span class="moeda-label">${m.id} MOEDAS 🔱</span>
                        <span class="badge-signal" style="color:var(--neon-green)">LIBERADA</span>
                    </div>
                    <span class="main-price">${lastPrices[m.id] || "SINCRONIZANDO..."}</span>
                    <div class="context-box">SHIELD: ${m.shield} | MONITORAMENTO: BINANCE BRL</div>
                </div>
            `).join('');

            document.getElementById('asset-selector').innerHTML = moedas.map(m => `
                <button class="asset-btn ${m.pair === currentPair ? 'active' : ''}" 
                        onclick="loadChart('${m.pair}')">${m.id}</button>
            `).join('');
        }

        function loadChart(pair) {
            currentPair = pair;
            renderUI();
            openTab('trader-view', document.querySelectorAll('.tab')[1]);
        }

        function openTab(tabId, el) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');

            if(tabId === 'trader-view') {
                document.getElementById('tv-container').innerHTML = "";
                new TradingView.widget({
                    "autosize": true,
                    "symbol": currentPair,
                    "interval": "240",
                    "theme": "dark",
                    "container_id": "tv-container",
                    "hide_top_toolbar": false,
                    "allow_symbol_change": true,
                    "save_image": false,
                    "locale": "br"
                });
            }
        }

        setInterval(fetchPrices, 10000); // Atualiza a cada 10s para estabilidade [cite: 2026-01-23]
        fetchPrices();
    </script>
</body>
</html>
