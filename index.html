<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL_V12 // SOBERANIA_TOTAL</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { 
            --bg-dark: #020202; --card-bg: #0d0d0d; --text-main: #ffffff; 
            --text-dim: #888; --green: #00ff41; --yellow: #ffdf00; 
            --red: #ff3131; --blue: #00e5ff; --border: #1a1a1a;
        }
        
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .radar-global { background: #080808; padding: 10px; font-size: 10px; display: flex; justify-content: space-around; border-bottom: 1px solid var(--blue); color: var(--blue); font-weight: bold; }
        .top-bar { background: #000; padding: 12px; font-size: 11px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-sistema { display: flex; background: #000; border-bottom: 2px solid #222; position: sticky; top: 43px; z-index: 99; }
        .tab-link { flex: 1; padding: 15px; border: none; background: none; color: var(--text-dim); cursor: pointer; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .tab-link.active { color: var(--green); border-bottom: 3px solid var(--green); background: #050505; }
        
        .btn-ativa { background: var(--green); color: black; border: none; padding: 25px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 14px; }

        .container { padding: 10px; }
        .crypto-section { background: var(--card-bg); margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; position: relative; cursor: pointer; transition: all 0.3s; }
        .market-info { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #333; position: relative; z-index: 5; background: rgba(13, 13, 13, 0.7); }
        
        /* Notificações Visuais */
        @keyframes pulse-refugio { 0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4); } 70% { box-shadow: 0 0 20px 10px rgba(0, 229, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); } }
        .alerta-refugio { animation: pulse-refugio 2s infinite; border-color: var(--blue) !important; }

        .coin-name { font-size: 18px; font-weight: 900; color: #fff; }
        .fluxo-status { font-size: 9px; display: block; margin-top: 4px; font-weight: bold; }
        .price-big { font-size: 22px; font-weight: 900; color: #fff; display: block; }

        .chart-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 55%; z-index: 1; pointer-events: none; opacity: 0.4; }
        .candle-view { height: 0; background: #000; overflow: hidden; transition: height 0.4s ease; }
        .candle-view.open { height: 320px; border-top: 1px solid #222; }

        .pat-details { background: #050505; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 1px solid var(--border); z-index: 6; }
        .pnl-block { font-size: 9px; color: var(--text-dim); font-weight: bold; text-transform: uppercase; }
        .pnl-val { font-size: 15px; color: #fff; font-weight: 900; }
    </style>
</head>
<body>

    <button id="btn-start" class="btn-ativa" onclick="iniciarSistema()">🔱 REATIVAR SENTINELA V12</button>

    <div class="radar-global">
        <span>ESTADO: <span id="global-status">AGUARDANDO...</span></span>
        <span>SITUAÇÃO: <span id="global-situacao" style="color: var(--yellow);">SYNC...</span></span>
    </div>

    <div class="top-bar">
        <div>SENTINEL_V12 // SOBERANIA <span style="color: var(--green);">●</span></div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="nav-sistema">
        <button class="tab-link active" onclick="mudarTab(event, 'monitoramento')">🔱 Monitoramento</button>
        <button class="tab-link" onclick="mudarTab(event, 'patrimonio')">📊 Patrimônio</button>
    </div>

    <div class="container">
        <div id="monitoramento" class="tab-content"></div>
        <div id="patrimonio" class="tab-content" style="display:none;"></div>
    </div>

    <script>
        const JSON_STREAM = "https://late-sea-261d.siddney-almeidaa.workers.dev";
        // Moedas padrão para evitar tela preta
        let moedas = ["BTC", "ETH", "RENDER", "SOL", "NEAR", "LINK", "SEI", "POL", "ADA", "DOT"];
        let sparks = {}; 
        let candleCharts = {};

        function iniciarSistema() {
            document.getElementById('btn-start').style.display = 'none';
            // Passo 1: Desenha a tela IMEDIATAMENTE
            renderizarBase();
            // Passo 2: Busca os números no JSON
            sincronizarCerebro();
            setInterval(sincronizarCerebro, 10000);
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
        }

        async function sincronizarCerebro() {
            try {
                const response = await fetch(JSON_STREAM);
                const data = await response.json();

                document.getElementById('global-status').innerText = data.status_ia;
                document.getElementById('global-situacao').innerText = "ONLINE";
                document.getElementById('global-situacao').style.color = "var(--green)";

                const btcVar = data.moedas_mercado.find(m => m.id === "BTC").variacao_24h;

                data.moedas_mercado.forEach(moeda => {
                    const m = moeda.id;
                    const preco = moeda.valor_brl;
                    const varPct = moeda.variacao_24h;

                    ['m', 'p'].forEach(aba => {
                        const pEl = document.getElementById(`price-${aba}-${m}`);
                        const vEl = document.getElementById(`var-${aba}-${m}`);
                        if(pEl) pEl.innerText = preco.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
                        if(vEl) {
                            vEl.innerText = (varPct >= 0 ? "+" : "") + varPct.toFixed(2) + "%";
                            vEl.style.color = varPct >= 0 ? 'var(--green)' : 'var(--red)';
                        }
                        
                        // Sparklines de fundo
                        const s = sparks[`${aba}-${m}`];
                        if(s) {
                            s.data.datasets[0].data.push(preco);
                            if(s.data.datasets[0].data.length > 15) s.data.datasets[0].data.shift();
                            s.data.datasets[0].borderColor = varPct >= 0 ? '#00ff41' : '#ff3131';
                            s.update('none');
                        }
                    });

                    // NOTIFICAÇÃO DE FLUXO
                    let analise = varPct > btcVar ? (btcVar < 0 ? "REFÚGIO" : "INJETANDO") : "DRENANDO";
                    const fluxEl = document.getElementById(`fluxo-m-${m}`);
                    const card = document.getElementById(`card-m-${m}`).parentElement;
                    
                    if(fluxEl) {
                        fluxEl.innerText = analise;
                        fluxEl.style.color = analise === "DRENANDO" ? 'var(--red)' : (analise === "REFÚGIO" ? 'var(--blue)' : 'var(--green)');
                    }

                    // Se for REFÚGIO, o card brilha
                    if(analise === "REFÚGIO") card.classList.add('alerta-refugio');
                    else card.classList.remove('alerta-refugio');

                    // Patrimônio (P. Médio vindo do JSON)
                    if (data.meu_patrimonio[m]) {
                        const pmEl = document.getElementById(`pm-${m}`);
                        if(pmEl) pmEl.innerText = data.meu_patrimonio[m].preco_medio_automatico.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
                    }
                });
            } catch (e) {
                document.getElementById('global-situacao').innerText = "ERRO SYNC";
                document.getElementById('global-situacao').style.color = "var(--red)";
            }
        }

        function renderizarBase() {
            const layout = (m, aba) => `
                <div class="crypto-section" onclick="toggleCandle('${m}', '${aba}')">
                    <div class="market-info" id="card-${aba}-${m}">
                        <div>
                            <div class="coin-name">${m}</div>
                            <span class="fluxo-status" id="fluxo-${aba}-${m}">ANALISANDO...</span>
                        </div>
                        <div class="price-container" style="text-align:right">
                            <span class="price-big" id="price-${aba}-${m}">...</span>
                            <span class="var-percent" id="var-${aba}-${m}">0.00%</span>
                        </div>
                    </div>
                    <div class="chart-container"><canvas id="spark-${aba}-${m}"></canvas></div>
                    <div class="candle-view" id="candle-${aba}-${m}"></div>
                    ${aba === 'p' ? `
                    <div class="pat-details" onclick="event.stopPropagation()">
                        <div class="pnl-block">P. Médio (Worker)<div class="pnl-val" id="pm-${m}">R$ 0,00</div></div>
                        <div class="pnl-block">Status<div class="pnl-val" style="color:var(--green)">SINCRONIZADO</div></div>
                    </div>` : ''}
                </div>`;

            document.getElementById('monitoramento').innerHTML = moedas.map(m => layout(m, 'm')).join('');
            document.getElementById('patrimonio').innerHTML = moedas.map(m => layout(m, 'p')).join('');
            moedas.forEach(m => { initSpark(m, 'm'); initSpark(m, 'p'); });
        }

        function initSpark(m, aba) {
            const canvas = document.getElementById(`spark-${aba}-${m}`);
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            sparks[`${aba}-${m}`] = new Chart(ctx, {
                type: 'line',
                data: { labels: new Array(15).fill(''), datasets: [{ data: [], borderColor: '#00ff41', borderWidth: 2, fill: true, backgroundColor: 'rgba(0, 255, 65, 0.05)', tension: 0.4, pointRadius: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });
        }

        async function toggleCandle(m, aba) {
            const el = document.getElementById(`candle-${aba}-${m}`);
            if (el.classList.contains('open')) { el.classList.remove('open'); el.style.height = "0px"; return; }
            el.classList.add('open'); el.style.height = "320px";
            if (el.innerHTML === "") {
                const chart = LightweightCharts.createChart(el, { width: el.clientWidth, height: 300, layout: { backgroundColor: '#000', textColor: '#888' }, grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } }, timeScale: { borderColor: '#333' } });
                const series = chart.addCandlestickSeries({ upColor: '#00ff41', downColor: '#ff3131', borderVisible: false, wickUpColor: '#00ff41', wickDownColor: '#ff3131' });
                const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${m}USDT&interval=1m&limit=80`);
                const klines = await res.json();
                series.setData(klines.map(d => ({ time: d[0]/1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4]) })));
            }
        }

        function mudarTab(evt, n) {
            document.querySelectorAll(".tab-content").forEach(c => c.style.display = "none");
            document.querySelectorAll(".tab-link").forEach(l => l.classList.remove("active"));
            document.getElementById(n).style.display = "block";
            evt.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
