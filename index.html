<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL_V15.0 // OMNI_SOBERANIA</title>
    <style>
        :root { --bg: #020202; --card: #080808; --green: #00ff41; --red: #ff3131; --blue: #00e5ff; --gold: #ffdf00; --purple: #bc13fe; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        
        /* HEADER SUPREMO */
        .top-bar { background: #000; padding: 15px 20px; font-size: 10px; display: flex; justify-content: space-between; border-bottom: 2px solid #222; position: sticky; top: 0; z-index: 1000; }
        .btn-master { background: var(--gold); color: black; border: none; padding: 25px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 4px; font-size: 16px; box-shadow: 0 0 30px rgba(255, 223, 0, 0.2); }
        
        .pilar-fluxo { display: flex; gap: 10px; padding: 12px; background: #111; border-bottom: 1px solid #333; overflow-x: auto; }
        .pilar-tag { font-size: 9px; padding: 6px 12px; border: 1px solid #444; border-radius: 4px; color: var(--gold); white-space: nowrap; }

        /* CARDS COM EFEITO DE VIDRO */
        .container { padding: 10px; }
        .crypto-card { background: var(--card); border: 1px solid #222; border-radius: 15px; margin-bottom: 30px; position: relative; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); border-top: 5px solid #333; }
        .breakout-active { border-top-color: var(--green); box-shadow: 0 0 50px rgba(0, 255, 65, 0.15); filter: contrast(1.1); }
        
        .market-header { padding: 25px; display: flex; justify-content: space-between; align-items: flex-start; }
        .price-area .main-brl { font-size: 38px; font-weight: bold; letter-spacing: -2px; display: block; }
        .price-area .sub-usd { color: #555; font-size: 14px; margin-top: 5px; }
        
        .projection-badge { background: rgba(255, 223, 0, 0.1); color: var(--gold); padding: 8px 12px; border-radius: 6px; font-size: 11px; margin-top: 15px; border: 1px solid var(--gold); display: inline-block; font-weight: bold; }

        /* SENSORES LÓGICOS */
        .sensor-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 25px 25px; }
        .sensor { background: #121212; padding: 12px; border-radius: 8px; border: 1px solid #222; text-align: center; }
        .sensor label { display: block; font-size: 7px; color: #666; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .sensor span { font-size: 12px; font-weight: bold; }

        .status-pill { padding: 12px 25px; border-radius: 8px; font-size: 14px; font-weight: bold; text-align: center; min-width: 140px; }
        .chart-box { height: 500px; width: 100%; background: #000; border-top: 1px solid #222; border-radius: 0 0 15px 15px; }

        .terminal-log { background: #000; border-top: 2px solid var(--blue); padding: 15px; font-size: 11px; color: #aaa; height: 120px; overflow-y: auto; font-family: 'Consolas', monospace; }
        .log-line { margin-bottom: 6px; border-left: 2px solid #333; padding-left: 10px; }
    </style>
</head>
<body>

<button id="master-init" class="btn-master" onclick="despertarSoberania()">🔱 INJETAR OMNI-FUSÃO V15.0 [BÊNÇÃO S.P.A.]</button>

<div class="top-bar">
    <div>SENTINEL_V15 // NÚCLEO PREDITIVO</div>
    <div id="clock">08:00:00</div>
</div>

<div class="pilar-fluxo">
    <div class="pilar-tag">ESCASSÉZ: MONITORANDO</div>
    <div class="pilar-tag">UTILIDADE: VIGOR ATIVO</div>
    <div class="pilar-tag">SENTIMENTO: IA PREDITIVA</div>
    <div class="pilar-tag">CÂMBIO: BLINDAGEM S.P.A.</div>
</div>

<div class="container" id="monitor-core"></div>
<div class="terminal-log" id="oraculo-log">SISTEMA EM STANDBY... AGUARDANDO COMANDO DE VOZ...</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let soberaniaAtiva = false;
    let memoriaPrecos = {};
    let tetosVidro = {};
    let travasSinal = {};
    let dolarGlobal = 5.15;

    const moedas = [
        { id: "RENDER", pair: "RENDERUSDT" },
        { id: "NEAR", pair: "NEARUSDT" },
        { id: "BTC", pair: "BTCUSDT" },
        { id: "SOL", pair: "SOLUSDT" },
        { id: "FET", pair: "FETUSDT" }
    ];

    function logOraculo(txt, cor = "#888") {
        const log = document.getElementById('oraculo-log');
        log.innerHTML += `<div class="log-line" style="color:${cor}">[${new Date().toLocaleTimeString()}] ${txt.toUpperCase()}</div>`;
        log.scrollTop = log.scrollHeight;
        if(soberaniaAtiva) {
            window.speechSynthesis.cancel();
            const fala = new SpeechSynthesisUtterance(txt);
            fala.lang = 'pt-BR';
            fala.rate = 1.1;
            window.speechSynthesis.speak(fala);
        }
    }

    async function processarInteligencia() {
        try {
            const resD = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=USDTBRL');
            const dataD = await resD.json();
            dolarGlobal = parseFloat(dataD.price);

            for(let m of moedas) {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${m.pair}`);
                const data = await res.json();
                
                const pUSD = parseFloat(data.lastPrice);
                const pBRL = pUSD * dolarGlobal;
                const oBRL = parseFloat(data.openPrice) * dolarGlobal;
                const v24 = parseFloat(data.priceChangePercent);
                
                // CÁLCULO DE ACELERAÇÃO (VIGOR)
                const last = memoriaPrecos[m.id] || pBRL;
                const acel = ((pBRL - last) / last) * 100;
                memoriaPrecos[m.id] = pBRL;

                // TETO DE VIDRO E PROJEÇÃO
                if(!tetosVidro[m.id] || pBRL > tetosVidro[m.id]) tetosVidro[m.id] = pBRL;
                const target = pBRL * (1 + (Math.abs(v24)/100));

                // BLINDAGEM CAMBIAL (LUCRO REAL)
                const lucroReal = v24 + ((dolarGlobal - 5.15)/5.15)*100;

                const card = document.getElementById(`card-${m.id}`);
                const stat = document.getElementById(`stat-${m.id}`);
                
                // LÓGICA SUPREMA S.P.A.
                const isRompendo = pBRL >= (tetosVidro[m.id] * 0.999) && acel > 0.02;

                if (pBRL < oBRL) {
                    stat.innerText = "PULA (ENFERMEIRO)";
                    stat.style.color = "var(--red)";
                    card.classList.remove('breakout-active');
                    travasSinal[m.id] = 0;
                } else if (isRompendo || travasSinal[m.id] > 0) {
                    if(!travasSinal[m.id] || travasSinal[m.id] === 0) {
                        logOraculo(`Atenção S.P.A.! ${m.id} estraçalhou o teto de vidro. Benção de entrada detectada.`, "var(--green)");
                        travasSinal[m.id] = 10; 
                    } else { travasSinal[m.id]--; }
                    
                    stat.innerText = "ENTRA (EXPLOSÃO)";
                    stat.style.color = "var(--green)";
                    card.classList.add('breakout-active');
                } else {
                    stat.innerText = "AGUARDE";
                    stat.style.color = "var(--blue)";
                    card.classList.remove('breakout-active');
                }

                // ATUALIZA UI
                document.getElementById(`brl-${m.id}`).innerText = `R$ ${pBRL.toFixed(3)}`;
                document.getElementById(`usd-${m.id}`).innerText = `US$ ${pUSD.toFixed(3)}`;
                document.getElementById(`proj-${m.id}`).innerText = `ALVO FRACTAL: R$ ${target.toFixed(3)}`;
                document.getElementById(`luc-${m.id}`).innerText = `${lucroReal.toFixed(2)}%`;
                document.getElementById(`vig-${m.id}`).innerText = `${(Math.abs(acel)*10).toFixed(2)}%`;
                document.getElementById(`sent-${m.id}`).innerText = acel > 0.02 ? "EUFORIA" : "ESTÁVEL";
            }
        } catch(e) { console.log("BUSCANDO DADOS..."); }
    }

    function initUI() {
        document.getElementById('monitor-core').innerHTML = moedas.map(m => `
            <div class="crypto-card" id="card-${m.id}">
                <div class="market-header">
                    <div class="price-area">
                        <span style="font-size:9px; color:var(--gold)">${m.id} // PADRÃO OURO S.P.A.</span>
                        <span class="main-brl" id="brl-${m.id}">R$ ...</span>
                        <span class="sub-usd" id="usd-${m.id}">US$ ...</span>
                        <div class="projection-badge" id="proj-${m.id}">PROJETANDO ALVO...</div>
                    </div>
                    <div id="stat-${m.id}" class="status-pill">---</div>
                </div>
                <div class="sensor-grid">
                    <div class="sensor"><label>Lucro Real</label><span id="luc-${m.id}">0.00%</span></div>
                    <div class="sensor"><label>Vigor (Volat)</label><span id="vig-${m.id}">0.00%</span></div>
                    <div class="sensor"><label>Sentimento</label><span id="sent-${m.id}">---</span></div>
                </div>
                <div class="chart-box" id="chart-${m.id}"></div>
            </div>
        `).join('');
    }

    function despertarSoberania() {
        soberaniaAtiva = true;
        document.getElementById('master-init').style.display = 'none';
        initUI();
        logOraculo("Omni-Fusão S.P.A. Concluída. O Oráculo está abençoando o pátio. Inteligência V15 ativada.", "var(--gold)");
        moedas.forEach(m => {
            new TradingView.widget({
                "autosize": true, "symbol": m.pair, "interval": "1", "theme": "dark", "container_id": `chart-${m.id}`, "hide_side_toolbar": true, "library_path": "https://s3.tradingview.com/tv.js"
            });
        });
        setInterval(processarInteligencia, 7000);
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
    }
</script>
</body>
</html>
