<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL_V12 // SOBERANIA</title>
    <style>
        :root { --bg: #050505; --card: #111; --green: #00ff41; --red: #ff3131; --blue: #00e5ff; --text: #888; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }

        /* Status Bar Superior (Das fotos) */
        .status-bar { background: #000; padding: 8px 15px; display: flex; justify-content: space-around; font-size: 10px; font-weight: bold; border-bottom: 1px solid #222; }
        .info-top { color: var(--blue); }
        .info-val { color: var(--green); }

        /* Header Principal */
        .header { background: #000; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; }
        .logo { font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .clock { font-size: 11px; color: white; }

        /* Navegação */
        .nav { display: flex; background: #000; border-bottom: 2px solid #222; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 11px; font-weight: bold; text-transform: uppercase; color: var(--text); border: none; background: none; cursor: pointer; }
        .tab.active { color: var(--green); border-bottom: 3px solid var(--green); background: #080808; }

        .container { padding: 10px; }

        /* Card Estilo Imagem - COM CLIQUE PARA GRÁFICO */
        .card { background: var(--card); border: 1px solid #222; border-radius: 8px; margin-bottom: 10px; position: relative; border-left: 4px solid #333; overflow: hidden; cursor: pointer; }
        .card:hover { border-color: #333; }
        
        .market-info { padding: 15px; display: flex; justify-content: space-between; align-items: flex-start; }
        .coin-id { font-size: 16px; font-weight: 900; }
        .coin-pair { font-size: 9px; color: #555; display: block; margin-top: 2px; }
        .price { font-size: 24px; font-weight: bold; margin-top: 5px; }
        .change { font-size: 12px; font-weight: bold; margin-top: 5px; }
        .change.up { color: var(--green); }
        .change.down { color: var(--red); }

        /* Status S.P.A. e LEDs */
        .spa-status { position: absolute; right: 15px; top: 15px; text-align: right; }
        .spa-label { font-size: 10px; font-weight: 900; display: block; }
        .led { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-top: 5px; }

        .led-green { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .led-red { background: var(--red); box-shadow: 0 0 10px var(--red); }
        .led-blue { background: var(--blue); box-shadow: 0 0 10px var(--blue); }

        /* Área do Gráfico (Y) */
        .chart-container { height: 0; width: 100%; background: #000; overflow: hidden; transition: height 0.4s ease; border-top: 0 solid #222; }
        .chart-container.active { height: 400px; border-top-width: 1px; }

        .btn-ativa { background: var(--green); color: black; border: none; padding: 25px; width: 100%; font-weight: 900; font-size: 14px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<button id="btn-init" class="btn-ativa" onclick="boot()">🔱 INICIAR SENTINEL V12 // SOBERANIA</button>

<div class="status-bar">
    <span>ESTADO: <span class="info-val" id="st-mercado">SINC...</span></span>
    <span>DOMÍNIO BTC: <span class="info-top" id="st-dom">--%</span></span>
    <span>FLUXO: <span class="info-val" id="st-fluxo">AGUARDANDO</span></span>
</div>

<div class="header">
    <div class="logo">SENTINEL_V12 // SOBERANIA <span id="hb" style="color:var(--green)">●</span></div>
    <div class="clock" id="timer">00:00:00</div>
</div>

<div class="nav">
    <button class="tab active">🔱 MONITORAMENTO</button>
    <button class="tab">📊 PATRIMÔNIO</button>
</div>

<div class="container" id="app"></div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    const moedas = ["BTC", "ETH", "RENDER", "SOL", "NEAR", "ADA"];
    let history = {};
    let activeCharts = {}; // Para gerenciar os gráficos abertos

    function boot() {
        document.getElementById('btn-init').style.display = 'none';
        renderCards();
        sync();
        setInterval(sync, 10000);
        setInterval(() => { document.getElementById('timer').innerText = new Date().toLocaleTimeString(); }, 1000);
    }

    function renderCards() {
        document.getElementById('app').innerHTML = moedas.map(m => `
            <div class="card" id="card-${m}">
                <div class="market-info" onclick="toggleChart('${m}')">
                    <div>
                        <span class="coin-id">${m}</span>
                        <span class="coin-pair">USDT / BRL</span>
                        <div class="price" id="p-${m}">R$ 0,00</div>
                        <div class="change" id="v-${m}">+0.00%</div>
                    </div>
                    <div class="spa-status">
                        <span class="spa-label" id="txt-${m}">ANALISANDO...</span>
                        <div class="led" id="led-${m}"></div>
                    </div>
                </div>
                <div class="chart-container" id="chart-area-${m}"></div>
            </div>
        `).join('');
    }

    // Função para abrir/fechar o gráfico sob demanda
    function toggleChart(id) {
        const areaLogica = document.getElementById(`chart-area-${id}`);
        const cardLogico = document.getElementById(`card-${id}`);

        if (areaLogica.classList.contains('active')) {
            // Fecha o gráfico para economizar
            areaLogica.classList.remove('active');
            cardLogico.style.borderLeftColor = "#333";
            // Opcional: Destruir o widget para liberar memória real (requer lógica extra do TV API)
        } else {
            // Abre o gráfico
            areaLogica.classList.add('active');
            cardLogico.style.borderLeftColor = "var(--green)";
            
            // Cria o widget se ele ainda não existir nessa aba
            if (!activeCharts[id]) {
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "BINANCE:"+id+"USDT", // Puxa direto da Binance
                    "interval": "1", // 1 Minuto para Scalping
                    "theme": "dark",
                    "style": "1",
                    "locale": "br",
                    "container_id": `chart-area-${id}`,
                    "hide_side_toolbar": true,
                    "allow_symbol_change": false,
                    "save_image": false,
                    "studies": [
                        "RSI@tv-basicstudies",
                        "MASimple@tv-basicstudies"
                    ]
                });
                activeCharts[id] = true; // Marca como criado
            }
        }
    }

    async function sync() {
        try {
            const hb = document.getElementById('hb');
            hb.style.opacity = '0.3';

            document.getElementById('st-dom').innerText = "52.4%";
            document.getElementById('st-mercado').innerText = "ALTISTA";
            document.getElementById('st-fluxo').innerText = "ENTRANDO";

            for (let s of moedas) {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${s}USDT`);
                const data = await res.json();
                
                const precoBrl = parseFloat(data.lastPrice) * 5.45; // Ajuste o câmbio aqui
                const varPerc = parseFloat(data.priceChangePercent);
                const isVerde = parseFloat(data.lastPrice) >= parseFloat(data.openPrice);
                
                const last = history[s] || precoBrl;
                const accel = ((precoBrl - last) / last) * 100;
                history[s] = precoBrl;

                if(document.getElementById(`p-${s}`)) {
                    document.getElementById(`p-${s}`).innerText = precoBrl.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
                    const vEl = document.getElementById(`v-${s}`);
                    vEl.innerText = (varPerc >= 0 ? "+" : "") + varPerc.toFixed(2) + "%";
                    vEl.className = `change ${varPerc >= 0 ? 'up' : 'down'}`;

                    const led = document.getElementById(`led-${s}`);
                    const txt = document.getElementById(`txt-${s}`);
                    
                    if (!isVerde) {
                        led.className = "led led-red";
                        txt.innerText = "PULA";
                        txt.style.color = "var(--red)";
                    } else if (accel > 0.01) {
                        led.className = "led led-green";
                        txt.innerText = "ENTRA";
                        txt.style.color = "var(--green)";
                    } else {
                        led.className = "led led-blue";
                    }
                }
            }
            hb.style.opacity = '1';
        } catch (e) { console.error("SYNC..."); }
    }
</script>
</body>
</html>
