<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL_V12 // SOBERANIA</title>
    <style>
        :root { 
            --bg: #000; 
            --card: #0a0a0a; 
            --green-nitido: #2ecc71; 
            --red-nitido: #e74c3c;   
            --border-dark: #1a1a1a; 
            --glass: rgba(10, 10, 10, 0.9);
        }
        body { background: var(--bg); color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* CABEÇALHO EVOLUÍDO E ACUMULADO */
        .st-bar { 
            display: flex; flex-direction: column;
            padding: 15px 20px; border-bottom: 1px solid var(--border-dark); 
            background: var(--glass); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000;
        }
        
        .st-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .st-metrics { display: flex; justify-content: space-between; gap: 10px; border-top: 1px solid #111; padding-top: 10px; }
        
        .stat-box { display: flex; flex-direction: column; }
        .stat-label { font-size: 8px; font-weight: 900; color: #444; text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { font-size: 10px; font-weight: 900; font-family: monospace; }

        /* CENTRAL DE NOTIFICAÇÕES */
        .notif-bell { position: relative; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .notif-dot { width: 6px; height: 6px; background: var(--red-nitido); border-radius: 50%; position: absolute; top: -2px; right: -2px; display: none; }
        .notif-text { font-size: 9px; font-weight: 900; color: #666; max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .pulse { animation: pulse-glow 2s infinite ease-in-out; }
        @keyframes pulse-glow { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        .head { padding: 12px 15px; display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; color: #333; }

        .nav { display: flex; border-bottom: 1px solid var(--border-dark); background: #050505; }
        .n-btn { flex: 1; padding: 18px; text-align: center; font-size: 11px; font-weight: 900; color: #333; background: none; border: none; }
        .n-btn.active { color: var(--green-nitido); border-bottom: 3px solid var(--green-nitido); }

        .container { padding: 10px; }
        
        .c-asset { 
            background: var(--card); border: 1px solid var(--border-dark);
            border-radius: 10px; margin-bottom: 8px; padding: 18px 15px; 
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }

        .side-pill {
            position: absolute; left: 8px; top: 18%; bottom: 18%; width: 5px;
            border-radius: 20px; background: #222; transition: all 0.3s ease;
        }

        .asset-row { display: flex; align-items: center; justify-content: space-between; width: 100%; padding-left: 15px; }
        .a-left { display: flex; flex-direction: column; }
        .a-sym { font-size: 20px; font-weight: 900; color: #ffffff; letter-spacing: -0.5px; }
        .a-pair { font-size: 9px; color: #555; margin-top: 3px; font-weight: 900; }

        .a-right { text-align: right; }
        .a-price { font-size: 21px; font-weight: 900; color: #ffffff; letter-spacing: -0.5px; }
        
        .status-box { display: flex; align-items: center; gap: 6px; justify-content: flex-end; margin-top: 5px; }
        .a-pct { font-size: 13px; font-weight: 900; }
        .flow-tag { font-size: 8px; font-weight: 900; padding: 2px 5px; border-radius: 4px; background: #121212; border: 1px solid #1a1a1a; color: #555; }

        .pos-bg { background: var(--green-nitido) !important; box-shadow: 0 0 10px rgba(46, 204, 113, 0.2); }
        .neg-bg { background: var(--red-nitido) !important; }
        .pos-txt { color: var(--green-nitido) !important; }
        .neg-txt { color: var(--red-nitido) !important; }

        .chart-box { display: none; width: 100%; height: 450px; margin-top: 15px; border-top: 1px solid var(--border-dark); }
        .c-asset.open .chart-box { display: block; }
    </style>
</head>
<body>

<div class="st-bar" id="main-header">
    <div class="st-top-row">
        <div style="font-size: 10px; font-weight: 900; letter-spacing: 1px;">SENTINEL // SOBERANIA</div>
        <div class="notif-bell" id="bell">
            <span class="notif-text" id="last-alert">SISTEMA ONLINE</span>
            <div class="notif-dot" id="dot"></div>
            <span style="font-size: 12px;">🔔</span>
        </div>
    </div>
    <div class="st-metrics">
        <div class="stat-box">
            <span class="stat-label">Organismo</span>
            <span class="stat-val pulse" id="mkt-status">ANALISANDO</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Domínio BTC</span>
            <span class="stat-val" id="btc-dom">--%</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Fluxo Ativo</span>
            <span class="stat-val pulse" id="mkt-flow">ESTÁVEL</span>
        </div>
    </div>
</div>

<div class="head">
    <div>V12_OPERACIONAL <span class="pos-txt">●</span></div>
    <div id="clock">04:07:15</div>
</div>

<div class="nav">
    <button class="n-btn active">🔱 MONITORAMENTO</button>
    <button class="n-btn">📊 PATRIMÔNIO</button>
</div>

<div class="container" id="list"></div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    const coins = ["BTC", "ETH", "RENDER", "SOL", "NEAR", "SEI", "POL", "ADA", "DOT", "FET"];
    let usdRate = 5.50;

    function pushAlert(msg) {
        const alertEl = document.getElementById('last-alert');
        const dot = document.getElementById('dot');
        alertEl.innerText = msg.toUpperCase();
        dot.style.display = 'block';
        setTimeout(() => { dot.style.display = 'none'; }, 3000);
    }

    async function sync() {
        try {
            const rRate = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=USDTBRL');
            const dRate = await rRate.json();
            usdRate = parseFloat(dRate.price);

            let totalPct = 0;

            for (let s of coins) {
                const pair = s + 'USDT';
                const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${pair}`);
                const data = await res.json();
                
                const brl = parseFloat(data.lastPrice) * usdRate;
                const pct = parseFloat(data.priceChangePercent);
                totalPct += pct;
                const dec = brl < 1 ? 4 : 2;
                
                let card = document.getElementById(`card-${s}`);
                if (!card) {
                    card = document.createElement('div');
                    card.id = `card-${s}`;
                    card.className = `c-asset`;
                    card.onclick = () => toggle(s);
                    card.innerHTML = `
                        <div class="side-pill" id="pill-${s}"></div>
                        <div class="asset-row">
                            <div class="a-left">
                                <span class="a-sym">${s}</span>
                                <span class="a-pair">USDT / BRL</span>
                            </div>
                            <div class="a-right">
                                <div class="a-price" id="pr-${s}">R$ 0,00</div>
                                <div class="status-box">
                                    <span class="flow-tag" id="tag-${s}">AGUARDANDO</span>
                                    <span class="a-pct" id="pct-${s}">0.00%</span>
                                </div>
                            </div>
                        </div>
                        <div class="chart-box" id="tv-${s}"></div>
                    `;
                    document.getElementById('list').appendChild(card);
                }

                const isPos = pct >= 0;
                const pill = document.getElementById(`pill-${s}`);
                const tag = document.getElementById(`tag-${s}`);
                
                pill.className = `side-pill ${isPos ? 'pos-bg' : 'neg-bg'}`;
                
                // Lógica de Notificações e Tags de Fluxo
                if (pct > 3) {
                    tag.innerText = "ENTRA | ALVO";
                    tag.className = "flow-tag pos-txt";
                    if(s !== "BTC") pushAlert(`Fluxo forte em ${s}`);
                } else if (pct < -2.5) {
                    tag.innerText = "PULA | P/ BTC";
                    tag.className = "flow-tag neg-txt";
                } else {
                    tag.innerText = "LATERAL";
                    tag.className = "flow-tag";
                }

                const pEl = document.getElementById(`pct-${s}`);
                pEl.innerText = (isPos ? "+" : "") + pct.toFixed(2) + "%";
                pEl.className = `a-pct ${isPos ? 'pos-txt' : 'neg-txt'}`;
                document.getElementById(`pr-${s}`).innerText = "R$ " + brl.toLocaleString('pt-BR', {minimumFractionDigits: dec, maximumFractionDigits: dec});
            }

            // Atualiza Cabeçalho Dinâmico
            const mStatus = document.getElementById('mkt-status');
            const mFlow = document.getElementById('mkt-flow');
            const header = document.getElementById('main-header');

            if (totalPct > 5) {
                mStatus.innerText = "VIVO | ALTISTA";
                mStatus.className = "stat-val pulse pos-txt";
                mFlow.innerText = "ENTRANDO VOLUME";
                header.style.borderBottom = "1px solid rgba(46, 204, 113, 0.4)";
            } else if (totalPct < -5) {
                mStatus.innerText = "VIVO | BAIXISTA";
                mStatus.className = "stat-val pulse neg-txt";
                mFlow.innerText = "SAINDO CAPITAL";
                header.style.borderBottom = "1px solid rgba(231, 76, 60, 0.4)";
            }

        } catch (e) { }
    }

    function toggle(id) {
        const c = document.getElementById(`card-${id}`);
        c.classList.toggle('open');
        const containerId = `tv-${id}`;
        if (c.classList.contains('open') && document.getElementById(containerId).innerHTML === "") {
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:" + id + "USDT",
                "interval": "1",
                "theme": "dark",
                "container_id": containerId,
                "hide_side_toolbar": true,
                "studies": ["RSI@tv-basicstudies"]
            });
        }
    }

    sync();
    setInterval(sync, 5000);
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
