<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL_V11.5 // SOBERANIA_TOTAL</title>
    <style>
        :root { --bg-dark: #0a0a0a; --card-bg: #111; --text-gray: #666; --green: #00ff41; --yellow: #ffdf00; --red: #ff3131; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 0; overflow-y: auto; }
        
        .top-bar { background: #000; padding: 15px; font-size: 11px; display: flex; justify-content: space-between; color: var(--text-gray); border-bottom: 2px solid #222; position: sticky; top: 0; z-index: 100; }
        .btn-ativa { background: var(--green); color: black; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 14px; text-transform: uppercase; }
        
        .container { padding: 10px; }
        .crypto-section { background: var(--card-bg); border-radius: 8px; margin-bottom: 30px; border: 1px solid #222; overflow: hidden; }
        
        .market-info { padding: 20px; border-left: 8px solid #333; display: flex; justify-content: space-between; align-items: center; background: #151515; }
        .price-big { font-size: 28px; font-weight: bold; color: white; display: block; }
        .details { font-size: 10px; color: var(--green); line-height: 1.6; text-transform: uppercase; }
        
        .chart-container { height: 450px; width: 100%; background: #000; border-top: 1px solid #222; }
        
        .status-badge { font-weight: bold; padding: 5px 10px; border-radius: 3px; font-size: 12px; }
        .led { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-left: 10px; }
        .led-green { background: var(--green); box-shadow: 0 0 15px var(--green); }
        .led-yellow { background: var(--yellow); box-shadow: 0 0 15px var(--yellow); }
        .led-red { background: var(--red); box-shadow: 0 0 15px var(--red); }
    </style>
</head>
<body>

    <button id="btn-audio" class="btn-ativa" onclick="ativarAudio()">🔱 ATIVAR ORÁCULO E CARREGAR GRÁFICOS</button>

    <div class="top-bar">
        <span>SENTINEL_V11.5 // SOBERANIA_FINANCEIRA</span>
        <span id="clock">00:00:00</span>
    </div>

    <div class="container" id="main-content">
        </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);

        let audioAtivo = false;
        let lastStates = {}; 
        let lastPrices = {};
        let dolarReal = 5.15;
        let volatilityData = {};

        // Lista de moedas com o par direto para o gráfico e o símbolo para a API
        const moedas = [
            { id: "NEAR", pair: "BINANCE:NEARBRL", symbol: "NEARUSDT", alvo: 48.00 },
            { id: "BTC", pair: "BINANCE:BTCBRL", symbol: "BTCUSDT", alvo: 450000 },
            { id: "ETH", pair: "BINANCE:ETHBRL", symbol: "ETHUSDT", alvo: 22000 },
            { id: "SOL", pair: "BINANCE:SOLBRL", symbol: "SOLUSDT", alvo: 1200 },
            { id: "RENDER", pair: "BINANCE:RENDERBRL", symbol: "RENDERUSDT", alvo: 26.26 },
            { id: "ADA", pair: "BINANCE:ADABRL", symbol: "ADAUSDT", alvo: 5.50 },
            { id: "FET", pair: "BINANCE:FETUSDT", symbol: "FETUSDT", alvo: 15.00 }
        ];

        function ativarAudio() {
            audioAtivo = true;
            document.getElementById('btn-audio').style.display = 'none';
            speak("Oráculo ativado. Carregando todos os gráficos, Bigode.");
            initCharts();
        }

        function speak(text) {
            if (audioAtivo) {
                window.speechSynthesis.cancel();
                const ut = new SpeechSynthesisUtterance(text);
                ut.lang = 'pt-BR';
                ut.rate = 1.2; 
                window.speechSynthesis.speak(ut);
            }
        }

        function getSemaforoStatus(vol) {
            const v = Math.abs(vol);
            if (v >= 2 && v <= 6) return { text: 'ENTRA', color: '#00ff41', class: 'led-green' };
            if (v > 6 && v <= 10) return { text: 'PULA', color: '#ffdf00', class: 'led-yellow' };
            return { text: 'NÃO ENTRA', color: '#ff3131', class: 'led-red' };
        }

        async function fetchPrices() {
            try {
                // Sincronia de dólar real para evitar o erro do "USD R$ 5.00"
                const dRes = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=USDTBRL`);
                const dData = await dRes.json();
                dolarReal = parseFloat(dData.price);

                for(let m of moedas) {
                    const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${m.symbol}`);
                    const data = await res.json();
                    
                    if(data.lastPrice) {
                        let valBrl = parseFloat(data.lastPrice) * dolarReal; 
                        lastPrices[m.id] = valBrl;
                        volatilityData[m.id] = parseFloat(data.priceChangePercent);
                        
                        const status = getSemaforoStatus(volatilityData[m.id]);
                        if (lastStates[m.id] !== undefined && lastStates[m.id] !== status.text && status.text === 'ENTRA') {
                            speak(`${m.id} está no vigor.`);
                        }
                        lastStates[m.id] = status.text;
                    }
                }
                updateUIValues();
            } catch (e) { console.error("ERRO_SYNC_VIGOR"); }
        }

        function initUI() {
            document.getElementById('main-content').innerHTML = moedas.map(m => `
                <div class="crypto-section" id="section-${m.id}">
                    <div class="market-info" id="info-${m.id}">
                        <div>
                            <span style="color:#666; font-weight:bold; font-size:14px;">${m.id} // MONITORAMENTO</span>
                            <span class="price-big" id="price-${m.id}">R$ ...</span>
                            <div class="details" id="details-${m.id}">AGUARDANDO SINAL...</div>
                        </div>
                        <div style="text-align:right">
                            <span class="status-badge" id="status-${m.id}">---</span>
                            <div class="led" id="led-${m.id}"></div>
                        </div>
                    </div>
                    <div class="chart-container" id="chart-${m.id}"></div>
                </div>
            `).join('');
        }

        function initCharts() {
            moedas.forEach(m => {
                new TradingView.widget({
                    "autosize": true,
                    "symbol": m.pair,
                    "interval": "1",
                    "timezone": "America/Sao_Paulo",
                    "theme": "dark",
                    "style": "1",
                    "locale": "br",
                    "container_id": `chart-${m.id}`,
                    "hide_side_toolbar": true,
                    "allow_symbol_change": false,
                    "save_image": false
                });
            });
        }

        function updateUIValues() {
            moedas.forEach(m => {
                const price = lastPrices[m.id];
                const vol = volatilityData[m.id] || 0;
                const status = getSemaforoStatus(vol);
                const potencial = price ? (((m.alvo - price) / price) * 100).toFixed(0) : 0;

                const priceEl = document.getElementById(`price-${m.id}`);
                const detailsEl = document.getElementById(`details-${m.id}`);
                const statusEl = document.getElementById(`status-${m.id}`);
                const ledEl = document.getElementById(`led-${m.id}`);
                const infoEl = document.getElementById(`info-${m.id}`);

                if(priceEl) priceEl.innerText = price ? price.toLocaleString('pt-BR', {style:'currency', currency:'BRL'}) : '...';
                if(detailsEl) detailsEl.innerHTML = `POTENCIAL: +${potencial}% | VOLAT: ${vol.toFixed(2)}% | USD REAL: R$ ${dolarReal.toFixed(2)}`;
                if(statusEl) {
                    statusEl.innerText = status.text;
                    statusEl.style.color = status.color;
                }
                if(ledEl) ledEl.className = `led ${status.class}`;
                if(infoEl) infoEl.style.borderLeftColor = status.color;
            });
        }

        initUI();
        setInterval(fetchPrices, 5000);
        fetchPrices();
    </script>
</body>
</html>
