<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL_V12 // SOBERANIA_S.P.A.</title>
    <style>
        :root { --bg-dark: #000000; --card-bg: #050505; --text-gray: #888; --green: #00ff41; --yellow: #ffdf00; --red: #ff3131; --blue: #00e5ff; --border: #111; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        
        /* Interface Ultra Leve */
        .top-bar { background: #000; padding: 12px; font-size: 11px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-sistema { display: flex; background: #000; border-bottom: 1px solid var(--border); }
        .tab-link { flex: 1; padding: 15px; border: none; background: none; color: var(--text-gray); cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .tab-link.active { color: var(--green); background: #080808; border-bottom: 2px solid var(--green); }

        .btn-ativa { background: var(--green); color: black; border: none; padding: 20px; width: 100%; font-weight: 900; cursor: pointer; font-size: 14px; text-transform: uppercase; }
        .btn-refresh { background: #000; color: var(--green); border: 1px solid var(--green); padding: 4px 12px; cursor: pointer; font-size: 10px; border-radius: 2px; }
        
        .container { padding: 10px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Card Otimizado para Bateria */
        .crypto-section { background: var(--card-bg); border-radius: 6px; margin-bottom: 12px; border: 1px solid var(--border); overflow: hidden; transition: border 0.3s; }
        .market-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-left: 4px solid #222; }
        .coin-name { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; }
        .price-big { font-size: 22px; font-weight: 900; color: #fff; display: block; }
        .details { font-size: 9px; color: var(--text-gray); text-transform: uppercase; margin-top: 4px; }
        
        /* Volume Minimalista */
        .vol-container { width: 100%; background: #111; height: 3px; border-radius: 2px; margin-top: 10px; position: relative; }
        .vol-bar { height: 100%; background: var(--blue); width: 0%; transition: width 0.8s; }
        .ghost-peak { position: absolute; top: 0; width: 2px; height: 100%; background: #fff; opacity: 0.5; }

        /* Gráfico Reduzido */
        .chart-container { height: 350px; width: 100%; background: #000; display: none; border-top: 1px solid var(--border); }
        .chart-container.active { display: block; }

        .status-badge { font-weight: 900; font-size: 11px; }
        .led { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-left: 8px; }
        .pulse { animation: pulse-animation 1.5s infinite; }
        @keyframes pulse-animation { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Alertas */
        .alerta-divergencia { border-color: var(--yellow) !important; }
        .led-green { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .led-yellow { background: var(--yellow); }
        .led-red { background: var(--red); }
        .led-blue { background: var(--blue); }
    </style>
</head>
<body>

    <button id="btn-audio" class="btn-ativa" onclick="ativarAudio()">🔱 INICIAR SENTINEL V12 [MODO ECONÔMICO]</button>

    <div class="nav-sistema">
        <button class="tab-link active" onclick="mudarTab(event, 'monitoramento')">🔱 Monitor</button>
        <button class="tab-link" onclick="mudarTab(event, 'patrimonio')">📊 Assets</button>
    </div>

    <div class="top-bar">
        <div>SENTINEL_V12 // <span id="heartbeat" style="color: var(--green);">SYNC</span></div>
        <div>
            <button class="btn-refresh" onclick="fetchPrices()">REF ⟳</button>
            <span id="clock" style="margin-left: 10px;">00:00:00</span>
        </div>
    </div>

    <div class="container">
        <div id="monitoramento" class="tab-content active">
            <div id="main-content"></div>
        </div>
        <div id="patrimonio" class="tab-content">
            <div style="background: #050505; border: 1px solid #111; padding: 20px; border-radius: 6px;">
                <span style="color: var(--blue); font-size: 11px; font-weight: bold;">PNL ATUAL: RENDER</span>
                <div style="display: flex; justify-content: space-between; margin-top: 15px;">
                    <div><small style="color:#444">VALOR</small><div id="pnl-total" style="font-size: 18px; font-weight: bold;">R$ 0,00</div></div>
                    <div><small style="color:#444">PERF</small><div id="pnl-perc" style="font-size: 18px; font-weight: bold;">0%</div></div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // MANTENDO TODA A SUA LÓGICA X e Y
        const MEU_PRECO_MEDIO = 9.59;
        const MINHA_QUANTIDADE = 3.996;
        const VOL_REF_GLOBAL = 500000000; 

        let audioAtivo = false;
        let lastStates = {}; 
        let lastPrices = {};
        let priceHistory = {};
        let dolarReal = 5.15;
        let volatilityData = {};
        let volumeData = {};
        let ghostPeaks = {}; 

        const moedas = [
            { id: "BTC", pair: "BTCUSDT" },
            { id: "ETH", pair: "ETHUSDT" },
            { id: "RENDER", pair: "RENDERUSDT" },
            { id: "NEAR", pair: "NEARUSDT" },
            { id: "SOL", pair: "SOLUSDT" },
            { id: "FET", pair: "FETUSDT" },
            { id: "ADA", pair: "ADAUSDT" }
        ];

        function mudarTab(evt, nomeTab) {
            document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
            document.querySelectorAll(".tab-link").forEach(l => l.classList.remove("active"));
            document.getElementById(nomeTab).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);

        // SUA LÓGICA S.P.A. INTACTA
        function getSemaforoStatus(m_id, vol, preco, candleColor, acceleration) {
            if (candleColor === 'VERMELHO') return { text: 'PULA', color: 'var(--red)', class: 'led-red', msg: 'OFF' };
            if (candleColor === 'VERDE' && acceleration <= 0.01) return { text: 'AGUARDE', color: 'var(--blue)', class: 'led-blue', msg: 'LATERAL' };
            if (candleColor === 'VERDE' && acceleration > 0.01) return { text: 'ENTRA', color: 'var(--green)', class: 'led-green pulse', msg: 'EXPLOSÃO' };
            return { text: 'PULA', color: 'var(--text-gray)', class: 'led', msg: '...' };
        }

        async function fetchPrices() {
            try {
                const btcRes = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT`);
                const btcData = await btcRes.json();
                const btcVol = parseFloat(btcData.priceChangePercent);

                for(let m of moedas) {
                    const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${m.pair}`);
                    const data = await res.json();
                    if(data.lastPrice) {
                        const precoAtual = parseFloat(data.lastPrice);
                        const accel = ((precoAtual - (priceHistory[m.id] || precoAtual)) / (priceHistory[m.id] || precoAtual)) * 100;
                        priceHistory[m.id] = precoAtual;
                        lastPrices[m.id] = precoAtual * 5.45;
                        volumeData[m.id] = parseFloat(data.quoteVolume);
                        const status = getSemaforoStatus(m.id, 0, 0, (precoAtual >= parseFloat(data.openPrice) ? 'VERDE' : 'VERMELHO'), accel);
                        
                        m.currentStatus = status;
                        m.currentAccel = accel;
                    }
                }
                updateUI();
            } catch (e) { console.error("SYNC..."); }
        }

        function updateUI() {
            moedas.forEach(m => {
                const elPreco = document.getElementById(`price-${m.id}`);
                if(elPreco) {
                    elPreco.innerText = lastPrices[m.id].toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
                    document.getElementById(`led-${m.id}`).className = `led ${m.currentStatus.class}`;
                    document.getElementById(`status-${m.id}`).innerText = m.currentStatus.text;
                    document.getElementById(`status-${m.id}`).style.color = m.currentStatus.color;
                    document.getElementById(`vol-bar-${m.id}`).style.width = `${Math.min((volumeData[m.id]/VOL_REF_GLOBAL)*100, 100)}%`;
                }
            });
            // Atualiza Patrimônio RENDER
            const p = lastPrices['RENDER'];
            const total = p * MINHA_QUANTIDADE;
            document.getElementById('pnl-total').innerText = total.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            document.getElementById('pnl-perc').innerText = `${((total - (9.59*3.996))/(9.59*3.996)*100).toFixed(2)}%`;
        }

        function toggleChart(id) {
            const chart = document.getElementById(`chart-${id}`);
            chart.classList.toggle('active');
            if(chart.classList.contains('active') && chart.innerHTML === "") {
                new TradingView.widget({
                    "autosize": true, "symbol": "BINANCE:"+id+"USDT", "interval": "1", "theme": "dark", 
                    "container_id": `chart-${id}`, "hide_side_toolbar": true
                });
            }
        }

        function ativarAudio() {
            document.getElementById('btn-audio').style.display = 'none';
            document.getElementById('main-content').innerHTML = moedas.map(m => `
                <div class="crypto-section">
                    <div class="market-info" onclick="toggleChart('${m.id}')">
                        <div>
                            <span class="coin-name">${m.id}</span>
                            <div class="price-big" id="price-${m.id}">...</div>
                            <div class="vol-container"><div class="vol-bar" id="vol-bar-${m.id}"></div></div>
                        </div>
                        <div style="text-align:right">
                            <div class="status-badge" id="status-${m.id}">---</div>
                            <div class="led" id="led-${m.id}"></div>
                        </div>
                    </div>
                    <div class="chart-container" id="chart-${m.id}"></div>
                </div>`).join('');
            fetchPrices();
            setInterval(fetchPrices, 10000);
        }
    </script>
</body>
</html>
