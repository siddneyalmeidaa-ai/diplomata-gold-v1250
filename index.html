<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL_V19 // BLINDAGEM_S.P.A.</title>
    <style>
        :root { 
            --bg: #030303; --card: #0d0d0d; --green: #00ff41; --red: #ff3131; 
            --blue: #00e5ff; --gold: #d4af37; --warn: #ff8c00; --gray: #222;
        }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', Courier, monospace; margin: 0; font-size: 13px; }
        
        .header-soberano { background: #000; padding: 20px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 999; }
        .system-status { display: flex; gap: 20px; font-size: 10px; color: var(--gold); }
        
        .tabs { display: flex; background: #050505; border-bottom: 1px solid var(--gray); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #555; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .tab-btn.active { color: var(--green); border-bottom: 2px solid var(--green); background: #0a0a0a; }

        .btn-full { background: var(--green); color: #000; border: none; padding: 25px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; letter-spacing: 5px; }

        .market-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: var(--card); border: 1px solid var(--gray); border-radius: 8px; overflow: hidden; position: relative; transition: 0.3s; }
        .blindado { border-top: 4px solid var(--green); box-shadow: 0 0 30px rgba(0, 255, 65, 0.05); }
        .alerta { border-top: 4px solid var(--warn); }

        .price-box { padding: 15px; background: #111; }
        .price-brl { font-size: 32px; font-weight: bold; }
        .alvo-seguro { font-size: 11px; color: var(--gold); margin-top: 5px; font-weight: bold; }

        .sensor-matrix { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .sensor-item { background: #050505; padding: 8px; border-radius: 4px; font-size: 10px; border: 1px solid #1a1a1a; }
        .sensor-item label { color: #444; display: block; font-size: 7px; margin-bottom: 2px; text-transform: uppercase; }

        .favelinha-container { padding: 15px; overflow-x: auto; }
        .favelinha-table { width: 100%; border-collapse: collapse; background: #000; border: 1px solid var(--gray); }
        .favelinha-table th { background: #0a0a0a; padding: 12px; color: var(--blue); font-size: 10px; text-align: left; }
        .favelinha-table td { padding: 10px; border-bottom: 1px solid #111; font-size: 11px; }

        .terminal-analista { background: #000; border-left: 5px solid var(--blue); height: 140px; margin: 15px; padding: 15px; overflow-y: auto; color: #aaa; font-size: 11px; line-height: 1.4; }
        .time-tag { color: var(--blue); font-weight: bold; margin-right: 10px; }
    </style>
</head>
<body>

<button id="trigger" class="btn-full" onclick="bootV19()">🔱 INJETAR MATRIZ DE BLINDAGEM V19.0 // S.P.A.</button>

<div class="header-soberano">
    <div>SENTINEL_V19 // ANALISTA_S.P.A.</div>
    <div class="system-status">
        <span>DÓLAR: <b id="val-dolar">R$ 5.15</b></span>
        <span>BTC VAR: <b id="val-btc">0.00%</b></span>
        <span>DOMINÂNCIA: <b id="val-dom">OK</b></span>
    </div>
    <div id="sys-clock" style="color: var(--blue)">00:00:00</div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="tab(event, 'pátio')">Pátio de Ativos</button>
    <button class="tab-btn" onclick="tab(event, 'favelinha')">Matriz Favelinha</button>
</div>

<div id="pátio" class="content-tab" style="display:block;">
    <div class="market-grid" id="grid-ativos"></div>
</div>

<div id="favelinha" class="content-tab" style="display:none;">
    <div class="favelinha-container">
        <table class="favelinha-table">
            <thead>
                <tr>
                    <th>ATIVO</th>
                    <th>PREÇO (BRL)</th>
                    <th>Δ DELTA</th>
                    <th>ALVO -50%</th>
                    <th>VOL/VSA</th>
                    <th>BLINDAGEM</th>
                </tr>
            </thead>
            <tbody id="fav-body"></tbody>
        </table>
    </div>
</div>

<div class="terminal-analista" id="log-analista">
    <div style="color:var(--gold)">AGUARDANDO CONEXÃO COM A REDE SOBERANA...</div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let soberano = false;
    let database = {};
    let tetos = {};
    let dolarReal = 5.15;

    const ativosOriginais = [
        { id: "BTC", pair: "BTCUSDT" }, { id: "ETH", pair: "ETHUSDT" },
        { id: "RENDER", pair: "RENDERUSDT" }, { id: "NEAR", pair: "NEARUSDT" },
        { id: "SOL", pair: "SOLUSDT" }, { id: "FET", pair: "FETUSDT" },
        { id: "DOGE", pair: "DOGEUSDT" }, { id: "POL", pair: "POLUSDT" },
        { id: "ADA", pair: "ADAUSDT" }, { id: "DOT", pair: "DOTUSDT" }
    ];

    function logAnalista(msg, cor = "#aaa") {
        const log = document.getElementById('log-analista');
        const t = new Date().toLocaleTimeString();
        // FILTRO DE ANALISTA FINANCEIRO
        let report = msg.replace("EXPLOSÃO", "ROMPIMENTO DE ESTRUTURA")
                        .replace("ENTRA", "ENTRADA TÉCNICA VALIDADA")
                        .replace("PULA", "RECUO ESTRUTURAL");

        log.innerHTML += `<div><span class="time-tag">[${t}]</span> <span style="color:${cor}">${report.toUpperCase()}</span></div>`;
        log.scrollTop = log.scrollHeight;
        if(soberano) {
            window.speechSynthesis.cancel();
            const f = new SpeechSynthesisUtterance(report);
            f.lang = 'pt-BR';
            f.rate = 0.95;
            window.speechSynthesis.speak(f);
        }
    }

    async function syncMatriz() {
        try {
            const dRes = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=USDTBRL');
            const dData = await dRes.json();
            dolarReal = parseFloat(dData.price);
            document.getElementById('val-dolar').innerText = `R$ ${dolarReal.toFixed(2)}`;

            const btcRes = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
            const btcData = await btcRes.json();
            const btcVar = parseFloat(btcData.priceChangePercent);
            document.getElementById('val-btc').innerText = `${btcVar.toFixed(2)}%`;

            let favHTML = "";

            for(let a of ativosOriginais) {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${a.pair}`);
                const data = await res.json();
                
                const precoUSD = parseFloat(data.lastPrice);
                const precoBRL = precoUSD * dolarReal;
                const last = database[a.id] || precoBRL;
                const acel = ((precoBRL - last) / last) * 100;
                database[a.id] = precoBRL;

                if(!tetos[a.id] || precoBRL > tetos[a.id]) tetos[a.id] = precoBRL;

                const var24 = parseFloat(data.priceChangePercent);
                const delta = a.id === 'BTC' ? 0 : (var24 - btcVar);
                const alvo = precoBRL + ((precoBRL * (Math.abs(var24)/100)) * 0.5);

                // LÓGICA DE BLINDAGEM
                let status = "AGUARDE";
                let corStatus = "#555";
                let blindado = false;

                if (precoBRL >= (tetos[a.id] * 0.999) && acel > 0.03 && delta > 0) {
                    status = "BLINDADO";
                    corStatus = "var(--green)";
                    blindado = true;
                    if(acel > 0.05) logAnalista(`${a.id}: Confirmação de rompimento. Delta positivo em ${delta.toFixed(2)}%. Alvo técnico em R$ ${alvo.toFixed(2)}.`, "var(--green)");
                } else if (precoBRL < (parseFloat(data.openPrice) * dolarReal)) {
                    status = "RISCO";
                    corStatus = "var(--red)";
                }

                // ATUALIZA UI CARD
                const card = document.getElementById(`card-${a.id}`);
                if(card) {
                    card.className = blindado ? "card blindado" : (status === "RISCO" ? "card alerta" : "card");
                    document.getElementById(`brl-${a.id}`).innerText = `R$ ${precoBRL.toFixed(3)}`;
                    document.getElementById(`alvo-${a.id}`).innerText = `ALVO S.P.A.: R$ ${alvo.toFixed(3)}`;
                    document.getElementById(`acc-${a.id}`).innerText = `${acel.toFixed(3)}%`;
                    document.getElementById(`delta-${a.id}`).innerText = `${delta.toFixed(2)}%`;
                }

                favHTML += `<tr>
                    <td><b>${a.id}</b></td>
                    <td>R$ ${precoBRL.toFixed(2)}</td>
                    <td style="color:var(--blue)">${delta.toFixed(2)}%</td>
                    <td style="color:var(--gold)">R$ ${alvo.toFixed(2)}</td>
                    <td>${acel > 0.03 ? 'ALTO' : 'NORMAL'}</td>
                    <td style="color:${corStatus}; font-weight:bold">${status}</td>
                </tr>`;
            }
            document.getElementById('fav-body').innerHTML = favHTML;
        } catch(e) { console.log("RETRY..."); }
    }

    function tab(e, id) {
        document.querySelectorAll('.content-tab').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        e.currentTarget.classList.add('active');
    }

    function bootV19() {
        soberano = true;
        document.getElementById('trigger').style.display = 'none';
        document.getElementById('grid-ativos').innerHTML = ativosOriginais.map(a => `
            <div class="card" id="card-${a.id}">
                <div class="price-box">
                    <span style="font-size:9px; color:var(--gold)">${a.id} // MATRIZ S.P.A.</span>
                    <div class="price-brl" id="brl-${a.id}">R$ ...</div>
                    <div class="alvo-seguro" id="alvo-${a.id}">PROCESSANDO ALVO...</div>
                </div>
                <div class="sensor-matrix">
                    <div class="sensor-item"><label>Aceleração</label><span id="acc-${a.id}">0.00%</span></div>
                    <div class="sensor-item"><label>Delta (BTC)</label><span id="delta-${a.id}">0.00%</span></div>
                </div>
                <div class="chart-container" id="chart-${a.id}"></div>
            </div>
        `).join('');

        logAnalista("Sistema V19.0 Operacional. Matriz de Blindagem e Cruzamento de Dados Ativada.", "var(--gold)");
        ativosOriginais.forEach(a => {
            new TradingView.widget({
                "autosize": true, "symbol": a.pair, "interval": "1", "theme": "dark", "container_id": `chart-${a.id}`, "hide_side_toolbar": true, "library_path": "https://s3.tradingview.com/tv.js"
            });
        });
        setInterval(syncMatriz, 6000);
        setInterval(() => { document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
    }
</script>
</body>
</html>
