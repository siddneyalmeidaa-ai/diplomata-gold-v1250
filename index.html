<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL_V12 // SOBERANIA_TOTAL</title>
    <style>
        :root { --bg-dark: #000000; --card-bg: #000000; --text-main: #ffffff; --text-dim: #888; --green: #00ff41; --yellow: #ffdf00; --red: #ff3131; --blue: #00e5ff; --border-line: #1a1a1a; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Top Bar & Radar */
        .top-bar { background: #000; padding: 12px; font-size: 11px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-line); position: sticky; top: 0; z-index: 100; }
        .radar-global { background: #000; padding: 10px; font-size: 10px; display: flex; justify-content: space-around; border-bottom: 1px solid var(--blue); color: var(--blue); font-weight: bold; }
        
        /* Nav */
        .nav-sistema { display: flex; background: #000; border-bottom: 2px solid #222; position: sticky; top: 43px; z-index: 99; }
        .tab-link { flex: 1; padding: 15px; border: none; background: none; color: var(--text-dim); cursor: pointer; font-size: 12px; font-weight: 800; text-transform: uppercase; }
        .tab-link.active { color: var(--green); border-bottom: 3px solid var(--green); }
        
        .btn-ativa { background: var(--green); color: black; border: none; padding: 25px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 14px; letter-spacing: 2px; }

        /* Container & Cards */
        .container { padding: 10px; }
        .crypto-section { background: var(--card-bg); margin-bottom: 2px; border-bottom: 1px solid var(--border-line); }
        .market-info { padding: 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .coin-name { font-size: 18px; font-weight: 900; color: #fff; }
        .price-big { font-size: 22px; font-weight: 900; color: #fff; text-align: right; }
        .var-percent { font-size: 12px; font-weight: bold; display: block; text-align: right; }

        /* Favelinha & Patrimonio Cards */
        .pat-card { background: var(--card-bg); border: 1px solid var(--border-line); margin-bottom: 15px; padding: 20px; border-left: 4px solid var(--blue); }
        .pat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; border-top: 1px solid #111; padding-top: 10px; }
        .label-pnl { font-size: 9px; color: var(--text-dim); text-transform: uppercase; font-weight: bold; }
        .val-pnl { font-size: 16px; font-weight: 900; color: #fff; }

        .favelinha-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 20px; }
        .favelinha-table th { text-align: left; padding: 10px; color: var(--blue); border-bottom: 1px solid #222; }
        .favelinha-table td { padding: 12px 10px; border-bottom: 1px solid #111; }
        
        .status-badge { font-weight: 900; padding: 4px 8px; border-radius: 2px; font-size: 9px; text-transform: uppercase; }
        .chart-wrapper { display: none; height: 400px; background: #000; }
        .chart-wrapper.open { display: block; }
    </style>
</head>
<body>

    <button id="btn-start" class="btn-ativa" onclick="conectarFluxo()">🔱 ATIVAR SENTINEL V12 // IPI FLUXO</button>

    <div class="radar-global">
        <span>ESTADO: <span id="global-status">---</span></span>
        <span>FLUXO ATIVO: <span id="global-target" style="color: var(--yellow);">...</span></span>
    </div>

    <div class="top-bar">
        <div>SENTINEL_V12 // <span id="clock">00:00:00</span></div>
        <div id="heartbeat" style="color: var(--green);">● ATIVO</div>
    </div>

    <div class="nav-sistema">
        <button class="tab-link active" onclick="mudarTab(event, 'monitoramento')">🔱 Monitoramento</button>
        <button class="tab-link" onclick="mudarTab(event, 'patrimonio')">📊 Favelinha & Saldo</button>
    </div>

    <div class="container">
        <div id="monitoramento" class="tab-content">
            <div id="main-content"></div>
        </div>

        <div id="patrimonio" class="tab-content" style="display:none;">
            <div id="lista-patrimonio"></div>
            
            <div style="margin-top: 25px; padding: 10px; border: 1px solid #1a1a1a;">
                <div style="font-size: 10px; font-weight: 900; color: var(--yellow); letter-spacing: 1px; margin-bottom: 10px;">RADAR FAVELINHA // INJEÇÃO DE CAPITAL</div>
                <table class="favelinha-table">
                    <thead><tr><th>MOEDA</th><th>FLUXO</th><th>INTENSIDADE</th><th>ALVO X</th></tr></thead>
                    <tbody id="favelinha-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let config = {};
        let prices = {};
        let btcVar = 0;
        let dolarReal = 5.30;
        const JSON_STREAM = "https://late-sea-261d.siddney-almeidaa.workers.dev";

        async function conectarFluxo() {
            try {
                // Em um cenário real, você buscaria do Worker. Aqui simulamos a estrutura que você pediu.
                // const response = await fetch(JSON_STREAM);
                // config = await response.json();
                
                // Estrutura Padrão Ouro para teste (Substituir pelo fetch real do Worker)
                config = {
                    meu_patrimonio: [
                        { id: "RENDER", aporte_brl: 1500, qtd: 156.40 },
                        { id: "SOL", aporte_brl: 2000, qtd: 2.15 }
                    ],
                    lista: [
                        { id: "BTC", pair: "BTCUSDT" }, { id: "ETH", pair: "ETHUSDT" },
                        { id: "RENDER", pair: "RENDERUSDT" }, { id: "SOL", pair: "SOLUSDT" },
                        { id: "NEAR", pair: "NEARUSDT" }, { id: "FET", pair: "FETUSDT" }
                    ]
                };

                document.getElementById('btn-start').style.display = 'none';
                ativarInterface();
                syncLoop();
                setInterval(syncLoop, 10000);
                setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
            } catch (e) { alert("Erro ao conectar no Fluxo JSON."); }
        }

        async function syncLoop() {
            try {
                const symbols = config.lista.map(m => m.pair);
                const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=["${symbols.join('","')}","USDTBRL"]`);
                const data = await res.json();
                
                dolarReal = parseFloat(data.find(x => x.symbol === "USDTBRL").lastPrice);
                const btc = data.find(x => x.symbol === "BTCUSDT");
                btcVar = parseFloat(btc.priceChangePercent);
                document.getElementById('global-status').innerText = btcVar >= 0 ? "ALTISTA" : "DRENAGEM";

                data.forEach(item => {
                    const coin = config.lista.find(c => c.pair === item.symbol);
                    if(coin) {
                        prices[coin.id] = parseFloat(item.lastPrice) * dolarReal;
                        prices[coin.id + "_var"] = parseFloat(item.priceChangePercent);
                        
                        // Atualiza Monitoramento Visual
                        if(document.getElementById(`price-${coin.id}`)) {
                            document.getElementById(`price-${coin.id}`).innerText = `R$ ${prices[coin.id].toFixed(2)}`;
                            const elV = document.getElementById(`var-${coin.id}`);
                            elV.innerText = (prices[coin.id+"_var"] >= 0 ? "+" : "") + prices[coin.id+"_var"].toFixed(2) + "%";
                            elV.style.color = prices[coin.id+"_var"] >= 0 ? 'var(--green)' : 'var(--red)';
                        }
                    }
                });

                renderPatrimonio();
                renderFavelinha();
            } catch (e) { console.log("Re-sincronizando..."); }
        }

        function renderPatrimonio() {
            let html = "";
            config.meu_patrimonio.forEach(item => {
                const pAtual = prices[item.id] || 0;
                const saldoVal = pAtual * item.qtd;
                const pMedio = item.aporte_brl / item.qtd;
                const lucro = saldoVal - item.aporte_brl;

                html += `
                    <div class="pat-card">
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <span style="font-size:20px; font-weight:900; color:var(--blue)">${item.id}</span>
                            <span style="color:${lucro >= 0 ? 'var(--green)' : 'var(--red)'}; font-weight:900">R$ ${lucro.toFixed(2)}</span>
                        </div>
                        <div class="pat-grid">
                            <div><span class="label-pnl">Aporte Real</span><div class="val-pnl">R$ ${item.aporte_brl.toFixed(2)}</div></div>
                            <div><span class="label-pnl">P. Médio (Auto)</span><div class="val-pnl">R$ ${pMedio.toFixed(2)}</div></div>
                            <div><span class="label-pnl">Saldo Atual</span><div class="val-pnl">R$ ${saldoVal.toFixed(2)}</div></div>
                            <div><span class="label-pnl">Performance</span><div class="val-pnl" style="color:${lucro>=0?'var(--green)':'var(--red)'}">${((lucro/item.aporte_brl)*100).toFixed(2)}%</div></div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('lista-patrimonio').innerHTML = html;
        }

        function renderFavelinha() {
            let html = "";
            config.lista.forEach(m => {
                const v = prices[m.id + "_var"] || 0;
                const p = prices[m.id] || 0;
                const intensidade = Math.abs(v * 10).toFixed(0);
                const status = v >= 0 ? "INJETANDO" : "DRENANDO";
                const cor = v >= 0 ? "var(--green)" : "var(--red)";

                html += `
                    <tr>
                        <td style="color:#fff; font-weight:900">${m.id}</td>
                        <td><span class="status-badge" style="background:${cor}; color:#000">${status}</span></td>
                        <td style="color:${cor}">${intensidade}%</td>
                        <td style="color:var(--yellow)">R$ ${(p * 1.05).toFixed(2)}</td>
                    </tr>
                `;
            });
            document.getElementById('favelinha-body').innerHTML = html;
        }

        function toggleChart(id, pair) {
            const w = document.getElementById(`wrapper-${id}`);
            if (w.classList.contains('open')) { w.classList.remove('open'); w.innerHTML = ""; }
            else {
                w.classList.add('open');
                w.innerHTML = `<div id="chart-${id}" style="height:100%"></div>`;
                new TradingView.widget({ "autosize": true, "symbol": pair, "interval": "15", "theme": "dark", "container_id": `chart-${id}`, "hide_side_toolbar": true, "library_path": "https://s3.tradingview.com/tv.js" });
            }
        }

        function ativarInterface() {
            document.getElementById('main-content').innerHTML = config.lista.map(m => `
                <div class="crypto-section">
                    <div class="market-info" onclick="toggleChart('${m.id}', '${m.pair}')">
                        <div class="coin-id"><span class="coin-name">${m.id}</span></div>
                        <div style="flex-grow:1; text-align:right">
                            <span class="price-big" id="price-${m.id}">...</span>
                            <span class="var-percent" id="var-${m.id}">0.00%</span>
                        </div>
                    </div>
                    <div class="chart-wrapper" id="wrapper-${m.id}"></div>
                </div>
            `).join('');
        }

        function mudarTab(evt, n) {
            document.querySelectorAll(".tab-content").forEach(c => c.style.display = "none");
            document.querySelectorAll(".tab-link").forEach(l => l.classList.remove("active"));
            document.getElementById(n).style.display = "block";
            evt.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
