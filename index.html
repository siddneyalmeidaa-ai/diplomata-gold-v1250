<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIPLOMATA GOLD V1250 // SUPREMACIA</title>
    <style>
        :root { --gold: #d4af37; --green: #00ff00; --red: #ff0000; --bg: #000000; --card-bg: #0a0a0a; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .header { display: flex; justify-content: space-between; font-size: 11px; color: var(--gold); padding: 10px; border-bottom: 1px solid #222; }
        
        .tab-bar { display: flex; background: #111; border-bottom: 1px solid #222; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #666; font-size: 12px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); background: #151515; }

        .view-content { display: none; padding: 10px; height: 80vh; }
        .view-content.active { display: block; }

        .radar-grid { display: grid; gap: 8px; }
        .asset-card { background: var(--card-bg); padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--gold); }
        .price-text { font-weight: bold; color: var(--gold); }
        #tradingview_widget { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <span>🔱 DIPLOMATA GOLD V1250</span>
        <span id="live-clock">00:00:00</span>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" id="btn-charts" onclick="switchTab('tab-charts')">📊 GRÁFICOS</button>
        <button class="tab-btn" id="btn-values" onclick="switchTab('tab-values')">💰 VALORES</button>
    </div>

    <div id="tab-charts" class="view-content active">
        <div id="tradingview_widget"></div>
    </div>

    <div id="tab-values" class="view-content">
        <div class="radar-grid" id="radar-list"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // 1. Relógio Operacional [cite: 2026-01-20]
        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);

        // 2. Definição das Moedas
        const moedas = [
            { id: "BTC", nome: "BITCOIN", pair: "BINANCE:BTCBRL" },
            { id: "ETH", nome: "ETHEREUM", pair: "BINANCE:ETHBRL" },
            { id: "SOL", nome: "SOLANA", pair: "BINANCE:SOLBRL" }
        ];

        // 3. Função de Alternância de Abas com Fix de Renderização [cite: 2026-01-23]
        function switchTab(tabId) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active');

            if(tabId === 'tab-charts') { initChart("BINANCE:BTCBRL"); }
        }

        // 4. Inicializador do Gráfico (Garante que não fique preto) [cite: 2026-02-06]
        function initChart(symbol) {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "D",
                "theme": "dark",
                "style": "1",
                "locale": "br",
                "container_id": "tradingview_widget",
                "hide_top_toolbar": true,
                "save_image": false
            });
        }

        // 5. Injeção do Radar
        document.getElementById('radar-list').innerHTML = moedas.map(m => `
            <div class="asset-card" onclick="switchTab('tab-charts'); initChart('${m.pair}');">
                <div><b>${m.nome} 🔱</b></div>
                <div class="price-text" id="val-${m.id}">CARREGANDO...</div>
            </div>
        `).join('');

        // 6. Sincronia com o Worker (Pasta J) [cite: 2026-01-16]
        async function sync() {
            try {
                const res = await fetch("https://late-sea-261d.siddney-almeidaa.workers.dev");
                const data = await res.json();
                if(data.radar) {
                    document.getElementById('val-BTC').innerText = data.radar["BTCBRL"] || "---";
                    document.getElementById('val-ETH').innerText = data.radar["ETHBRL"] || "---";
                    document.getElementById('val-SOL').innerText = data.radar["SOLBRL"] || "---";
                }
            } catch (e) { console.log("Erro de Sync."); }
        }

        // Start Geral
        initChart("BINANCE:BTCBRL");
        setInterval(sync, 10000);
        sync();
    </script>
</
    body>
</html>
