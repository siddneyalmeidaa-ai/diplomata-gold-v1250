<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIPLOMATA GOLD V1250 // TERMINAL</title>
    <style>
        :root {
            --gold: #d4af37;
            --green: #00ff00;
            --red: #ff0000;
            --bg: #0a0a0a;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }
        .main-display {
            text-align: center;
            margin: 20px 0;
        }
        .instrument { font-size: 14px; color: #888; letter-spacing: 2px; }
        .price { font-size: 48px; margin: 10px 0; font-weight: bold; }
        .status-box {
            display: flex;
            gap: 15px;
            background: #111;
            padding: 10px;
            border-radius: 5px;
            font-size: 11px;
            text-transform: uppercase;
        }
        .status-ia { color: var(--green); font-weight: bold; }
        .chart-container {
            width: 100%;
            height: 300px;
            margin: 20px 0;
            border: 1px solid #222;
        }
    </style>
</head>
<body>

    <div class="header">
        <span>🔱 DIPLOMATA GOLD V1250</span>
        <span id="clock">00:00:00</span>
    </div>

    <div class="status-box">
        <div>CICLO: <span style="color:var(--gold)">LIVE</span></div>
        <div>IA-SENTINELA: <span id="status-ia" class="status-ia">---</span></div>
        <div>PROJ. (-50%): <span id="proj-val">R$ 0,00</span></div>
    </div>

    <div class="main-display">
        <div class="instrument">BITCOIN / BRL</div>
        <div id="btc-price" class="price">R$ 0,00</div>
    </div>

    <div class="chart-container" id="tradingview_chart"></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // 1. Relógio em Tempo Real
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR');
        }
        setInterval(updateClock, 1000);

        // 2. Gráfico Profissional TradingView
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:BTCBRL",
            "interval": "D",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "br",
            "container_id": "tradingview_chart",
            "hide_top_toolbar": true,
            "hide_legend": true,
            "save_image": false
        });

        // 3. Integração com a PASTA J (Seu Worker no Cloudflare)
        async function syncTerminal() {
            const ENDPOINT = "https://late-sea-261d.siddney-almeidaa.workers.dev";
            try {
                const response = await fetch(ENDPOINT);
                const data = await response.json();

                // Atualiza Interface
                document.getElementById('btc-price').innerText = data.valor_atual;
                document.getElementById('status-ia').innerText = data.status_ia;
                document.getElementById('proj-val').innerText = data.projecao_24h;

                // Lógica de Cor do Sinal
                const statusEl = document.getElementById('status-ia');
                if(data.status_ia.includes("ENTRA")) {
                    statusEl.style.color = "var(--green)";
                } else {
                    statusEl.style.color = "var(--red)";
                }

            } catch (e) {
                console.error("Erro na sincronia JSL: Blindagem ativa.");
            }
        }

        setInterval(syncTerminal, 10000); // Sincroniza a cada 10s
        syncTerminal();
    </script>
</body>
</html>
