<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL_V21 // SPA_SOBERANO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --gold: #ffdf00; --green: #00ff41; --red: #ff3131; }
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; }

        /* 🔱 MOTOR DE CONFLUÊNCIA */
        #canvas-intro { position: fixed; top: 0; left: 0; z-index: 5; }

        #ui-splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; background: rgba(0,0,0,0.6); transition: 0.5s;
        }

        .spa-brand { font-family: 'Inter'; font-size: 42px; font-weight: 900; letter-spacing: 12px; margin-top: 150px; }
        .gold-tag { color: var(--gold); font-size: 10px; letter-spacing: 5px; margin-top: 5px; }

        .btn-start {
            margin-top: 50px; background: var(--gold); color: #000; border: none;
            padding: 18px 50px; font-size: 12px; font-weight: 900; letter-spacing: 2px;
            cursor: pointer; border-radius: 4px; box-shadow: 0 0 20px rgba(255,223,0,0.4);
        }

        /* 🔱 DASHBOARD SOBERANO */
        #main-dashboard { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 0.8s; }
        .top-info { padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; font-size: 10px; color: #666; }
        
        .grid-data { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 15px; overflow-y: auto; flex: 1; }
        .card-moeda { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; border-radius: 8px; position: relative; border-left: 4px solid #333; transition: 0.3s; }
        .price-val { font-size: 22px; font-weight: bold; margin: 10px 0; display: block; }
        .tag-status { font-size: 9px; font-weight: 900; text-transform: uppercase; }
