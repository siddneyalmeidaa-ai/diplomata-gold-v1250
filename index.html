<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIPLOMATA GOLD V1250 // SUPREMACIA</title>
    <style>
        :root {
            --gold: #d4af37;
            --green: #00ff00;
            --red: #ff0000;
            --bg: #000000;
            --card-bg: #0a0a0a;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--gold);
            padding: 10px;
            border-bottom: 1px solid #222;
        }
        .tab-bar {
            display: flex;
            background: #111;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            color: #666;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .tab-btn.active {
            color: var(--gold);
            border-bottom: 2px solid var(--gold);
            background: #151515;
        }
        .view-content { display: none; padding: 10px; }
        .view-content.active { display: block; }

        /* Radar de Valores */
        .radar-grid { display: grid; gap: 10px; margin-top: 10px; }
        .asset-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--gold);
            border: 1px solid #1a1a1a;
        }
        .asset-info { display: flex; flex-direction: column; }
        .asset-name { font-size: 14px; font-weight: bold; letter-spacing: 1px; }
        .asset-shield { font-size: 10px; color: #555; margin-top: 4px; }
        .asset-values { text-align: right; }
        .price-text { font-size: 16px; font-weight: bold; }
        .pct-text { font-size: 12px; margin-top: 2px; }

        .chart-frame { height: 85vh; width: 100%; border: none; }
        .up { color: var(--green); }
        .down { color: var(--red); }
    </style>
</head>
<body>

    <div class="header">
        <span>🔱 DIPLOMATA GOLD V1250</span>
        <span id="live-clock">00:00:00</span>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('tab-charts')">📊 GRÁFICOS</button>
        <button class="tab-btn" onclick="switchTab('tab-values')">💰 VALORES</button>
    </div>

    <div id="tab-charts" class="view-content active">
        <div id="tradingview_main" class="chart-frame"></div>
    </div>

    <div id="tab-values" class="view-content">
        <div class="radar-grid" id="radar-list">
            </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Relógio de Operações
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('pt-BR');
        }, 1000);

        // Troca de Abas [cite: 2026-01-28]
        function switchTab(tabId) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Configuração dos Alvos (15 ativos)
        const moedas = [
            { id: "BTC", nome: "BITCOIN", shield: "1408S", pair: "BINANCE:BTCBRL" },
            { id: "ETH", nome: "ETHEREUM", shield: "908S", pair: "BINANCE:ETHBRL" },
            { id: "SOL", nome: "SOLANA", shield: "2108S", pair: "BINANCE:SOLBRL" },
            { id: "FET", nome: "FETCH.AI", shield: "608S", pair: "BINANCE:FETUSDT" },
            { id: "TIA", nome: "CELESTIA", shield: "408S", pair: "BINANCE:TIAUSDT" },
            { id: "RNDR", nome: "RENDER", shield: "328S", pair: "BINANCE:RNDRUSDT" },
            { id: "BNB", nome: "BINANCE", shield: "1508S", pair: "BINANCE:BNBBRL" },
            { id: "NEAR", nome: "NEAR", shield: "110S", pair: "BINANCE:NEARUSDT" },
            { id: "AVAX", nome: "AVALANCHE", shield: "550S", pair: "BINANCE:AVAXUSDT" },
            { id: "ADA", nome: "CARDANO", shield: "200S", pair: "BINANCE:ADABRL" },
            { id: "XRP", nome: "XRP", shield: "990S", pair: "BINANCE:XRPBRL" },
            { id: "DOT", nome: "POLKADOT", shield: "350S", pair: "BINANCE:DOTBRL" },
            { id: "MATIC", nome: "POLYGON", shield: "120S", pair: "BINANCE:MATICBRL" },
            { id: "LINK", nome: "CHAINLINK", shield: "880S", pair: "BINANCE:LINKBRL" },
            { id: "DOGE", nome: "DOGECOIN", shield: "2400S", pair: "BINANCE:DOGEBRL" }
        ];

        // Renderização do Radar
        const radarList = document.getElementById('radar-list');
        radarList.innerHTML = moedas.map(m => `
            <div class="asset-card" onclick="loadChart('${m.pair}')">
                <div class="asset-info">
                    <span class="asset-name">${m.nome} 🔱</span>
                    <span class="asset-shield">🛡️ ${m.shield}</span>
                </div>
                <div class="asset-values">
                    <div class="price-text" id="val-${m.id}">---</div>
                    <div class="pct-text" id="pct-${m.id}">---</div>
                </div>
            </div>
        `).join('');

        // Gerenciador de Gráfico [cite: 2026-01-16]
        function loadChart(symbol) {
            switchTab('tab-charts');
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "240",
                "theme": "dark",
                "style": "1",
                "locale": "br",
                "container_id": "tradingview_main",
                "hide_top_toolbar": true
            });
        }
        loadChart("BINANCE:BTCBRL"); // Início padrão

        // Sincronia com Worker Multi-Ativos (Pasta J) [cite: 2026-01-23]
        async function syncEngine() {
            const URL = "https://late-sea-261d.siddney-almeidaa.workers.dev";
            try {
                const response = await fetch(URL);
                const data = await response.json();
                
                if(data.radar) {
                    // Mapeamento de preenchimento do Radar
                    Object.keys(data.radar).forEach(key => {
                        const baseId = key.replace("BRL", "").replace("USDT", "");
                        const el = document.getElementById(`val-${baseId}`);
                        if(el) {
                            el.innerText = data.radar[key];
                            el.classList.add('up');
                        }
                    });
                }
            } catch (e) {
                console.log("JSL: Aguardando sincronia de rede...");
            }
        }

        setInterval(syncEngine, 10000);
        syncEngine();
    </script>
</body>
</html>
