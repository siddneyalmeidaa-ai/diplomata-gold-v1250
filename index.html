<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL_V20 // SPA_SOBERANO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --green: #00ff41; --gold: #ffdf00; --red: #ff3131; --card: #111; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; overflow: hidden; }

        /* 🔱 CANVAS DE CONFLUÊNCIA */
        #canvas-confluence { position: fixed; top: 0; left: 0; z-index: 999; pointer-events: none; transition: opacity 1s; }

        /* 🔱 INTERFACE DE ABERTURA */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; background: rgba(0,0,0,0.9); transition: 0.8s;
        }
        .spa-brand { font-family: 'Inter'; font-size: 38px; font-weight: 900; letter-spacing: 15px; margin-top: 180px; }
        .padrão-tag { color: var(--gold); font-size: 11px; letter-spacing: 5px; margin-top: 10px; }

        /* 🔱 DASHBOARD SOBERANO */
        #main-ui { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 1s; }
        .top-bar { padding: 15px; font-size: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid #222; background: #000; }
        .nav-tabs { display: flex; background: #000; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 12px; font-weight: bold; color: #555; cursor: pointer; border-bottom: 2px solid #111; }
        .tab.active { color: var(--green); border-bottom-color: var(--green); background: #0a0a0a; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 15px; overflow-y: auto; }
        .card { background: var(--card); border-radius: 4px; padding: 20px; border-left: 5px solid #333; position: relative; }
        .price { font-size: 22px; font-weight: bold; margin: 10px 0; display: block; color: #fff; }
        .status-tag { font-size: 10px; font-weight: bold; }
        .led { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-left: 5px; }

        .btn-init {
            margin-top: 40px; background: transparent; color: var(--gold); border: 1px solid var(--gold);
            padding: 15px 45px; font-size: 12px; font-weight: 900; letter-spacing: 3px; cursor: pointer;
        }
        .btn-exit { position: fixed; bottom: 80px; right: 20px; background: var(--red); border: none; color: #fff; padding: 10px; border-radius: 50%; cursor: pointer; z-index: 100; width: 50px; height: 50px; font-weight: bold; }

        /* 🔱 EFEITOS LED */
        .led-green { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .led-yellow { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .led-red { background: var(--red); box-shadow: 0 0 10px var(--red); }
    </style>
</head>
<body>

    <canvas id="canvas-confluence"></canvas>

    <div id="splash-screen">
        <div class="spa-brand">SPA</div>
        <div class="padrão-tag">PADRÃO OURO</div>
        <button class="btn-init" onclick="initializeSystem()">INITIALIZE QUANTUM MEMORY</button>
    </div>

    <div id="main-ui">
        <div class="top-bar">
            <span>SENTINEL_V20 // SPA_SOBERANO</span>
            <span id="clock">00:00:00</span>
        </div>
        <div class="nav-tabs">
            <div class="tab active" onclick="tab(this, 'painel')">PAINEL_DATA</div>
            <div class="tab" onclick="tab(this, 'view')">TRADER_VIEW</div>
        </div>
        <div id="painel" class="grid"></div>
        <div id="view" style="display:none; height: 100%;">
            <div id="tv-box" style="height: calc(100vh - 180px);"></div>
        </div>
        <div style="background:#000; padding:15px; border-top:1px solid #222; text-align:center; font-size:10px; color:var(--green);">
            SISTEMA BLINDADO // R$ 1.273,00 MONITORADOS
        </div>
        <button class="btn-exit" onclick="exitSystem()">🔱</button>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const canvas = document.getElementById('canvas-confluence');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let audioAtivo = false;
        let running = true;
        let systemActive = false;
        const symbols = "01<>[]_X*🔱";

        // CONFIGURAÇÃO DAS MOEDAS (PADRÃO OURO)
        const moedas = [
            { id: "BTC", sym: "BTCBRL", alvo: 450000 },
            { id: "ETH", sym: "ETHBRL", alvo: 22000 },
            { id: "SOL", sym: "SOLBRL", alvo: 1200 },
            { id: "FET", sym: "FETUSDT", convert: true, alvo: 15.00 },
            { id: "RENDER", sym: "RENDERBRL", alvo: 26.26 },
            { id: "ADA", sym: "ADABRL", alvo: 5.50 }
        ];

        class Particle {
            constructor(isExiting = false) {
                this.isExiting = isExiting;
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = this.isExiting ? canvas.height / 2 : Math.random() * canvas.height;
                this.tx = canvas.width / 2 + (Math.random() * 200 - 100);
                this.ty = canvas.height / 2 - 80 + (Math.random() * 200 - 100);
                this.char = symbols[Math.floor(Math.random() * symbols.length)];
                this.speed = 0.02 + Math.random() * 0.04;
                this.a = 0;
            }
            update() {
                if(!systemActive || this.isExiting) {
                    this.x += (this.tx - this.x) * this.speed;
                    this.y += (this.ty - this.y) * this.speed;
                    if(this.a < 1) this.a += 0.02;
                } else {
                    this.x += (Math.random() - 0.5) * 50;
                    this.y += (Math.random() - 0.5) * 50;
                    this.a -= 0.05;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(255, 223, 0, ${this.a})`;
                ctx.font = "12px monospace";
                ctx.fillText(this.char, this.x, this.y);
            }
        }

        function initCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<150; i++) particles.push(new Particle());
        }
        initCanvas();

        function loop() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            if(running) requestAnimationFrame(loop);
        }
        loop();

        function initializeSystem() {
            audioAtivo = true; systemActive = true;
            document.getElementById('splash-screen').style.opacity = '0';
            speak("Sidney, Memória Quântica ativada. Montando quebra-cabeça.");
            
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
                setTimeout(() => document.getElementById('main-ui').style.opacity = '1', 100);
                fetchMarket();
            }, 800);
        }

        function exitSystem() {
            systemActive = false;
            document.getElementById('main-ui').style.opacity = '0';
            speak("Saindo do sistema. Voltando para o Tridente de segurança.");
            
            setTimeout(() => {
                document.getElementById('main-ui').style.display = 'none';
                document.getElementById('splash-screen').style.display = 'flex';
                document.getElementById('splash-screen').style.opacity = '1';
                initCanvas();
            }, 1000);
        }

        function speak(t) { if(audioAtivo) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='pt-BR'; u.rate=1.2; window.speechSynthesis.speak(u); } }

        async function fetchMarket() {
            try {
                const resD = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=USDTBRL`);
                const dData = await resD.json();
                const dolar = parseFloat(dData.price);

                let html = "";
                for(let m of moedas) {
                    const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${m.sym}`);
                    const data = await res.json();
                    let price = parseFloat(data.lastPrice);
                    if(m.convert) price *= dolar;
                    
                    const vol = Math.abs(parseFloat(data.priceChangePercent));
                    let status = { text: 'NÃO ENTRA', color: '#ff3131', led: 'led-red' };
                    
                    if(vol >= 2 && vol <= 6) { 
                        status = { text: 'ENTRA', color: '#00ff41', led: 'led-green' };
                        speak(`Oportunidade detectada em ${m.id}. Padrão Ouro ativo.`);
                    } else if(vol > 6 && vol <= 10) {
                        status = { text: 'PULA', color: '#ffdf00', led: 'led-yellow' };
                    }

                    const potencial = (((m.alvo - price) / price) * 100).toFixed(0);

                    html += `
                        <div class="card" style="border-left-color: ${status.color}">
                            <div style="display:flex; justify-content:space-between; align-items:center">
                                <span style="font-size:10px; color:#555;">${m.id}/BRL</span>
                                <div class="led ${status.led}"></div>
                            </div>
                            <span class="price">R$ ${price.toLocaleString('pt-BR')}</span>
                            <span class="status-tag" style="color:${status.color}">${status.text} (+${potencial}%)</span>
                        </div>
                    `;
                }
                document.getElementById('painel').innerHTML = html;
            } catch(e) {}
            setTimeout(fetchMarket, 10000);
        }

        function tab(el, id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('painel').style.display = 'none';
            document.getElementById('view').style.display = 'none';
            el.classList.add('active');
            document.getElementById(id).style.display = (id === 'painel' ? 'grid' : 'block');
            if(id === 'view') {
                document.getElementById('tv-box').innerHTML = "";
                new TradingView.widget({ "autosize": true, "symbol": "BINANCE:BTCBRL", "theme": "dark", "container_id": "tv-box", "locale": "br" });
            }
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
    </script>
</body>
</html>
