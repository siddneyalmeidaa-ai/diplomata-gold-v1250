<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL_V12 // SOBERANIA</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #020202; 
            --card: #0a0a0a; 
            --green-nitido: #00ff88; 
            --red-nitido: #ff3e3e;   
            --border-dark: #1a1a1a; 
            --glass: rgba(5, 5, 5, 0.95);
        }
        body { background: var(--bg); color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* CABEÇALHO MODERNO DE ALTA VISIBILIDADE */
        .st-bar { 
            display: flex; flex-direction: column;
            padding: 20px; border-bottom: 2px solid var(--border-dark); 
            background: var(--glass); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 1000;
        }
        
        .st-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .st-metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; border-top: 1px solid #111; padding-top: 15px; }
        
        .stat-box { display: flex; flex-direction: column; }
        .stat-label { font-size: 8px; font-weight: 900; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
        .stat-val { font-size: 11px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: #eee; }

        /* RELÓGIO NEON */
        .clock-modern { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 18px; font-weight: 800; 
            color: #fff; text-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            background: #111; padding: 5px 12px; border-radius: 6px; border: 1px solid #222;
        }

        /* NOTIFICAÇÕES E PAINEL */
        .notif-bell { display: flex; align-items: center; gap: 8px; font-size: 9px; font-weight: 900; color: #444; cursor: pointer; position: relative; }
        .alert-active { color: #ffcc00 !important; animation: blink 1s infinite; }
        .bell-dot { width: 8px; height: 8px; background: #ffcc00; border-radius: 50%; position: absolute; top: -4px; right: -4px; display: none; box-shadow: 0 0 10px #ffcc00; }
        
        #notif-panel {
            position: fixed; top: 100px; right: 15px; left: 15px; 
            background: #0d0d0d; border: 1px solid #222; border-radius: 12px;
            padding: 20px; display: none; z-index: 2000; box-shadow: 0 30px 60px rgba(0,0,0,1);
        }
        .notif-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 10px; }
        .notif-item { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 10px 0; border-bottom: 1px solid #1a1a1a; color: #aaa; }
        .notif-item b { color: var(--green-nitido); }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .pulse { animation: pulse-glow 2s infinite ease-in-out; }
        @keyframes pulse-glow { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }

        .nav { display: flex; border-bottom: 1px solid var(--border-dark); background: #050505; }
        .n-btn { flex: 1; padding: 16px; text-align: center; font-size: 10px; font-weight: 900; color: #222; background: none; border: none; letter-spacing: 1px; }
        .n-btn.active { color: var(--green-nitido); border-bottom: 3px solid var(--green-nitido); }

        /* CARDS */
        .container { padding: 12px; }
        .c-asset { 
            background: var(--card); border: 1px solid var(--border-dark);
            border-radius: 12px; margin-bottom: 10px; padding: 20px 15px; 
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }

        .side-pill {
            position: absolute; left: 8px; top: 20%; bottom: 20%; width: 5px;
            border-radius: 20px; background: #1a1a1a; transition: all 0.4s ease;
        }

        .asset-row { display: flex; align-items: center; justify-content: space-between; width: 100%; padding-left: 15px; }
        .a-left { display: flex; flex-direction: column; }
        .a-sym { font-size: 22px; font-weight: 900; color: #ffffff; letter-spacing: -1px; }
        .a-pair { font-size: 9px; color: #444; margin-top: 4px; font-weight: 900; }

        .a-right { text-align: right; }
        .a-price { font-size: 21px; font-weight: 800; color: #ffffff; font-family: 'JetBrains Mono', monospace; }
        
        .status-box { display: flex; align-items: center; gap: 6px; justify-content: flex-end; margin-top: 6px; }
        .a-pct { font-size: 13px; font-weight: 900; font-family: 'JetBrains Mono', monospace; }
        .flow-tag { font-size: 8px; font-weight: 900; padding: 2px 6px; border-radius: 4px; background: #000; border: 1px solid #1a1a1a; color: #333; }

        .pos-bg { background: var(--green-nitido) !important; box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }
        .neg-bg { background: var(--red-nitido) !important; }
        .pos-txt { color: var(--green-nitido) !important; }
        .neg-txt { color: var(--red-nitido) !important; }

        .chart-box { display: none; width: 100%; height: 450px; margin-top: 15px; border-top: 1px solid var(--border-dark); }
        .c-asset.open .chart-box { display: block; }
    </style>
</head>
<body>

<div class="st-bar" id="main-header">
    <div class="st-top-row">
        <div class="notif-bell" id="bell" onclick="toggleNotifs()">
            <span id="last-alert">SISTEMA ONLINE</span>
            <div class="bell-dot" id="dot"></div>
            <span style="font-size: 12px;">🔔</span>
        </div>
        <div class="clock-modern" id="clock">00:00:00</div>
    </div>
    <div class="st-metrics">
        <div class="stat-box">
            <span class="stat-label">Organismo</span>
            <span class="stat-val pulse" id="mkt-status">SINCRONIZANDO</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Domínio BTC</span>
            <span class="stat-val" id="btc-dom">--%</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Fluxo Ativo</span>
            <span class="stat-val pulse" id="mkt-flow">AGUARDANDO</span>
        </div>
    </div>
</div>

<div id="notif-panel">
    <div class="notif-header">
        <span style="font-size: 11px; font-weight: 900;">LOG DE ROTAÇÃO</span>
        <span onclick="toggleNotifs()" style="cursor:pointer; font-size: 14px; color: #555;">✕</span>
    </div>
    <div id="notif-list"></div>
</div>

<div class="nav">
    <button class="n-btn active">🔱 MONITORAMENTO</button>
    <button class="n-btn">📊 PATRIMÔNIO</button>
</div>

<div class="container" id="list"></div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    const coins = ["BTC", "ETH", "RENDER", "SOL", "NEAR", "SEI", "POL", "ADA", "DOT", "FET"];
    let usdRate = 5.50;
    let btcChange = 0;
    let alerts = [];

    function toggleNotifs() {
        const panel = document.getElementById('notif-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        document.getElementById('dot').style.display = 'none';
    }

    function addAlert(msg) {
        const time = new Date().toLocaleTimeString();
        alerts.unshift(`[${time}] ${msg}`);
        if(alerts.length > 8) alerts.pop();
        
        const list = document.getElementById('notif-list');
        list.innerHTML = alerts.map(a => `<div class="notif-item">${a}</div>`).join('');
        document.getElementById('dot').style.display = 'block';
        
        const lastAlertEl = document.getElementById('last-alert');
        lastAlertEl.innerText = "ALERTA DE FLUXO";
        lastAlertEl.classList.add('alert-active');
    }

    async function fetchGlobalData() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/global');
            const data = await res.json();
            const btcDom = data.data.market_cap_percentage.btc.toFixed(1);
            document.getElementById('btc-dom').innerText = btcDom + "%";
            document.getElementById('btc-dom').style.color = "var(--green-nitido)";
        } catch (e) { 
            document.getElementById('btc-dom').innerText = "52.4%"; 
        }
    }

    async function sync() {
        try {
            const rRate = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=USDTBRL');
            const dRate = await rRate.json();
            usdRate = parseFloat(dRate.price);

            // Primeiro pegar o BTC como referência de rotação
            const resBtc = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
            const dataBtc = await resBtc.json();
            btcChange = parseFloat(dataBtc.priceChangePercent);

            let totalPct = 0;

            for (let s of coins) {
                const pair = s + 'USDT';
                const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${pair}`);
                const data = await res.json();
                
                const brl = parseFloat(data.lastPrice) * usdRate;
                const pct = parseFloat(data.priceChangePercent);
                totalPct += pct;
                const dec = brl < 1 ? 4 : 2;
                
                let card = document.getElementById(`card-${s}`);
                if (!card) {
                    card = document.createElement('div');
                    card.id = `card-${s}`;
                    card.className = `c-asset`;
                    card.onclick = () => toggle(s);
                    card.innerHTML = `
                        <div class="side-pill" id="pill-${s}"></div>
                        <div class="asset-row">
                            <div class="a-left">
                                <span class="a-sym">${s}</span>
                                <span class="a-pair">VOLUME / BRL</span>
                            </div>
                            <div class="a-right">
                                <div class="a-price" id="pr-${s}">R$ 0,00</div>
                                <div class="status-box">
                                    <span class="flow-tag" id="tag-${s}">--</span>
                                    <span class="a-pct" id="pct-${s}">0.00%</span>
                                </div>
                            </div>
                        </div>
                        <div class="chart-box" id="tv-${s}"></div>
                    `;
                    document.getElementById('list').appendChild(card);
                }

                const isPos = pct >= 0;
                const pill = document.getElementById(`pill-${s}`);
                const tag = document.getElementById(`tag-${s}`);
                pill.className = `side-pill ${isPos ? 'pos-bg' : 'neg-bg'}`;
                
                // Lógica de Detecção de Rotação (Capital saindo do BTC para Alts)
                if (s !== "BTC" && pct > (btcChange + 2)) {
                    if (tag.innerText !== "ENTRA | ALVO") {
                        addAlert(`Capital migrando do BTC para <b>${s}</b>`);
                    }
                    tag.innerText = "ENTRA | ALVO";
                    tag.style.color = "var(--green-nitido)";
                } else if (pct < -2.5) {
                    tag.innerText = "PULA | P/ BTC";
                    tag.style.color = "var(--red-nitido)";
                } else {
                    tag.innerText = "LATERAL";
                    tag.style.color = "#444";
                }

                const pEl = document.getElementById(`pct-${s}`);
                pEl.innerText = (isPos ? "+" : "") + pct.toFixed(2) + "%";
                pEl.className = `a-pct ${isPos ? 'pos-txt' : 'neg-txt'}`;
                document.getElementById(`pr-${s}`).innerText = "R$ " + brl.toLocaleString('pt-BR', {minimumFractionDigits: dec, maximumFractionDigits: dec});
            }

            const mStatus = document.getElementById('mkt-status');
            const mFlow = document.getElementById('mkt-flow');
            if (totalPct / coins.length > btcChange) {
                mStatus.innerText = "VIVO | ALT-SEASON"; mStatus.className = "stat-val pulse pos-txt";
                mFlow.innerText = "FLUXO PARA ALTS"; mFlow.className = "stat-val pos-txt";
            } else {
                mStatus.innerText = "VIVO | BTC-POWER"; mStatus.className = "stat-val pulse";
                mFlow.innerText = "FLUXO PARA BTC";
            }

        } catch (e) { }
    }

    function toggle(id) {
        const c = document.getElementById(`card-${id}`);
        c.classList.toggle('open');
        const containerId = `tv-${id}`;
        if (c.classList.contains('open') && document.getElementById(containerId).innerHTML === "") {
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:" + id + "USDT",
                "interval": "1",
                "theme": "dark",
                "container_id": containerId,
                "hide_side_toolbar": true,
                "studies": ["RSI@tv-basicstudies"]
            });
        }
    }

    fetchGlobalData();
    sync();
    setInterval(sync, 5000);
    setInterval(fetchGlobalData, 60000);
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
