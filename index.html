<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL_V12 // SOBERANIA</title>
    <style>
        :root { 
            --bg: #000; 
            --card: #0a0a0a; 
            --green-nitido: #2ecc71; /* Verde nítido, mas sem neon */
            --red-nitido: #e74c3c;   /* Vermelho sóbrio e visível */
            --border-dark: #1a1a1a; 
        }
        body { 
            background: var(--bg); 
            color: #ffffff; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 0; 
        }

        /* BARRA DE STATUS SUPERIOR */
        .st-bar { 
            display: flex; justify-content: space-around; 
            padding: 12px 0; border-bottom: 1px solid var(--border-dark); 
            font-size: 9px; font-weight: 900; text-transform: uppercase; color: #666; 
        }

        .head { 
            padding: 12px 15px; display: flex; justify-content: space-between; 
            font-size: 11px; font-weight: bold; color: #444; 
        }

        .nav { display: flex; border-bottom: 1px solid var(--border-dark); margin-bottom: 10px; }
        .n-btn { 
            flex: 1; padding: 18px; text-align: center; font-size: 11px; 
            font-weight: 900; color: #333; background: none; border: none; 
        }
        .n-btn.active { color: var(--green-nitido); border-bottom: 3px solid var(--green-nitido); }

        .container { padding: 10px; }
        
        /* CARD COM BORDA LATERAL REDONDINHA */
        .c-asset { 
            background: var(--card); 
            border: 1px solid var(--border-dark);
            border-radius: 8px; 
            margin-bottom: 8px; 
            padding: 18px 20px; 
            display: flex; 
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: transform 0.1s;
        }

        /* BARRA INDICADORA REDONDINHA */
        .side-pill {
            position: absolute;
            left: 6px;
            top: 15%;
            bottom: 15%;
            width: 5px;
            border-radius: 10px;
            background: #222;
            transition: background 0.3s;
        }

        .asset-row { 
            display: flex; align-items: center; justify-content: space-between; 
            width: 100%; padding-left: 12px; 
        }
        
        .a-left { display: flex; flex-direction: column; }
        .a-sym { font-size: 21px; font-weight: 900; color: #ffffff; letter-spacing: -0.5px; }
        .a-pair { font-size: 9px; color: #555; margin-top: 4px; font-weight: 900; }

        .a-right { text-align: right; }
        .a-price { font-size: 23px; font-weight: 900; color: #ffffff; letter-spacing: -1px; }
        .a-pct { font-size: 13px; font-weight: 900; margin-top: 6px; }

        /* CORES SEMI-FOSCAS (ALTO CONTRASTE) */
        .pos-bg { background: var(--green-nitido) !important; }
        .neg-bg { background: var(--red-nitido) !important; }
        .pos-txt { color: var(--green-nitido) !important; }
        .neg-txt { color: var(--red-nitido) !important; }

        /* ÁREA DO GRÁFICO EXPANSÍVEL */
        .chart-box { 
            display: none; width: 100%; height: 450px; 
            margin-top: 15px; border-top: 1px solid var(--border-dark); 
        }
        .c-asset.open .chart-box { display: block; }
    </style>
</head>
<body>

<div class="st-bar">
    <div>ESTADO: <span class="pos-txt">ALTISTA</span></div>
    <div>DOMÍNIO BTC: <span style="color:var(--green-nitido)">52.4%</span></div>
    <div>FLUXO ATIVO: <span class="pos-txt">ENTRANDO</span></div>
</div>

<div class="head">
    <div>SENTINEL_V12 // SOBERANIA <span class="pos-txt">●</span></div>
    <div id="clock">00:00:00</div>
</div>

<div class="nav">
    <button class="n-btn active">🔱 MONITORAMENTO</button>
    <button class="n-btn">📊 PATRIMÔNIO</button>
</div>

<div class="container" id="list"></div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    const coins = ["BTC", "ETH", "RENDER", "SOL", "NEAR", "SEI", "POL", "ADA", "DOT", "FET"];
    let usdRate = 5.50;

    async function sync() {
        try {
            const rRate = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=USDTBRL');
            const dRate = await rRate.json();
            usdRate = parseFloat(dRate.price);

            for (let s of coins) {
                const pair = (s === 'POL') ? 'MATICUSDT' : s + 'USDT';
                const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${pair}`);
                const data = await res.json();
                
                const brl = parseFloat(data.lastPrice) * usdRate;
                const pct = parseFloat(data.priceChangePercent);
                const dec = brl < 1 ? 4 : 2;
                
                let card = document.getElementById(`card-${s}`);
                if (!card) {
                    card = document.createElement('div');
                    card.id = `card-${s}`;
                    card.className = `c-asset`;
                    card.onclick = () => toggle(s);
                    card.innerHTML = `
                        <div class="side-pill" id="pill-${s}"></div>
                        <div class="asset-row">
                            <div class="a-left">
                                <span class="a-sym">${s}</span>
                                <span class="a-pair">USDT / BRL</span>
                            </div>
                            <div class="a-right">
                                <div class="a-price" id="pr-${s}">R$ 0,00</div>
                                <div class="a-pct" id="pct-${s}">0.00%</div>
                            </div>
                        </div>
                        <div class="chart-box" id="tv-${s}"></div>
                    `;
                    document.getElementById('list').appendChild(card);
                }

                // Atualiza Cores e Valores
                const isPos = pct >= 0;
                document.getElementById(`pill-${s}`).className = `side-pill ${isPos ? 'pos-bg' : 'neg-bg'}`;
                const pEl = document.getElementById(`pct-${s}`);
                pEl.innerText = (isPos ? "+" : "") + pct.toFixed(2) + "%";
                pEl.className = `a-pct ${isPos ? 'pos-txt' : 'neg-txt'}`;
                document.getElementById(`pr-${s}`).innerText = "R$ " + brl.toLocaleString('pt-BR', {minimumFractionDigits: dec, maximumFractionDigits: dec});
            }
        } catch (e) { console.error("Erro na conexão"); }
    }

    function toggle(id) {
        const c = document.getElementById(`card-${id}`);
        c.classList.toggle('open');
        const containerId = `tv-${id}`;
        if (c.classList.contains('open') && document.getElementById(containerId).innerHTML === "") {
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:" + (id === 'POL' ? 'MATIC' : id) + "USDT",
                "interval": "1",
                "theme": "dark",
                "container_id": containerId,
                "hide_side_toolbar": true,
                "studies": ["RSI@tv-basicstudies"]
            });
        }
    }

    sync();
    setInterval(sync, 5000);
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
