<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL_V12 // SOBERANIA</title>
    <style>
        :root { 
            --bg: #000; --card: #080808; --green: #00ff41; --red: #ff3131; --border-dark: #121212; 
        }
        body { 
            background: var(--bg); color: white; font-family: Arial, sans-serif; margin: 0; padding: 0; 
        }

        .st-bar { display: flex; justify-content: space-around; padding: 10px 0; border-bottom: 1px solid var(--border-dark); font-size: 8px; font-weight: bold; text-transform: uppercase; }
        .head { padding: 12px 15px; display: flex; justify-content: space-between; font-size: 10px; font-weight: bold; color: #555; }

        .nav { display: flex; border-bottom: 1px solid var(--border-dark); }
        .n-btn { flex: 1; padding: 15px; text-align: center; font-size: 10px; font-weight: 900; color: #333; background: none; border: none; }
        .n-btn.active { color: var(--green); border-bottom: 2px solid var(--green); }

        .container { padding: 8px; }
        
        /* CARD LIMPO - SEM LUZINHA E SEM TEXTO NO TOPO */
        .c-asset { 
            background: var(--card); 
            border: 1px solid var(--border-dark);
            border-left: 4px solid #333; /* Borda lateral que muda de cor */
            border-radius: 4px; 
            margin-bottom: 6px; 
            padding: 15px 18px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            min-height: 70px;
            transition: border-left 0.3s ease;
        }

        .a-left { display: flex; flex-direction: column; }
        .a-sym { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }
        .a-pair { font-size: 8px; color: #333; margin-top: 3px; font-weight: bold; }

        .a-right { text-align: right; }
        .a-price { font-size: 21px; font-weight: 900; letter-spacing: -1px; }
        .a-pct { font-size: 11px; font-weight: bold; margin-top: 5px; }

        .pos-border { border-left-color: var(--green) !important; }
        .neg-border { border-left-color: var(--red) !important; }
        .pos-text { color: var(--green); }
        .neg-text { color: var(--red); }
    </style>
</head>
<body>

<div class="st-bar">
    <div>ESTADO: <span class="pos-text">ALTISTA</span></div>
    <div>DOMÍNIO BTC: <span style="color:var(--green)">52.4%</span></div>
    <div>FLUXO ATIVO: <span class="pos-text">ENTRANDO</span></div>
</div>

<div class="head">
    <div>SENTINEL_V12 // SOBERANIA <span class="pos-text">●</span></div>
    <div id="clock">03:43:51</div>
</div>

<div class="nav">
    <button class="n-btn active">🔱 MONITORAMENTO</button>
    <button class="n-btn">📊 PATRIMÔNIO</button>
</div>

<div class="container" id="list"></div>

<script>
    const coins = ["BTC", "ETH", "RENDER", "SOL", "NEAR", "SEI", "POL", "ADA", "DOT", "FET"];
    let usdRate = 5.48;

    async function sync() {
        try {
            const rRate = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=USDTBRL');
            const dRate = await rRate.json();
            usdRate = parseFloat(dRate.price);

            let html = '';
            for (let s of coins) {
                const pair = (s === 'POL') ? 'MATICUSDT' : s + 'USDT';
                const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${pair}`);
                const data = await res.json();
                
                const brl = parseFloat(data.lastPrice) * usdRate;
                const pct = parseFloat(data.priceChangePercent);
                const dec = brl < 1 ? 4 : 2;
                
                // Lógica da borda e cor
                const statusClass = pct >= 0 ? 'pos-border' : 'neg-border';
                const textClass = pct >= 0 ? 'pos-text' : 'neg-text';

                html += `
                    <div class="c-asset ${statusClass}">
                        <div class="a-left">
                            <span class="a-sym">${s}</span>
                            <span class="a-pair">USDT / BRL</span>
                        </div>
                        <div class="a-right">
                            <div class="a-price">R$ ${brl.toLocaleString('pt-BR', {minimumFractionDigits: dec, maximumFractionDigits: dec})}</div>
                            <div class="a-pct ${textClass}">${(pct >= 0 ? "+" : "") + pct.toFixed(2)}%</div>
                        </div>
                    </div>
                `;
            }
            document.getElementById('list').innerHTML = html;
        } catch (e) { console.error("Erro na sincronização."); }
    }

    sync();
    setInterval(sync, 5000);
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
