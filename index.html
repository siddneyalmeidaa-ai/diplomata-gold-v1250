<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL_V12 // SOBERANIA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #000000; 
            --card: #0d0d0d; 
            --green: #00ff41; 
            --red: #ff3131; 
            --blue: #00e5ff; 
            --border: #1a1a1a; 
            --text-dim: #666; 
            --gold: #ffb800;
        }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }
        
        /* BARRA DE STATUS SUPERIOR (FIXA) */
        .status-bar { 
            background: #000; 
            padding: 10px 15px; 
            display: flex; 
            justify-content: space-around; 
            font-size: 8px; 
            border-bottom: 1px solid var(--border); 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* HEADER */
        .header { 
            padding: 12px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 10px; 
            font-weight: bold; 
        }

        /* NAVEGAÇÃO */
        .nav { 
            display: flex; 
            border-bottom: 2px solid var(--border); 
            background: #000; 
        }
        .tab { 
            flex: 1; 
            padding: 15px; 
            text-align: center; 
            font-size: 10px; 
            font-weight: 900; 
            color: var(--text-dim); 
            background: none; 
            border: none; 
            cursor: pointer; 
            text-transform: uppercase; 
        }
        .tab.active { 
            color: var(--green); 
            border-bottom: 3px solid var(--green); 
        }

        .container { padding: 8px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* DESIGN DO CARD */
        .card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            margin-bottom: 8px; 
            position: relative; 
            overflow: hidden; 
            padding: 15px; 
        }

        .market-info { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer; 
        }
        
        .coin-box { display: flex; flex-direction: column; }
        .coin-name { font-size: 16px; font-weight: 900; color: #fff; margin-bottom: 2px; }
        .coin-pair { font-size: 8px; color: #333; font-weight: bold; margin-bottom: 5px; }

        .price-box { text-align: right; }
        .price-val { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }
        .price-pct { font-size: 11px; font-weight: bold; margin-top: 5px; display: block; }

        .led-dot { 
            width: 12px; 
            height: 12px; 
            border-radius: 50%; 
            display: inline-block; 
            position: absolute; 
            top: 15px; 
            right: 15px; 
        }

        /* GRÁFICO TÁTICO EXPANSÍVEL (ESPELHAMENTO DO PRINT) */
        .chart-box { 
            height: 0; 
            overflow: hidden; 
            transition: height 0.3s ease; 
            background: #000; 
            margin-top: 10px; 
            border-radius: 6px; 
        }
        .chart-box.active { 
            height: 500px; /* Altura para acomodar candles e RSI */
            border-top: 1px solid var(--border); 
            padding-top: 10px; 
        }
    </style>
</head>
<body>

<div class="status-bar">
    <div>ESTADO: <span id="st-mercado" style="color:var(--green)">ALTISTA</span></div>
    <div>DOMÍNIO BTC: <span id="st-dom" style="color:var(--blue)">52.4%</span></div>
    <div>FLUXO ATIVO: <span id="st-fluxo" style="color:var(--green)">ENTRANDO</span></div>
</div>

<div class="header">
    <div style="font-size:11px; font-weight:bold; letter-spacing:1px">SENTINEL_V12 // SOBERANIA <span id="hb" style="color:var(--green)">●</span></div>
    <div id="timer" style="font-size:11px">03:30:00</div>
</div>

<div class="nav">
    <button class="tab active" onclick="openTab(event, 'm-tab')">🔱 MONITORAMENTO</button>
    <button class="tab" onclick="openTab(event, 'p-tab')">📊 PATRIMÔNIO</button>
</div>

<div class="container">
    <div id="m-tab" class="tab-content active">
        <div id="coin-list"></div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    // LISTA DE 10 CRIPTOMOEDAS
    const moedas = ["BTC", "ETH", "RENDER", "NEAR", "SOL", "SEI", "POL", "ADA", "DOT", "FET"];
    let history = {};

    function openTab(evt, tabName) {
        document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function buildUI() {
        document.getElementById('coin-list').innerHTML = moedas.map(m => `
            <div class="card">
                <div class="market-info" onclick="toggleChart('${m}')">
                    <div class="coin-box">
                        <span class="coin-name">${m}</span>
                        <span class="coin-pair">USDT / BRL</span>
                    </div>
                    <div class="price-box">
                        <div class="price-val" id="p-${m}">R$ 0,00</div>
                        <div class="price-pct" id="v-${m}">0.00%</div>
                        <div class="led-dot" id="led-${m}" style="background:#222"></div>
                    </div>
                </div>
                <div class="chart-box" id="box-${m}"></div>
            </div>
        `).join('');
    }

    async function sync() {
        const hb = document.getElementById('hb');
        hb.style.opacity = '0.3';
        
        for (let s of moedas) {
            try {
                // Sincronização de valores reais via API Binance
                const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${s === 'POL' ? 'MATIC' : s}USDT`);
                const data = await res.json();
                const brl = parseFloat(data.lastPrice) * 5.43;
                const change = parseFloat(data.priceChangePercent);
                
                // Precisão decimal por valor de ativo
                const decimals = (brl < 1) ? 4 : (brl < 100) ? 4 : 2;
                document.getElementById(`p-${s}`).innerText = "R$ " + brl.toLocaleString('pt-BR', {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
                
                const pctEl = document.getElementById(`v-${s}`);
                pctEl.innerText = (change >= 0 ? "+" : "") + change.toFixed(2) + "%";
                pctEl.style.color = change >= 0 ? "var(--green)" : "var(--red)";

                const led = document.getElementById(`led-${s}`);
                if (change < -0.3) {
                    led.style.background = "var(--red)"; led.style.boxShadow = "0 0 10px var(--red)";
                } else if (change > 0.3) {
                    led.style.background = "var(--green)"; led.style.boxShadow = "0 0 10px var(--green)";
                } else {
                    led.style.background = "var(--blue)"; led.style.boxShadow = "0 0 10px var(--blue)";
                }
            } catch (e) {}
        }
        hb.style.opacity = '1';
    }

    function toggleChart(id) {
        const box = document.getElementById(`box-${id}`);
        box.classList.toggle('active');
        if (box.innerHTML === "") {
            const pair = (id === 'POL') ? 'MATIC' : id;
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:" + pair + "USDT",
                "interval": "1", // 1 minuto conforme print
                "theme": "dark",
                "style": "1", // Candles conforme print
                "container_id": `box-${id}`,
                "hide_side_toolbar": true,
                "locale": "br",
                "studies": [
                    "RSI@tv-basicstudies", // RSI tático
                    "MASimple@tv-basicstudies" // Média Móvel (MA 9)
                ]
            });
        }
    }

    buildUI();
    sync();
    setInterval(sync, 8000); // Sincronia a cada 8s
    setInterval(() => { document.getElementById('timer').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
